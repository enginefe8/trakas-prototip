<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 w-full max-w-md">
        <div class="text-center mb-10">
            <a href="index.html" class="text-5xl font-black text-gray-900 tracking-tighter italic block mb-2 hover:scale-105 transition-transform">TRAKAS</a>
            <p class="text-gray-400 text-xs font-bold tracking-widest uppercase">Takas Dünyasına Katıl</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-2">E-Posta Adresiniz</label>
                <input id="email" type="email" placeholder="ornek@mail.com" class="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:border-yellow-500 focus:bg-white transition-all text-lg">
            </div>
            
            <div>
                <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-2">Şifreniz</label>
                <input id="password" type="password" placeholder="••••••••" class="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:border-yellow-500 focus:bg-white transition-all text-lg">
            </div>

            <div class="pt-4 space-y-4">
                <button onclick="girisYap()" class="w-full bg-gray-900 text-white font-black py-4 rounded-xl hover:bg-gray-800 transition-all uppercase tracking-widest text-lg shadow-xl shadow-gray-200">
                    GİRİŞ YAP
                </button>
                <button onclick="kayitOl()" class="w-full bg-yellow-500 text-gray-900 font-black py-4 rounded-xl hover:bg-yellow-400 transition-all uppercase tracking-widest text-lg shadow-xl shadow-yellow-100">
                    YENİ HESAP AÇ
                </button>
            </div>
            
            <div class="text-center mt-8">
                <a href="index.html" class="text-xs text-gray-400 font-bold hover:text-gray-900 uppercase tracking-widest transition-colors">← Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function kayitOl() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                alert("Lütfen e-posta ve şifre alanlarını doldur!"); return;
            }

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                alert("Kayıt Hatası: " + error.message);
            } else {
                alert("Harika! Kayıt başarılı. Güvenlik için e-posta adresine bir onay linki gönderdik. Lütfen mailini (ve gerekiyorsa spam kutunu) kontrol et.");
            }
        }

        async function girisYap() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                alert("Lütfen e-posta ve şifre alanlarını doldur!"); return;
            }

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Giriş başarısız oldu. Bilgilerini kontrol et: " + error.message);
            } else {
                alert("Hoş geldin! Başarıyla giriş yapıldı.");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
