<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        
        <div class="bg-gray-900 p-8 text-center border-b-4 border-yellow-500">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-2">Klasik Takas Pazarı</p>
        </div>

        <div class="p-8 md:p-10">
            <h2 id="form-title" class="text-xl font-black text-gray-900 mb-6 text-center uppercase tracking-wide">Hesabınıza Giriş Yapın</h2>

            <div id="error-message" class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-sm mb-6 border border-red-100 text-center font-medium"></div>
            <div id="success-message" class="hidden bg-green-50 text-green-700 p-4 rounded-xl text-sm mb-6 border border-green-100 text-center font-medium"></div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="mb-5">
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">E-Posta Adresi</label>
                    <input type="email" id="email" required placeholder="ornek@eposta.com" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all text-sm font-medium text-gray-800">
                </div>
                
                <div class="mb-8">
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Şifre</label>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all text-sm font-medium text-gray-800">
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-yellow-500 text-gray-900 font-black py-4 rounded-xl uppercase tracking-widest hover:bg-yellow-400 hover:shadow-lg transition-all text-sm">Giriş Yap</button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500 font-medium">
                    <span id="toggle-text">Hesabınız yok mu?</span> 
                    <button onclick="toggleMode()" id="toggle-btn" class="text-yellow-600 hover:text-yellow-700 font-bold ml-1 transition-colors underline decoration-2 underline-offset-4">Yeni hesap oluşturun.</button>
                </p>
            </div>
        </div>
        
        <div class="bg-gray-50 p-4 border-t border-gray-100 text-center">
            <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-gray-800 uppercase tracking-widest transition-colors">← Vitrine Dön</a>
        </div>
    </div>

    <div class="mt-8 text-center">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">© 2026 Trakas Pazaryeri A.Ş. • Güvenli Bağlantı</p>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            
            document.getElementById('form-title').innerText = isLoginMode ? "Hesabınıza Giriş Yapın" : "Yeni Hesap Oluşturun";
            document.getElementById('submit-btn').innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('toggle-text').innerText = isLoginMode ? "Hesabınız yok mu?" : "Zaten hesabınız var mı?";
            document.getElementById('toggle-btn').innerText = isLoginMode ? "Yeni hesap oluşturun." : "Giriş yapın.";
            
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }

        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-message');
            const successBox = document.getElementById('success-message');
            const btn = document.getElementById('submit-btn');

            errorBox.classList.add('hidden');
            successBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerText = "İşlem yapılıyor...";
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                if (isLoginMode) {
                    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await _supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    successBox.innerText = "Hesabınız başarıyla oluşturuldu. Lütfen giriş yapınız.";
                    successBox.classList.remove('hidden');
                    
                    // Başarılı kayıttan sonra otomatik olarak Giriş moduna geçir
                    setTimeout(() => {
                        if(!isLoginMode) toggleMode();
                        document.getElementById('password').value = '';
                    }, 2500);
                }
            } catch (error) {
                // Supabase'den gelen hataları daha anlaşılır Türkçeye çevirme
                let hataMesaji = error.message;
                if(hataMesaji.includes('Invalid login credentials')) hataMesaji = "E-posta veya şifre hatalı.";
                if(hataMesaji.includes('User already registered')) hataMesaji = "Bu e-posta adresi sistemimizde zaten kayıtlı.";
                if(hataMesaji.includes('Password should be at least')) hataMesaji = "Şifreniz en az 6 karakter olmalıdır.";
                
                errorBox.innerText = hataMesaji;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
            }
        }
        
        // Kullanıcı zaten giriş yaptıysa otomatik olarak vitrine yönlendir
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
