<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profilim - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        
        <div class="hidden lg:flex items-center gap-6">
            <span id="user-name" class="text-yellow-500 font-bold text-xs uppercase tracking-widest cursor-pointer border-b-2 border-yellow-500 pb-1"></span>
            <a href="favorilerim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a>
            <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">İLANLARIM</a>
            <a href="sohbetler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">MESAJLARIM</a>
            <a href="teklifler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">TEKLİFLERİM</a>
            <span class="text-gray-700">|</span>
            <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest hover:text-red-400">ÇIKIŞ</button>
            <a href="ilan-ver.html" class="ml-2 bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-[11px] uppercase tracking-widest hover:bg-yellow-500 transition-colors">
                İLAN VER
            </a>
        </div>

        <div class="lg:hidden flex items-center gap-4">
            <a href="ilan-ver.html" class="bg-[#facc15] text-[#0f172a] px-4 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest">İLAN VER</a>
            <button onclick="cikisYap()" class="text-red-500 font-bold text-[10px] uppercase">ÇIKIŞ</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 w-full flex-grow mt-4 md:mt-8 mb-12">
        
        <div class="mb-8">
            <h1 class="text-3xl md:text-4xl font-black text-[#0f172a] italic tracking-tight uppercase mb-2 flex items-center gap-3">
                <svg class="w-8 h-8 text-[#facc15]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                HESABIM
            </h1>
            <p class="text-gray-500 font-medium text-sm">Kişisel bilgilerinizi ve hesap güvenliğinizi buradan yönetebilirsiniz.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 relative overflow-hidden">
                <div id="yukleniyor-bilgi" class="absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center">
                    <svg class="animate-spin h-8 w-8 text-[#0f172a] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>

                <h2 class="text-xl font-black text-gray-900 uppercase tracking-widest mb-6 border-b border-gray-100 pb-3">Kişisel Bilgiler</h2>
                
                <form onsubmit="bilgileriGuncelle(event)" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">E-POSTA ADRESİ (Değiştirilemez)</label>
                        <input type="email" id="email-alan" disabled class="w-full bg-gray-100 border border-gray-200 p-4 rounded-xl text-sm font-bold text-gray-500 cursor-not-allowed">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase tracking-widest mb-2">AD SOYAD</label>
                        <input type="text" id="ad-soyad" placeholder="Örn: Arda Yılmaz" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:border-[#facc15] focus:ring-1 focus:ring-[#facc15] text-sm font-bold text-gray-900 transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase tracking-widest mb-2">TELEFON NUMARASI</label>
                        <input type="tel" id="telefon" placeholder="Örn: 0555 123 45 67" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:border-[#facc15] focus:ring-1 focus:ring-[#facc15] text-sm font-bold text-gray-900 transition-all">
                    </div>

                    <button type="submit" id="btn-bilgi" class="w-full bg-[#0f172a] text-[#facc15] py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2">
                        BİLGİLERİ KAYDET
                    </button>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 h-fit">
                <h2 class="text-xl font-black text-gray-900 uppercase tracking-widest mb-6 border-b border-gray-100 pb-3 flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    Şifre Güvenliği
                </h2>
                
                <form onsubmit="sifreGuncelle(event)" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase tracking-widest mb-2">YENİ ŞİFRE</label>
                        <input type="password" id="yeni-sifre" required minlength="6" placeholder="En az 6 karakter" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:border-[#0f172a] focus:ring-1 focus:ring-[#0f172a] text-sm font-bold text-gray-900 transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase tracking-widest mb-2">YENİ ŞİFRE (TEKRAR)</label>
                        <input type="password" id="yeni-sifre-tekrar" required minlength="6" placeholder="Şifrenizi tekrar girin" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:border-[#0f172a] focus:ring-1 focus:ring-[#0f172a] text-sm font-bold text-gray-900 transition-all">
                    </div>

                    <button type="submit" id="btn-sifre" class="w-full bg-gray-100 text-gray-900 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-gray-200 transition-all flex justify-center items-center gap-2 border border-gray-200">
                        ŞİFREMİ GÜNCELLE
                    </button>
                </form>
            </div>

        </div>
    </main>

    <footer class="bg-[#0f172a] border-t-4 border-[#facc15] pt-12 pb-8 w-full mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col items-center justify-center">
            <h2 class="text-4xl font-black text-white italic tracking-tighter uppercase mb-2">TRAKAS</h2>
            <p class="text-gray-500 text-xs font-bold tracking-widest uppercase">Takas Pazaryeri Platformu</p>
        </div>
    </footer>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <button id="modal-btn-ana" onclick="modalKapat()" class="w-full bg-[#0f172a] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">Tamam</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let kullaniciMail = "";

        async function sitemiCalistir() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) { 
                    window.location.href = 'giris.html'; 
                    return; 
                }

                const user = session.user;
                kullaniciMail = user.email;
                
                // Sağ üstteki ismi güncelle (Eğer ad_soyad varsa onu yazdır, yoksa mailin başını)
                const meta = user.user_metadata || {};
                const gorunenIsim = meta.ad_soyad ? meta.ad_soyad.toUpperCase() : kullaniciMail.split('@')[0].toUpperCase();
                document.getElementById('user-name').innerText = gorunenIsim;

                // Formları doldur
                document.getElementById('email-alan').value = kullaniciMail;
                if(meta.ad_soyad) document.getElementById('ad-soyad').value = meta.ad_soyad;
                if(meta.telefon) document.getElementById('telefon').value = meta.telefon;

                // Yükleniyor ekranını kaldır
                document.getElementById('yukleniyor-bilgi').classList.add('hidden');

            } catch (error) {
                console.error("Başlatma hatası:", error);
                modalAc("Hata", "Bilgiler çekilirken bir sorun oluştu.", "hata");
            }
        }

        async function bilgileriGuncelle(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-bilgi');
            const orijinalIcerik = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-2 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> KAYDEDİLİYOR...`;

            const adSoyad = document.getElementById('ad-soyad').value.trim();
            const telefon = document.getElementById('telefon').value.trim();

            try {
                // Sadece Metadata (Meta Veri) güncelliyoruz, SQL'e gerek yok!
                const { data, error } = await _supabase.auth.updateUser({
                    data: { ad_soyad: adSoyad, telefon: telefon }
                });

                if (error) throw error;

                // İsmi sağ üstte hemen güncelle
                const gorunenIsim = adSoyad ? adSoyad.toUpperCase() : kullaniciMail.split('@')[0].toUpperCase();
                document.getElementById('user-name').innerText = gorunenIsim;

                modalAc("Başarılı", "Kişisel bilgileriniz hesabınıza başarıyla kaydedildi.", "basarili");

            } catch (err) {
                modalAc("Hata", "Bilgiler güncellenemedi: " + err.message, "hata");
            } finally {
                btn.disabled = false;
                btn.innerHTML = orijinalIcerik;
            }
        }

        async function sifreGuncelle(event) {
            event.preventDefault();
            
            const sifre1 = document.getElementById('yeni-sifre').value;
            const sifre2 = document.getElementById('yeni-sifre-tekrar').value;

            if(sifre1 !== sifre2) {
                modalAc("Hata", "Girdiğiniz şifreler birbiriyle uyuşmuyor. Lütfen kontrol edin.", "uyari");
                return;
            }

            const btn = document.getElementById('btn-sifre');
            const orijinalIcerik = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-2 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> GÜNCELLENİYOR...`;

            try {
                const { error } = await _supabase.auth.updateUser({
                    password: sifre1
                });

                if (error) throw error;

                document.getElementById('yeni-sifre').value = "";
                document.getElementById('yeni-sifre-tekrar').value = "";
                modalAc("Şifre Değişti", "Şifreniz başarıyla güncellendi. Bir sonraki girişinizde yeni şifrenizi kullanabilirsiniz.", "basarili");

            } catch (err) {
                modalAc("Hata", "Şifre güncellenirken bir sorun oluştu: " + err.message, "hata");
            } finally {
                btn.disabled = false;
                btn.innerHTML = orijinalIcerik;
            }
        }

        // --- MODAL FONKSİYONLARI ---
        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
            
            if(tip === 'basarili' && !onayFonk) setTimeout(modalKapat, 2500);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
            if(modalOnayFonk) { modalOnayFonk(); modalOnayFonk = null; }
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
