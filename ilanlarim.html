<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlanlarım - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <div class="flex gap-4 items-center">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest border-r border-gray-700 pr-3 hidden md:block"></span>
                <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors">← VİTRİNE DÖN</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-8">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-8 border-b-2 border-gray-100 pb-4">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 uppercase italic tracking-tight mb-1">İlanlarım 📦</h1>
                    <p class="text-gray-500 font-medium text-sm">Vitrine koyduğun tüm ürünleri buradan yönetebilirsin.</p>
                </div>
                <a href="ilan-ver.html" class="bg-yellow-500 px-4 py-2 rounded-lg font-black text-xs uppercase italic hover:bg-yellow-400 transition-all shadow-md">YENİ İLAN VER +</a>
            </div>

            <div id="benim-ilanlarim" class="space-y-4">
                <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">Vitrin taranıyor...</p>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";

        async function ilanlarimiGetir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }

            benimEmailim = session.user.email;
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

            const listeKutusu = document.getElementById('benim-ilanlarim');

            // Sadece BENİM maillime ait olan ilanları çek
            const { data, error } = await _supabase
                .from('ilanlar')
                .select('*')
                .eq('sahip_email', benimEmailim)
                .order('id', { ascending: false });

            if (error || !data || data.length === 0) {
                listeKutusu.innerHTML = `
                    <div class="text-center py-10">
                        <span class="text-6xl mb-4 block">👻</span>
                        <p class="text-gray-500 font-bold text-lg">Vitrininde hiç ürün yok.</p>
                        <p class="text-gray-400 text-sm mt-2">Takaslamak istediğin eşyaları yüklemeye başla!</p>
                    </div>`;
                return;
            }

            let htmlCikti = '';
            data.forEach(ilan => {
                
                let kapakResmi = "";
                if (ilan.resim_url) { kapakResmi = ilan.resim_url.split(',')[0]; }
                const resimHtml = kapakResmi ? `<img src="${kapakResmi}" class="w-full h-full object-cover">` : '<span class="text-3xl">📸</span>';
                
                const kategoriEtiketi = ilan.kategori ? ilan.kategori : 'Diğer';

                htmlCikti += `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4 hover:border-yellow-300 transition-colors group">
                    
                    <div class="flex items-center gap-4 w-full sm:w-auto">
                        <div class="w-16 h-16 bg-gray-200 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center cursor-pointer" onclick="window.location.href='detay.html?id=${ilan.id}'">
                            ${resimHtml}
                        </div>
                        
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-gray-200 text-gray-600 text-[9px] font-black uppercase px-2 py-0.5 rounded-md">${kategoriEtiketi}</span>
                                <span class="text-[10px] text-gray-400 font-bold">İlan #${ilan.id}</span>
                            </div>
                            <h3 class="font-black text-gray-900 uppercase text-sm cursor-pointer hover:text-yellow-600 transition-colors line-clamp-1" onclick="window.location.href='detay.html?id=${ilan.id}'">${ilan.baslik}</h3>
                            <p class="text-green-600 font-black text-sm">${ilan.deger} TL</p>
                        </div>
                    </div>

                    <div class="flex gap-2 w-full sm:w-auto justify-end mt-2 sm:mt-0">
                        <a href="detay.html?id=${ilan.id}" class="bg-white border border-gray-200 text-gray-600 hover:text-gray-900 font-bold text-[10px] uppercase px-4 py-2 rounded-lg transition-colors shadow-sm">İncele</a>
                        <button onclick="ilaniSil(${ilan.id}, '${ilan.baslik.replace(/'/g, "\\'")}')" class="bg-red-50 hover:bg-red-100 text-red-500 hover:text-red-700 font-bold text-[10px] uppercase px-4 py-2 rounded-lg transition-colors border border-red-100 shadow-sm flex items-center gap-1">
                            <span>SİL</span> 🗑️
                        </button>
                    </div>

                </div>`;
            });
            
            listeKutusu.innerHTML = htmlCikti;
        }

        // 🚨 İLAN SİLME FONKSİYONU 🚨
        async function ilaniSil(ilanId, ilanBaslik) {
            // Kullanıcıdan emin misin diye onay al
            if (confirm(`"${ilanBaslik}" başlıklı ilanı vitrinden KALICI OLARAK SİLMEK istediğine emin misin?`)) {
                
                // 1. Önce bu ilana ait tüm takas TEKLİFLERİNİ sil (Veritabanı hatası vermesin diye)
                await _supabase.from('teklifler').delete().eq('ilan_id', ilanId);
                
                // 2. Varsa bu ilana ait MESAJLARI sil
                await _supabase.from('mesajlar').delete().eq('ilan_id', ilanId);

                // 3. EN SON İLANI SİL
                const { error } = await _supabase.from('ilanlar').delete().eq('id', ilanId);

                if (error) {
                    alert("İlan silinirken bir hata oluştu: " + error.message);
                } else {
                    alert("🗑️ İlan başarıyla silindi!");
                    ilanlarimiGetir(); // Sayfayı yenilemeden listeyi güncelle
                }
            }
        }

        ilanlarimiGetir();
    </script>
</body>
</html>
