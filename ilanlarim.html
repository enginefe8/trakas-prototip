<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlanlarım - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#111827] px-6 py-4 flex justify-between items-center shadow-md">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        
        <div class="hidden lg:flex items-center gap-6">
            <span id="user-name" class="text-yellow-500 font-bold text-xs uppercase tracking-widest"></span>
            <a href="#" class="text-gray-300 font-bold text-xs uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a>
            <a href="ilanlarim.html" class="text-white font-black text-xs uppercase tracking-widest">İLANLARIM</a>
            <a href="sohbetler.html" class="text-gray-300 font-bold text-xs uppercase tracking-widest hover:text-white transition-colors">MESAJLARIM</a>
            <a href="teklifler.html" class="text-gray-300 font-bold text-xs uppercase tracking-widest hover:text-white transition-colors">TEKLİFLERİM</a>
            <button onclick="cikisYap()" class="text-red-400 font-bold text-xs uppercase tracking-widest hover:text-red-300 border-l border-gray-700 pl-6">ÇIKIŞ</button>
            <a href="ilan-ver.html" class="ml-2 bg-yellow-500 text-[#111827] px-5 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-yellow-400 transition-colors shadow-sm">
                İLAN VER
            </a>
        </div>

        <div class="lg:hidden flex items-center gap-4">
            <a href="ilan-ver.html" class="bg-yellow-500 text-[#111827] px-4 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest shadow-sm">İLAN VER</a>
            <button onclick="cikisYap()" class="text-red-400 font-bold text-[10px] uppercase">ÇIKIŞ</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 w-full flex-grow mt-2 md:mt-4 bg-white rounded-2xl shadow-sm border border-gray-200 mt-8 mb-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-100 pb-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-[#111827] italic tracking-tight uppercase mb-1">İLANLARIM</h1>
                <p class="text-gray-500 font-medium text-sm">Sisteme yüklediğiniz ilanları buradan yönetebilirsiniz.</p>
            </div>
            <a href="ilan-ver.html" class="bg-yellow-500 text-[#111827] px-6 py-3 rounded-lg font-black text-xs uppercase tracking-widest shadow-sm hover:bg-yellow-400 transition-colors flex items-center justify-center gap-2 flex-shrink-0">
                <span class="text-lg leading-none">+</span> YENİ İLAN
            </a>
        </div>

        <div id="dinamik-alan" class="flex-grow relative flex flex-col w-full min-h-[300px]">
            </div>
            
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-ikincil" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-900 font-black px-4 py-4 rounded-xl hover:bg-gray-200 transition-colors uppercase text-[10px] tracking-widest">VAZGEÇ</button>
                    <button id="modal-btn-ana" onclick="modalKapat()" class="flex-1 bg-[#111827] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">TAMAM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let tumIlanlarim = [];
        let silinecekIlanId = null;

        async function sitemiCalistir() {
            ekraniDurumaGoreCiz('yukleniyor');
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) { 
                    window.location.href = 'giris.html'; 
                    return; 
                }
                benimEmailim = session.user.email;
                document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

                await verileriCek();
                ekraniCiz();
            } catch (error) {
                console.error("Başlatma hatası:", error);
                ekraniDurumaGoreCiz('hata', error.message);
            }
        }

        async function verileriCek() {
            try {
                const { data: ilanlar, error } = await _supabase
                    .from('ilanlar')
                    .select('*')
                    .eq('sahip_email', benimEmailim)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                tumIlanlarim = ilanlar || [];
                
            } catch (err) {
                throw err;
            }
        }

        function ekraniDurumaGoreCiz(durum, ekstraMesaj = "") {
            const alan = document.getElementById('dinamik-alan');
            
            if (durum === 'yukleniyor') {
                alan.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 w-full h-full">
                        <svg class="animate-spin h-8 w-8 text-[#111827] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">İlanlarınız Çekiliyor...</span>
                    </div>`;
            } 
            else if (durum === 'bos') {
                alan.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center w-full h-full">
                        <div class="w-16 h-16 bg-gray-50 border border-gray-200 rounded-full flex items-center justify-center mb-4 shadow-sm">
                            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        </div>
                        <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest mb-4">HENÜZ HİÇ İLAN VERMEDİNİZ</p>
                    </div>`;
            }
            else if (durum === 'hata') {
                alan.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center w-full text-red-500">
                        <p class="font-bold uppercase tracking-widest text-xs mb-2">BİR HATA OLUŞTU</p>
                        <p class="text-sm text-gray-600">${ekstraMesaj}</p>
                        <button onclick="sitemiCalistir()" class="mt-4 bg-gray-900 text-white px-6 py-2 rounded-lg text-xs uppercase tracking-widest font-bold">Tekrar Dene</button>
                    </div>`;
            }
        }

        function ekraniCiz() {
            try {
                if(tumIlanlarim.length === 0) {
                    ekraniDurumaGoreCiz('bos');
                    return;
                }

                // YATAY LİSTE YAPISI (Görseldeki gibi)
                let htmlCikti = `<div class="flex flex-col gap-4 w-full">`;
                
                tumIlanlarim.forEach((ilan, index) => {
                    let ilkResim = "";
                    if(ilan.resim_url) ilkResim = ilan.resim_url.split(',')[0];
                    
                    // İlk karta sarı hover efekti (Görseldeki gibi active durumu)
                    const borderClass = index === 0 ? "border-yellow-400" : "border-gray-200 hover:border-yellow-400";

                    htmlCikti += `
                    <div class="bg-white border ${borderClass} rounded-2xl p-4 md:p-5 flex flex-col md:flex-row items-center gap-5 md:gap-8 transition-colors">
                        
                        <div class="w-full md:w-28 md:h-28 h-48 flex-shrink-0 bg-gray-50 rounded-xl overflow-hidden border border-gray-100 flex items-center justify-center cursor-pointer" onclick="window.location.href='detay.html?id=${ilan.id}'">
                            ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover">` : `<div class="flex flex-col items-center text-gray-300"><span class="text-[9px] font-black uppercase tracking-widest mt-1 text-gray-400">Görsel Yok</span></div>`}
                        </div>

                        <div class="flex-grow flex flex-col justify-center min-w-0 w-full text-left cursor-pointer" onclick="window.location.href='detay.html?id=${ilan.id}'">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">${ilan.kategori || 'DİĞER'}</span>
                            <h3 class="font-black text-gray-900 text-lg uppercase tracking-tight truncate mb-1">${ilan.baslik}</h3>
                            <span class="font-black text-gray-900 text-base">${ilan.deger} ₺</span>
                        </div>

                        <div class="flex items-center gap-3 w-full md:w-auto mt-2 md:mt-0 flex-shrink-0">
                            <button onclick="ilanDuzenle('${ilan.id}')" class="flex-1 md:flex-none border border-gray-300 text-gray-600 px-6 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-gray-50 flex items-center justify-center gap-2 transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                DÜZENLE
                            </button>
                            <button onclick="silmeOnayiIste('${ilan.id}')" class="flex-1 md:flex-none border border-red-200 text-red-500 px-6 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-red-50 flex items-center justify-center gap-2 transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                SİL
                            </button>
                        </div>

                    </div>`;
                });

                htmlCikti += `</div>`;
                document.getElementById('dinamik-alan').innerHTML = htmlCikti;

            } catch(e) {
                console.error("Çizim hatası:", e);
                ekraniDurumaGoreCiz('hata', e.message);
            }
        }

        // --- SİLME İŞLEMİ MANTIĞI ---
        function silmeOnayiIste(id) {
            silinecekIlanId = id;
            modalAc("İlanı Sil", "Bu ilanı silmek istediğinize emin misiniz? Bu işlem geri alınamaz ve ilana ait teklifler boşa düşer.", "uyari", true, gercektenSil);
        }

        async function gercektenSil() {
            if(!silinecekIlanId) return;
            ekraniDurumaGoreCiz('yukleniyor'); 
            try {
                const { error } = await _supabase.from('ilanlar').delete().eq('id', silinecekIlanId);
                if (error) throw error;
                tumIlanlarim = tumIlanlarim.filter(ilan => ilan.id != silinecekIlanId);
                silinecekIlanId = null;
                ekraniCiz();
                modalAc("Başarılı", "İlanınız sistemden kalıcı olarak silindi.", "basarili");
            } catch (err) {
                ekraniCiz(); 
                modalAc("Hata", "İlan silinirken bir sorun oluştu: " + err.message, "hata");
            }
        }

        function ilanDuzenle(id) {
            modalAc("Yakında", "İlan düzenleme özelliği yapım aşamasındadır.", "uyari");
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        // --- MODAL FONKSİYONLARI ---
        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, isIptal = false, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            
            const iptalBtn = document.getElementById('modal-btn-ikincil');
            const anaBtn = document.getElementById('modal-btn-ana');
            
            if(isIptal) {
                iptalBtn.classList.remove('hidden');
                iptalBtn.innerText = "VAZGEÇ";
                anaBtn.innerText = "EVET, SİL";
                anaBtn.className = "flex-1 bg-red-500 text-white font-black px-4 py-4 rounded-xl hover:bg-red-600 transition-colors uppercase text-[10px] tracking-widest shadow-md";
                anaBtn.onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            } else {
                iptalBtn.classList.add('hidden');
                anaBtn.innerText = "TAMAM";
                anaBtn.className = "w-full bg-[#111827] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md";
                anaBtn.onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            }

            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
            const iptalBtnGizliMi = document.getElementById('modal-btn-ikincil').classList.contains('hidden');
            if(modalOnayFonk && iptalBtnGizliMi) { modalOnayFonk = null; }
        }

        sitemiCalistir();
    </script>
</body>
</html>
