<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlan Düzenle - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div class="flex items-center gap-6">
            <span id="user-name" class="text-yellow-500 font-bold text-xs uppercase tracking-widest hidden md:block"></span>
            <a href="ilanlarim.html" class="text-white font-bold text-sm uppercase tracking-wider hover:text-gray-300 transition-colors flex items-center gap-2">
                <span>←</span> İLANLARIMA DÖN
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 w-full flex-grow flex items-start justify-center mt-4 md:mt-8 mb-12">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full p-8 md:p-12 relative overflow-hidden">
            
            <div id="yukleniyor" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-[#0f172a] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">İlan Bilgileri Getiriliyor...</span>
            </div>

            <div class="mb-8">
                <h1 class="text-3xl md:text-4xl font-black text-[#0f172a] italic tracking-tight uppercase mb-2">İLAN DÜZENLE</h1>
                <p class="text-gray-500 font-medium text-sm">İlan bilgilerini güncelleyebilirsiniz.</p>
                <div class="h-px bg-gray-100 w-full mt-6"></div>
            </div>

            <form id="ilan-formu" onsubmit="ilanGuncelle(event)" class="space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">İLAN BAŞLIĞI <span class="text-red-500">*</span></label>
                        <input type="text" id="baslik" required class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all text-gray-800">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">KATEGORİ <span class="text-red-500">*</span></label>
                        <select id="kategori" required class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all text-gray-800 appearance-none cursor-pointer">
                            <option value="Elektronik">Elektronik</option>
                            <option value="Giyim & Aksesuar">Giyim & Aksesuar</option>
                            <option value="Araç">Araç</option>
                            <option value="Ev & Yaşam">Ev & Yaşam</option>
                            <option value="Eğlence & Hobi">Eğlence & Hobi</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                </div>

                <div class="w-full md:w-1/2 md:pr-4">
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">TAHMİNİ DEĞER (TL) <span class="text-red-500">*</span></label>
                    <input type="number" id="deger" required class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all text-gray-800">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">ÜRÜN AÇIKLAMASI <span class="text-red-500">*</span></label>
                    <textarea id="aciklama" required rows="4" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all resize-none text-gray-800"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3 hover:text-gray-900 transition-colors cursor-pointer" for="resim_dosyalar">ÜRÜN GÖRSELLERİ <span class="text-red-500">*</span></label>
                    
                    <div class="relative w-full bg-white border-2 border-dashed border-gray-300 rounded-2xl p-6 transition-all hover:border-gray-400 hover:bg-gray-50 mb-6 cursor-pointer group">
                        <input type="file" id="resim_dosyalar" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="resimOnizleme(this)">
                        
                        <div class="flex flex-col items-center justify-center text-center pointer-events-none min-h-[80px]">
                            <svg class="w-8 h-8 text-gray-400 mb-2 group-hover:text-yellow-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            <p class="text-xs font-bold text-gray-500 uppercase tracking-widest group-hover:text-gray-700">Yeni Görsel Ekle (Sürükle veya Tıkla)</p>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Maksimum toplam 8 görsel</p>
                        </div>
                    </div>

                    <div id="resim-grid-alani" class="grid grid-cols-2 md:grid-cols-4 gap-4 hidden"></div>
                </div>

                <div class="pt-6 border-t border-gray-100">
                    <button type="submit" id="submit-btn" class="w-full md:w-auto md:px-12 bg-[#0f172a] text-[#facc15] py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-black hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2">
                        DEĞİŞİKLİKLERİ KAYDET
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-[#0f172a] border-t-4 border-[#facc15] pt-12 pb-8 w-full mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col items-center justify-center">
            <h2 class="text-4xl font-black text-white italic tracking-tighter uppercase mb-2">TRAKAS</h2>
            <p class="text-gray-500 text-xs font-bold tracking-widest uppercase">Takas Pazaryeri Platformu</p>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const ilanId = urlParams.get('id');

        let benimEmailim = "";
        let mevcutResimler = []; 
        let yeniSecilenDosyalar = []; 

        async function sayfaYukle() {
            if (!ilanId) { window.location.href = 'ilanlarim.html'; return; }

            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

            const { data: ilanVerisi, error } = await _supabase.from('ilanlar').select('*').eq('id', ilanId).single();
            
            if (error || !ilanVerisi) {
                alert("İlan bulunamadı!");
                window.location.href = 'ilanlarim.html';
                return;
            }

            if(ilanVerisi.sahip_email !== benimEmailim) {
                alert("Bu ilanı düzenleme yetkiniz yok!");
                window.location.href = 'ilanlarim.html';
                return;
            }

            document.getElementById('baslik').value = ilanVerisi.baslik;
            document.getElementById('kategori').value = ilanVerisi.kategori;
            document.getElementById('deger').value = ilanVerisi.deger;
            document.getElementById('aciklama').value = ilanVerisi.aciklama;

            if(ilanVerisi.resim_url && ilanVerisi.resim_url.trim() !== "") {
                mevcutResimler = ilanVerisi.resim_url.split(',').map(url => url.trim()).filter(url => url !== "");
            }

            renderPreviews();
            document.getElementById('yukleniyor').classList.add('hidden');
        }

        function resimOnizleme(input) {
            if (input.files) {
                const newFiles = Array.from(input.files);
                const toplamResim = mevcutResimler.length + yeniSecilenDosyalar.length + newFiles.length;
                
                if(toplamResim > 8) {
                    alert("Sınır Aşıldı: Maksimum 8 resim yükleyebilirsiniz.");
                    input.value = "";
                    return;
                }
                
                yeniSecilenDosyalar = [...yeniSecilenDosyalar, ...newFiles];
                input.value = ""; 
                renderPreviews();
            }
        }

        function eskiResimSil(index) {
            mevcutResimler.splice(index, 1);
            renderPreviews();
        }

        function yeniResimSil(index) {
            yeniSecilenDosyalar.splice(index, 1);
            renderPreviews();
        }

        function renderPreviews() {
            const grid = document.getElementById('resim-grid-alani');
            grid.innerHTML = "";
            
            const toplamResimSayisi = mevcutResimler.length + yeniSecilenDosyalar.length;

            if(toplamResimSayisi === 0) {
                grid.classList.add('hidden');
                return;
            } else {
                grid.classList.remove('hidden');
            }

            // MEVCUT RESİMLER: YAZI YOK SADECE ÇARPI İKONU
            mevcutResimler.forEach((url, index) => {
                grid.insertAdjacentHTML('beforeend', `
                    <div class="relative group aspect-square bg-gray-50 border border-gray-100 rounded-xl overflow-hidden shadow-inner transition-all hover:border-gray-200">
                        <img src="${url}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-start justify-end p-2 z-20">
                            <button type="button" onclick="eskiResimSil(${index})" class="bg-white/90 backdrop-blur-sm text-red-500 w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shadow-md hover:bg-red-500 hover:text-white transition-colors transform scale-90 group-hover:scale-100" title="Resmi Sil">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                `);
            });

            // YENİ SEÇİLEN RESİMLER
            yeniSecilenDosyalar.forEach((dosya, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="relative group aspect-square bg-yellow-50 border border-yellow-300 rounded-xl overflow-hidden shadow-sm transition-all hover:border-yellow-400">
                            <img src="${e.target.result}" class="w-full h-full object-cover opacity-90 transition-transform duration-300 group-hover:scale-105">
                            
                            <div class="absolute bottom-2 left-2 pointer-events-none z-10">
                                <span class="bg-yellow-400 text-[#0f172a] text-[9px] font-black uppercase px-2 py-1 rounded shadow-sm">YENİ</span>
                            </div>

                            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-start justify-end p-2 z-20">
                                <button type="button" onclick="yeniResimSil(${index})" class="bg-white/90 backdrop-blur-sm text-red-500 w-8 h-8 rounded-full flex items-center justify-center font-black text-sm shadow-md hover:bg-red-500 hover:text-white transition-colors transform scale-90 group-hover:scale-100" title="Resmi Sil">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>
                        </div>
                    `);
                }
                reader.readAsDataURL(dosya);
            });
        }

        async function ilanGuncelle(event) {
            event.preventDefault();
            
            const toplamResim = mevcutResimler.length + yeniSecilenDosyalar.length;
            if(toplamResim === 0) {
                alert("Lütfen ilanınızda en az bir görsel bırakın.");
                return;
            }

            const btn = document.getElementById('submit-btn');
            
            try {
                // BUTONU KİLİTLE
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed', 'opacity-90');
                
                const baslik = document.getElementById('baslik').value.trim();
                const aciklama = document.getElementById('aciklama').value.trim();
                const kategori = document.getElementById('kategori').value;
                const deger = Number(document.getElementById('deger').value);
                
                let finalResimDizisi = [...mevcutResimler]; 
                const storageBucket = _supabase.storage.from('ilan-resimleri');

                if(yeniSecilenDosyalar.length > 0) {
                    let sayac = 1;
                    for(const dosya of yeniSecilenDosyalar) {
                        btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-[#facc15] mr-2 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> GÖRSELLER YÜKLENİYOR (${sayac}/${yeniSecilenDosyalar.length})...`;
                        
                        const dosyaAdi = `img_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
                        const { error: uploadError } = await storageBucket.upload(dosyaAdi, dosya);
                        
                        if (uploadError) throw new Error(`Resim yüklenemedi: ${uploadError.message}`);

                        const { data: urlData } = storageBucket.getPublicUrl(dosyaAdi);
                        finalResimDizisi.push(urlData.publicUrl); 
                        sayac++;
                    }
                }

                btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-[#facc15] mr-2 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> VERİTABANI GÜNCELLENİYOR...`;
                const finalResimMetni = finalResimDizisi.join(',');

                // NÜKLEER ÇÖZÜM: .select() KALDIRILDI! ARTIK KİLİTLENEMEZ!
                const { error: dbError } = await _supabase
                    .from('ilanlar')
                    .update({ baslik, aciklama, kategori, deger, resim_url: finalResimMetni })
                    .eq('id', ilanId);

                if (dbError) throw new Error(dbError.message);

                // İŞLEM BİTTİ, BEKLEMEDEN ŞAK DİYE VİTRİNE GİT!
                btn.innerHTML = `✅ BAŞARILI! YÖNLENDİRİLİYOR...`;
                window.location.href = `detay.html?id=${ilanId}&v=${Date.now()}`; 
                
            } catch (err) {
                // HATAYI GİZLEMEDEN KULLANICIYA GÖSTER (ZORUNLU ALERT)
                console.error(err);
                alert("GÜNCELLEME BAŞARISIZ OLDU!\n\nHata Detayı: " + (err.message || "Bilinmeyen bir hata."));
                
            } finally {
                // NE OLURSA OLSUN BUTONUN KİLİDİNİ AÇ!
                btn.disabled = false;
                btn.classList.remove('cursor-not-allowed', 'opacity-90');
                btn.innerHTML = "DEĞİŞİKLİKLERİ KAYDET";
            }
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sayfaYukle();
    </script>
</body>
</html>
