<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trakas - Klasik Takas Pazarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter italic">TRAKAS</h1>
            <div class="flex-grow mx-8 hidden md:block">
                <input type="text" placeholder="Ürün, marka veya takas tercihi ara..." class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-yellow-500 text-sm">
            </div>
            
            <div class="flex gap-4 items-center">
                <a href="giris.html" id="btn-giris" class="text-white font-bold text-sm hover:text-yellow-500 transition-colors">Giriş Yap</a>
                
                <div id="user-panel" style="display: none;" class="items-center gap-3">
                    <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest border-r border-gray-700 pr-3 font-mono"></span>
                    <button onclick="cikisYap()" class="text-red-400 font-bold text-sm hover:text-red-300 transition-colors uppercase tracking-widest">Çıkış Yap</button>
                </div>
                
                <a href="ilan-ver.html" class="bg-yellow-500 px-6 py-2 rounded-lg font-black text-sm hover:bg-yellow-400 transition-all uppercase flex items-center justify-center">İLAN VER +</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-6 p-6">
        
        <aside class="w-full md:w-64 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-black text-gray-800 mb-4 border-b pb-2 uppercase text-xs tracking-widest">Kategoriler</h3>
                <div class="space-y-2 text-sm text-gray-600">
                    <p class="text-yellow-600 font-bold bg-yellow-50 p-2 rounded-lg italic">📱 Elektronik (142)</p>
                    <p class="p-2 hover:bg-gray-50 rounded-lg cursor-pointer">🚗 Vasıta (85)</p>
                    <p class="p-2 hover:bg-gray-50 rounded-lg cursor-pointer">🏠 Emlak (32)</p>
                    <p class="p-2 hover:bg-gray-50 rounded-lg cursor-pointer">👕 Moda (120)</p>
                </div>

                <h3 class="font-black text-gray-800 mt-8 mb-4 border-b pb-2 uppercase text-xs tracking-widest italic">Hüzünlü Veda Modu</h3>
                <div class="p-3 bg-orange-50 rounded-xl border border-orange-100">
                    <p class="text-[10px] text-orange-800 font-bold italic">Arabanı teslim ederken dinlemelik şarkı tavsiyesi aktiftir. 🎧</p>
                </div>
            </div>
        </aside>

        <main class="flex-grow">
            <div id="ilan-vitrini" class="flex flex-col gap-4 mb-8">
                <p class="text-center text-gray-400 italic py-10">İlanlar veritabanından çekiliyor...</p>
            </div>
            <p class="text-center text-gray-300 text-[10px] py-10 uppercase tracking-[0.3em] font-black">Trakas v1.0 - Engin & Arda Ortaklığı</p>
        </main>

    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function oturumKontrol() {
            const { data: { session } } = await _supabase.auth.getSession();
            const btnGiris = document.getElementById('btn-giris');
            const userPanel = document.getElementById('user-panel');
            const userName = document.getElementById('user-name');

            if (session) {
                btnGiris.style.display = 'none';
                userPanel.style.display = 'flex';
                userName.innerText = session.user.email.split('@')[0].toUpperCase();
            } else {
                btnGiris.style.display = 'block';
                userPanel.style.display = 'none';
            }
        }

        async function cikisYap() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        async function ilanlariGetir() {
            const { data, error } = await _supabase.from('ilanlar').select('*').order('id', { ascending: false });
            const vitrin = document.getElementById('ilan-vitrini');
            
            if (error) {
                vitrin.innerHTML = '<p class="text-center text-red-400">Veri çekme hatası!</p>';
                return;
            }
            
            vitrin.innerHTML = ''; 
            if (data.length === 0) {
                vitrin.innerHTML = '<p class="text-center text-gray-400">Henüz ilan yok.</p>';
                return;
            }

            data.forEach(ilan => {
                const resim = ilan.resim_url ? `<img src="${ilan.resim_url}" class="w-full h-full object-cover group-hover:scale-105 transition-all">` : '📸';
                vitrin.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col md:flex-row gap-6 hover:shadow-lg transition-all group">
                    <div class="w-full md:w-48 h-48 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center">${resim}</div>
                    <div class="flex
