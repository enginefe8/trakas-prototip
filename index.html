<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trakas - Klasik Takas Pazarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-3 md:p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-2">
            
            <h1 class="text-2xl md:text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors cursor-pointer" onclick="kategoriSec('')">TRAKAS</h1>
            
            <div class="flex-grow mx-8 hidden md:block relative">
                <input type="text" id="arama-desktop" autocomplete="off" onkeyup="canliArama(this.value)" onfocus="canliArama(this.value)" onblur="setTimeout(() => document.getElementById('oneri-kutusu').style.display='none', 200)" placeholder="Ürün, marka veya takas tercihi ara..." class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 text-white text-sm focus:border-yellow-500 outline-none transition-colors">
                
                <div id="oneri-kutusu" style="display: none;" class="absolute w-full bg-white border border-gray-200 shadow-2xl rounded-b-lg mt-1 z-50 max-h-60 overflow-y-auto"></div>
            </div>
            
            <div class="flex gap-2 md:gap-4 items-center">
                <a href="giris.html" id="btn-giris" class="text-white font-bold text-xs md:text-sm hover:text-yellow-500 transition-colors whitespace-nowrap">Giriş Yap</a>
                
                <div id="user-panel" style="display: none;" class="items-center gap-1 md:gap-2 border-r border-gray-700 pr-2 md:pr-3">
                    <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest hidden sm:block mr-2"></span>
                    
                    <a href="ilanlarim.html" class="text-white font-bold text-[10px] md:text-xs uppercase hover:text-yellow-500 transition-colors bg-gray-800 px-2 py-1.5 md:px-3 rounded-lg border border-gray-700 shadow-sm flex items-center">
                        <span class="hidden sm:inline mr-1">İlanlarım</span> 📦
                    </a>

                    <a href="sohbetler.html" class="text-white font-bold text-[10px] md:text-xs uppercase hover:text-yellow-500 transition-colors bg-gray-800 px-2 py-1.5 md:px-3 rounded-lg border border-gray-700 shadow-sm flex items-center">
                        <span class="hidden sm:inline mr-1">Mesajlarım</span> 💬
                    </a>

                    <a href="teklifler.html" class="text-white font-bold text-[10px] md:text-xs uppercase hover:text-yellow-500 transition-colors bg-gray-800 px-2 py-1.5 md:px-3 rounded-lg border border-gray-700 shadow-sm flex items-center">
                        <span class="hidden sm:inline mr-1">Tekliflerim</span> 🤝
                    </a>
                    
                    <button onclick="cikisYap()" class="text-red-400 font-bold text-[10px] uppercase ml-1 md:ml-2 hover:text-red-300 transition-colors">Çıkış</button>
                </div>
                
                <a href="ilan-ver.html" class="bg-yellow-500 px-3 py-1.5 md:px-6 md:py-2 rounded-lg font-black text-[10px] md:text-sm hover:bg-yellow-400 uppercase transition-all shadow-md whitespace-nowrap">İLAN VER +</a>
            </div>
        </div>

        <div class="mt-3 block md:hidden w-full relative">
            <input type="text" id="arama-mobil" onkeyup="canliArama(this.value)" placeholder="Takaslık ne arıyorsun?" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 text-white text-xs focus:border-yellow-500 outline-none">
        </div>
    </nav>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-6 p-6">
        <aside class="w-full md:w-64 space-y-6 flex-shrink-0">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-black text-gray-800 mb-4 border-b pb-2 uppercase text-xs tracking-widest text-center">Kategoriler</h3>
                <div class="space-y-2 text-sm text-gray-600 font-medium" id="kategori-listesi">
                    <p onclick="kategoriSec('')" id="kat-Tumu" class="kategori-btn text-yellow-600 font-bold bg-yellow-50 p-2 rounded-lg cursor-pointer transition-colors italic">🌟 Tüm İlanlar</p>
                    <p onclick="kategoriSec('Elektronik')" id="kat-Elektronik" class="kategori-btn p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">📱 Elektronik</p>
                    <p onclick="kategoriSec('Vasıta')" id="kat-Vasıta" class="kategori-btn p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">🚗 Vasıta</p>
                    <p onclick="kategoriSec('Emlak')" id="kat-Emlak" class="kategori-btn p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">🏠 Emlak</p>
                    <p onclick="kategoriSec('Moda')" id="kat-Moda" class="kategori-btn p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">👕 Moda</p>
                    <p onclick="kategoriSec('Diğer')" id="kat-Diğer" class="kategori-btn p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">📦 Diğer</p>
                </div>
            </div>
        </aside>

        <main class="flex-grow">
            <div id="sonuc-ozeti" class="hidden mb-4 text-sm font-bold text-gray-500 uppercase tracking-widest border-b border-gray-200 pb-2"></div>
            
            <div id="ilan-vitrini" class="flex flex-col gap-4 mb-8">
                <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">Motor çalıştırılıyor...</p>
            </div>
        </main>
    </div>

    <script>
        window.onerror = function(msg) {
            document.getElementById('ilan-vitrini').innerHTML = `<div class="bg-red-100 p-6 rounded-lg"><p class="text-red-600 font-mono text-sm">Hata: ${msg}</p></div>`; return true;
        };

        const vitrin = document.getElementById('ilan-vitrini');
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let tumIlanlar = [];
        let seciliKategori = "";
        let benimFavorilerim = []; 

        window.aramaMetniTemizle = function(metin) {
            if (!metin) return "";
            return metin.replace(/İ/g, 'i').replace(/I/g, 'i').replace(/ı/g, 'i').toLowerCase().trim();
        };

        async function sitemiCalistir() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    document.getElementById('btn-giris').style.display = 'none';
                    document.getElementById('user-panel').style.display = 'flex';
                    document.getElementById('user-name').innerText = session.user.email.split('@')[0].toUpperCase();
                    
                    const { data: favData } = await _supabase.from('favoriler').select('ilan_id').eq('kullanici_email', session.user.email);
                    if (favData) {
                        benimFavorilerim = favData.map(f => f.ilan_id);
                    }
                }
            } catch (e) {}

            try {
                const { data, error } = await _supabase.from('ilanlar').select('*').order('id', { ascending: false });
                if (error) throw error;
                tumIlanlar = data || [];
                ilanlariFiltrele();
            } catch (err) {
                vitrin.innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-center"><p class="text-red-500 font-mono text-sm">${err.message}</p></div>`;
            }
        }

        window.kategoriSec = function(kategoriAdi) {
            seciliKategori = kategoriAdi;
            document.querySelectorAll('.kategori-btn').forEach(btn => {
                btn.className = "kategori-btn p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors text-sm font-medium text-gray-600";
            });
            const seciliBtnId = kategoriAdi === "" ? "kat-Tumu" : "kat-" + kategoriAdi;
            const seciliBtn = document.getElementById(seciliBtnId);
            if (seciliBtn) {
                seciliBtn.className = "kategori-btn text-yellow-600 font-bold bg-yellow-50 p-2 rounded-lg cursor-pointer transition-colors italic text-sm";
            }
            ilanlariFiltrele();
        }

        window.canliArama = function(metin) {
            document.getElementById('arama-mobil').value = metin;
            document.getElementById('arama-desktop').value = metin;
            
            const arananTemiz = aramaMetniTemizle(metin);
            const oneriKutusu = document.getElementById('oneri-kutusu');

            ilanlariFiltrele();

            if (arananTemiz.length === 0) {
                oneriKutusu.style.display = 'none';
                return;
            }

            let oneriler = new Set();
            tumIlanlar.forEach(ilan => {
                const baslikOrjinal = ilan.baslik;
                const baslikTemiz = aramaMetniTemizle(baslikOrjinal);
                
                if (baslikTemiz.includes(arananTemiz)) {
                    baslikOrjinal.split(/\s+/).forEach(kelime => {
                        if (aramaMetniTemizle(kelime).includes(arananTemiz)) {
                            oneriler.add(kelime.toLowerCase());
                        }
                    });
                    oneriler.add(baslikOrjinal.toLowerCase()); 
                }
            });

            const oneriListesi = Array.from(oneriler).slice(0, 6);
            
            if (oneriListesi.length > 0) {
                let html = '';
                oneriListesi.forEach(oneri => {
                    html += `<div onclick="oneriTikla('${oneri}')" class="px-4 py-2.5 text-sm font-semibold text-blue-700 hover:bg-gray-100 cursor-pointer border-b border-gray-100 last:border-0">${oneri}</div>`;
                });
                oneriKutusu.innerHTML = html;
                oneriKutusu.style.display = 'block';
            } else {
                oneriKutusu.style.display = 'none';
            }
        }

        window.oneriTikla = function(secilenKelime) {
            document.getElementById('arama-desktop').value = secilenKelime;
            document.getElementById('arama-mobil').value = secilenKelime;
            document.getElementById('oneri-kutusu').style.display = 'none';
            ilanlariFiltrele();
        }

        window.ilanlariFiltrele = function() {
            const masaustuArama = document.getElementById('arama-desktop').value;
            const mobilArama = document.getElementById('arama-mobil').value;
            const aramaMetni = aramaMetniTemizle(masaustuArama || mobilArama);

            let filtrelenmisListe = tumIlanlar;

            if (seciliKategori !== "") {
                filtrelenmisListe = filtrelenmisListe.filter(ilan => ilan.kategori === seciliKategori);
            }

            if (aramaMetni !== "") {
                filtrelenmisListe = filtrelenmisListe.filter(ilan => 
                    aramaMetniTemizle(ilan.baslik).includes(aramaMetni) || 
                    aramaMetniTemizle(ilan.aciklama).includes(aramaMetni)
                );
            }

            const ozetYeri = document.getElementById('sonuc-ozeti');
            if (seciliKategori !== "" || aramaMetni !== "") {
                ozetYeri.style.display = "block";
                ozetYeri.innerText = `🔍 ${filtrelenmisListe.length} İLAN BULUNDU`;
            } else {
                ozetYeri.style.display = "none";
            }

            vitrineBas(filtrelenmisListe);
        }

        window.favoriDegistir = async function(event, ilanId) {
            event.stopPropagation();

            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { 
                alert("Favorilere eklemek için önce giriş yapmalısın!"); 
                window.location.href = 'giris.html'; 
                return; 
            }

            const email = session.user.email;
            const kalpButonu = document.getElementById(`fav-btn-${ilanId}`);
            
            if (benimFavorilerim.includes(ilanId)) {
                kalpButonu.innerText = '🤍'; 
                kalpButonu.classList.remove('scale-125'); 
                benimFavorilerim = benimFavorilerim.filter(id => id !== ilanId); 
                await _supabase.from('favoriler').delete().eq('ilan_id', ilanId).eq('kullanici_email', email); 
            } else {
                kalpButonu.innerText = '❤️'; 
                kalpButonu.classList.add('scale-125'); 
                benimFavorilerim.push(ilanId); 
                await _supabase.from('favoriler').insert([{ ilan_id: ilanId, kullanici_email: email }]); 
            }
        }

        function vitrineBas(gosterilecekData) {
            if (gosterilecekData.length === 0) { 
                vitrin.innerHTML = `<div class="text-center py-16 bg-white rounded-3xl border border-gray-100 shadow-sm"><span class="text-6xl mb-4 block">🏜️</span><p class="text-gray-500 font-bold text-lg">Aradığın kriterlere uygun ilan bulunamadı.</p><button onclick="kategoriSec(''); document.getElementById('arama-desktop').value=''; document.getElementById('arama-mobil').value=''; document.getElementById('oneri-kutusu').style.display='none'; ilanlariFiltrele();" class="mt-4 text-yellow-600 font-black text-sm uppercase hover:underline">Filtreleri Temizle</button></div>`; 
                return; 
            }

            let htmlBirlestirici = '';
            gosterilecekData.forEach(ilan => {
                let kapakResmi = "";
                if (ilan.resim_url) { kapakResmi = ilan.resim_url.split(',')[0]; }
                const resimHtml = kapakResmi ? `<img src="${kapakResmi}" class="w-full h-full object-cover">` : '<span class="text-4xl">📸</span>';
                const kategoriEtiketi = ilan.kategori ? ilan.kategori : 'Diğer';

                const kalpteMi = benimFavorilerim.includes(ilan.id);
                const kalpSimgesi = kalpteMi ? '❤️' : '🤍';
                const kalpBuyumesi = kalpteMi ? 'scale-125' : ''; 

                htmlBirlestirici += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col md:flex-row gap-6 hover:shadow-lg transition-all">
                    
                    <div class="w-full md:w-48 h-48 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center cursor-pointer relative group" onclick="window.location.href='detay.html?id=${ilan.id}'">
                        ${resimHtml}
                        
                        <button onclick="favoriDegistir(event, ${ilan.id})" id="fav-btn-${ilan.id}" class="absolute top-2 right-2 bg-black/30 backdrop-blur-md text-lg p-2 rounded-full hover:bg-black/50 hover:scale-110 transition-all shadow-sm ${kalpBuyumesi}">
                            ${kalpSimgesi}
                        </button>
                    </div>

                    <div class="flex-grow flex flex-col justify-between">
                        <div>
                            <div class="mb-2">
                                <span onclick="kategoriSec('${kategoriEtiketi}')" class="bg-gray-200 text-gray-600 hover:bg-yellow-100 hover:text-yellow-800 cursor-pointer transition-colors text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-md inline-block">${kategoriEtiketi}</span>
                            </div>
                            <div class="flex justify-between items-start">
                                <h2 class="text-xl font-bold uppercase italic text-gray-800 cursor-pointer hover:text-yellow-600 transition-colors" onclick="window.location.href='detay.html?id=${ilan.id}'">${ilan.baslik}</h2>
                                <span class="text-green-600 font-black text-sm whitespace-nowrap">${ilan.deger} TL</span>
                            </div>
                            <div class="mt-4 bg-gray-50 p-3 rounded-xl border-l-4 border-yellow-500 text-sm italic font-semibold text-gray-700">${ilan.aciklama}</div>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <a href="detay.html?id=${ilan.id}" class="flex-grow bg-gray-900 text-white py-2.5 rounded-lg font-bold text-xs md:text-sm uppercase flex items-center justify-center hover:bg-gray-800 transition-colors">Detayları Gör</a>
                            <button onclick="teklifVer(${ilan.id})" class="bg-yellow-500 px-4 md:px-8 py-2.5 rounded-lg font-black text-xs md:text-sm uppercase italic hover:bg-yellow-400 transition-all">TEKLİF VER 🤝</button>
                        </div>
                    </div>
                </div>`;
            });
            vitrin.innerHTML = htmlBirlestirici;
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.reload(); }

        async function teklifVer(id) {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { alert("Önce giriş yap!"); window.location.href = 'giris.html'; return; }
            const { data: mevcutTeklif } = await _supabase.from('teklifler').select('id').eq('ilan_id', id).eq('teklif_veren_email', session.user.email);
            if (mevcutTeklif && mevcutTeklif.length > 0) { alert("⚠️ Dur bakalım! Bu ilana zaten bir teklif gönderdin."); return; }
            if (confirm("Bu ilan için takas teklifi göndermek istiyor musun?")) {
                const { error } = await _supabase.from('teklifler').insert([{ ilan_id: id, teklif_veren_email: session.user.email }]);
                alert(error ? "Hata: " + error.message : "🤝 Teklif başarıyla iletildi!");
            }
        }

        sitemiCalistir();
    </script>
</body>
</html>
