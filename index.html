<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trakas - Klasik Takas Pazarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter italic">TRAKAS</h1>
            <div class="flex-grow mx-8 hidden md:block text-center text-gray-400 text-xs tracking-widest uppercase">
                Takas Dünyasına Hoş Geldin
            </div>
            <div class="flex gap-4 items-center">
                <a href="giris.html" id="btn-giris" class="text-white font-bold text-sm hover:text-yellow-500 transition-colors">Giriş Yap</a>
                <div id="user-panel" style="display: none;" class="items-center gap-3 border-r border-gray-700 pr-3">
                    <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest"></span>
                    <button onclick="cikisYap()" class="text-red-400 font-bold text-[10px] uppercase ml-2 hover:text-red-300 transition-colors">Çıkış</button>
                </div>
                <a href="ilan-ver.html" class="bg-yellow-500 px-6 py-2 rounded-lg font-black text-sm hover:bg-yellow-400 uppercase transition-all shadow-md shadow-yellow-900/20">İLAN VER +</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-6 p-6">
        <aside class="w-full md:w-64 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-black text-gray-800 mb-4 border-b pb-2 uppercase text-xs tracking-widest text-center">Kategoriler</h3>
                <div class="space-y-2 text-sm text-gray-600 font-medium">
                    <p class="text-yellow-600 font-bold bg-yellow-50 p-2 rounded-lg italic">📱 Elektronik (142)</p>
                    <p class="p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">🚗 Vasıta (85)</p>
                    <p class="p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">🏠 Emlak (32)</p>
                    <p class="p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition-colors">👕 Moda (120)</p>
                </div>
                <h3 class="font-black text-gray-800 mt-8 mb-4 border-b pb-2 uppercase text-xs italic text-center">Hüzünlü Veda</h3>
                <div class="p-3 bg-orange-50 rounded-xl border border-orange-100 italic text-[10px] text-orange-800 font-bold text-center leading-relaxed">
                    Arabanı teslim ederken dinlemelik şarkı tavsiyesi aktiftir. 🎧
                </div>
            </div>
        </aside>

        <main class="flex-grow">
            <div id="ilan-vitrini" class="flex flex-col gap-4 mb-8">
                <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">İlanlar yükleniyor...</p>
            </div>
            <p class="text-center text-gray-300 text-[10px] py-10 uppercase tracking-[0.4em] font-black">Trakas v1.0 - Engin & Arda Ortaklığı</p>
        </main>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function sitemiCalistir() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    document.getElementById('btn-giris').style.display = 'none';
                    document.getElementById('user-panel').style.display = 'flex';
                    document.getElementById('user-name').innerText = session.user.email.split('@')[0].toUpperCase();
                }
            } catch (e) { console.log("Oturum hatası"); }

            try {
                const { data, error } = await _supabase.from('ilanlar').select('*').order('id', { ascending: false });
                const vitrin = document.getElementById('ilan-vitrini');
                
                if (error) throw error;
                
                vitrin.innerHTML = ''; 
                if (!data || data.length === 0) {
                    vitrin.innerHTML = '<p class="text-center text-gray-400 py-10">Henüz hiç ilan verilmemiş.</p>';
                    return;
                }

                data.forEach(ilan => {
                    const resimHtml = ilan.resim_url ? `<img src="${ilan.resim_url}" class="w-full h-full object-cover">` : '<span class="text-4xl">📸</span>';
                    vitrin.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col md:flex-row gap-6 hover:shadow-lg transition-all">
                        <div class="w-full md:w-48 h-48 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center">${resimHtml}</div>
                        <div class="flex-grow flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start">
                                    <h2 class="text-xl font-bold uppercase italic text-gray-800 tracking-tight">${ilan.baslik}</h2>
                                    <span class="text-green-600 font-black text-sm whitespace-nowrap">${ilan.deger} TL</span>
                                </div>
                                <div class="mt-4 bg-gray-50 p-3 rounded-xl border-l-4 border-yellow-500 text-sm italic font-semibold text-gray-700">
                                    <span class="text-[10px] font-black text-yellow-700 block uppercase mb-1 not-italic">Takas Tercihi:</span>
                                    ${ilan.aciklama}
                                </div>
                            </div>
                            
                            <div class="flex gap-2 mt-4">
                                <a href="detay.html?id=${ilan.id}" class="flex-grow bg-gray-900 text-white py-2.5 rounded-lg font-bold text-sm uppercase flex items-center justify-center hover:bg-gray-800 transition-colors shadow-md">Detayları Gör</a>
                                <button onclick="teklifVer(${ilan.id}, '${ilan.baslik}')" class="bg-yellow-500 px-8 py-2.5 rounded-lg font-black text-sm uppercase italic hover:bg-yellow-400 transition-all shadow-md shadow-yellow-100">TEKLİF VER 🤝</button>
                            </div>
                        </div>
                    </div>`;
                });
            } catch (e) {
                document.getElementById('ilan-vitrini').innerHTML = '<p class="text-center text-red-500 font-bold py-10">İlanlar şu an yüklenemiyor.</p>';
            }
        }

        async function cikisYap() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        async function teklifVer(id, baslik) {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { alert("Lütfen giriş yap!"); window.location.href = 'giris.html'; return; }
            if (confirm(baslik + " ilanı için takas teklifi gitsin mi?")) {
                const { error } = await _supabase.from('teklifler').insert([{ ilan_id: id, teklif_veren_email: session.user.email }]);
                alert(error ? "Hata oluştu!" : "🤝 Teklifin başarıyla iletildi!");
            }
        }

        sitemiCalistir();
    </script>
</body>
</html>
