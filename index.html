<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trakas - Takas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div id="auth-menu" class="hidden lg:flex items-center gap-6">
            </div>
        <div id="auth-menu-mobil" class="lg:hidden flex items-center gap-4">
             </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow flex flex-col items-center">
        
        <div class="text-center mb-12 mt-4">
            <h1 class="text-4xl md:text-5xl font-black text-[#0f172a] tracking-tight uppercase mb-4 italic">EŞYALARINI TAKASLA, <span class="text-yellow-500">DEĞERİNE DEĞER KAT</span></h1>
            <p class="text-gray-500 font-medium text-sm md:text-base max-w-2xl mx-auto">Trakas ile kullanmadığın eşyaları ihtiyacın olanlarla değiştir. Güvenli, hızlı ve tamamen ücretsiz pazaryeri.</p>
        </div>

        <div id="ilan-vitrini" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full">
            </div>
        
        <div id="yukleniyor" class="py-20 flex flex-col items-center justify-center w-full">
            <svg class="animate-spin h-10 w-10 text-[#0f172a] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">VİTRİN YÜKLENİYOR...</span>
        </div>

    </main>

    <footer class="bg-[#0f172a] border-t-4 border-[#facc15] pt-12 pb-8 w-full mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col items-center justify-center">
            <h2 class="text-4xl font-black text-white italic tracking-tighter uppercase mb-2">TRAKAS</h2>
            <p class="text-gray-500 text-xs font-bold tracking-widest uppercase">Takas Pazaryeri Platformu</p>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let aktifSession = null;

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            aktifSession = session;
            menuOlustur();
            vitriniDoldur();
        }

        function menuOlustur() {
            const menuDiv = document.getElementById('auth-menu');
            const mobilMenuDiv = document.getElementById('auth-menu-mobil');
            
            if (aktifSession) {
                const user = aktifSession.user;
                const meta = user.user_metadata || {};
                
                // İSİM SOYİSİM AKILLI ÇEKİMİ
                const gorunenIsim = meta.ad_soyad ? meta.ad_soyad.toUpperCase() : user.email.split('@')[0].toUpperCase();
                
                menuDiv.classList.remove('hidden');
                menuDiv.innerHTML = `
                    <a href="profil.html" class="text-[#facc15] font-black text-xs uppercase tracking-widest hover:text-white transition-colors border-b-2 border-[#facc15] hover:border-white pb-0.5 flex items-center gap-1.5" title="Profilime Git">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        ${gorunenIsim}
                    </a>
                    <a href="favorilerim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a>
                    <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">İLANLARIM</a>
                    <a href="sohbetler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">MESAJLARIM</a>
                    <a href="teklifler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">TEKLİFLERİM</a>
                    <span class="text-gray-700">|</span>
                    <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest hover:text-red-400">ÇIKIŞ</button>
                    <a href="ilan-ver.html" class="ml-2 bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-[11px] uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">İLAN VER</a>
                `;

                mobilMenuDiv.innerHTML = `
                    <a href="profil.html" class="text-[#facc15] font-black text-[10px] uppercase tracking-widest border-b border-[#facc15] pb-0.5">PROFİLİM</a>
                    <a href="ilan-ver.html" class="bg-[#facc15] text-[#0f172a] px-4 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest">İLAN VER</a>
                    <button onclick="cikisYap()" class="text-red-500 font-bold text-[10px] uppercase">ÇIKIŞ</button>
                `;
            } else {
                menuDiv.classList.remove('hidden');
                menuDiv.innerHTML = `<a href="giris.html" class="bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">GİRİŞ YAP / KAYIT OL</a>`;
                mobilMenuDiv.innerHTML = `<a href="giris.html" class="text-[#facc15] font-bold text-[10px] uppercase tracking-widest">GİRİŞ YAP</a>`;
            }
        }

        async function vitriniDoldur() {
            try {
                const { data: ilanlar, error } = await _supabase
                    .from('ilanlar')
                    .select('*')
                    .order('created_at', { ascending: false });

                document.getElementById('yukleniyor').classList.add('hidden');

                if (error) throw error;

                const vitrin = document.getElementById('ilan-vitrini');
                
                if (!ilanlar || ilanlar.length === 0) {
                    vitrin.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500 font-bold text-sm uppercase tracking-widest">HENÜZ HİÇ İLAN YÜKLENMEMİŞ. İLK İLANI SEN VER!</div>`;
                    return;
                }

                let html = "";
                ilanlar.forEach(ilan => {
                    let ilkResim = "";
                    if(ilan.resim_url) ilkResim = ilan.resim_url.split(',')[0].trim();

                    html += `
                    <a href="detay.html?id=${ilan.id}" class="group bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
                        <div class="w-full h-48 bg-gray-100 relative overflow-hidden flex items-center justify-center">
                            ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">` : `<span class="text-[10px] font-black uppercase tracking-widest text-gray-400">GÖRSEL YOK</span>`}
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">${ilan.kategori || 'DİĞER'}</span>
                            <h3 class="font-black text-gray-900 text-base uppercase tracking-tight line-clamp-2 mb-2 group-hover:text-yellow-500 transition-colors">${ilan.baslik}</h3>
                            <div class="mt-auto pt-4 border-t border-gray-100">
                                <span class="font-black text-[#0f172a] text-lg">${ilan.deger} ₺</span>
                            </div>
                        </div>
                    </a>`;
                });

                vitrin.innerHTML = html;

            } catch (err) {
                console.error(err);
                document.getElementById('yukleniyor').innerHTML = `<span class="text-red-500 font-bold text-xs uppercase tracking-widest">İLANLAR ÇEKİLEMEDİ!</span>`;
            }
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
