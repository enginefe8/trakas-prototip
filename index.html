<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trakas - Takas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50 relative">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        
        <div id="auth-menu" class="hidden lg:flex items-center gap-6">
            </div>

        <div class="lg:hidden flex items-center gap-3">
            <a href="ilan-ver.html" class="bg-[#facc15] text-[#0f172a] px-3 py-1.5 rounded-lg font-black text-[10px] uppercase tracking-widest shadow-sm">İLAN VER</a>
            
            <button onclick="toggleMobileMenu()" class="text-white p-1 hover:text-[#facc15] transition-colors focus:outline-none">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-[#0f172a] border-t border-gray-800 shadow-2xl flex-col z-50">
             </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow flex flex-col items-center">
        
        <div class="text-center mb-10 mt-4">
            <h1 class="text-4xl md:text-5xl font-black text-[#0f172a] tracking-tight uppercase mb-4 italic">EŞYALARINI TAKASLA, <span class="text-yellow-500">DEĞERİNE DEĞER KAT</span></h1>
            <p class="text-gray-500 font-medium text-sm md:text-base max-w-2xl mx-auto">Trakas ile kullanmadığın eşyaları ihtiyacın olanlarla değiştir. Güvenli, hızlı ve tamamen ücretsiz pazaryeri.</p>
        </div>

        <div class="w-full max-w-4xl mx-auto mb-10 z-40 relative">
            <div class="flex flex-col md:flex-row gap-3 bg-white p-3 rounded-2xl shadow-md border border-gray-200 relative">
                
                <div class="flex-grow relative">
                    <div class="flex items-center bg-gray-50 rounded-xl px-4 py-2 border border-gray-100 focus-within:border-[#facc15] focus-within:ring-1 focus-within:ring-[#facc15] transition-all h-full">
                        <svg class="w-5 h-5 text-gray-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="arama-kutusu" oninput="aramaOnerileriGoster(this.value)" autocomplete="off" placeholder="İlan başlığında ara... (Örn: iPhone 13, Bisiklet)" class="w-full bg-transparent outline-none text-sm font-bold text-gray-800 placeholder-gray-400 py-2">
                    </div>

                    <div id="arama-onerileri" class="absolute w-full bg-white shadow-2xl rounded-xl mt-2 hidden max-h-60 overflow-y-auto border border-gray-100 top-full left-0 z-50">
                        </div>
                </div>

                <div class="md:w-56 flex-shrink-0 relative">
                    <select id="kategori-filtresi" class="w-full bg-gray-50 rounded-xl px-4 py-4 border border-gray-100 outline-none focus:border-[#facc15] focus:ring-1 focus:ring-[#facc15] text-xs font-black text-gray-700 uppercase tracking-widest appearance-none cursor-pointer h-full transition-all">
                        <option value="">TÜM KATEGORİLER</option>
                        <option value="Elektronik">ELEKTRONİK</option>
                        <option value="Giyim & Aksesuar">GİYİM & AKSESUAR</option>
                        <option value="Araç">ARAÇ</option>
                        <option value="Ev & Yaşam">EV & YAŞAM</option>
                        <option value="Eğlence & Hobi">EĞLENCE & HOBİ</option>
                        <option value="Diğer">DİĞER</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>

                <button onclick="filtreleVeAra()" class="bg-[#0f172a] text-[#facc15] px-8 py-4 md:py-0 rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black transition-colors flex-shrink-0 flex items-center justify-center gap-2">
                    ARA
                </button>
            </div>
        </div>

        <div id="yukleniyor" class="py-20 flex flex-col items-center justify-center w-full hidden">
            <svg class="animate-spin h-10 w-10 text-[#0f172a] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">SONUÇLAR GETİRİLİYOR...</span>
        </div>

        <div id="ilan-vitrini" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full">
            </div>

    </main>

    <footer class="bg-[#0f172a] border-t-4 border-[#facc15] pt-12 pb-8 w-full mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-black text-white italic tracking-tighter uppercase mb-2">TRAKAS</h2>
            <p class="text-gray-400 text-xs font-bold tracking-widest uppercase mb-8">Takas Pazaryeri Platformu</p>
            <div class="h-px bg-gray-800 w-full mb-8"></div>
            <div class="flex flex-col md:flex-row justify-between items-center w-full gap-6">
                <p class="text-gray-500 text-[10px] font-bold tracking-widest uppercase">Copyright © 2026 TRAKAS Ltd. Tüm hakları saklıdır.</p>
                <div class="flex items-center gap-5 text-gray-500">
                    <a href="#" class="hover:text-[#facc15] transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>
                    <a href="#" class="hover:text-[#facc15] transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.222 8.255 8.496 11.245H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
                    <a href="#" class="hover:text-[#facc15] transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.919-.058-1.265-.069-1.646-.069-4.849 0-3.204.013-3.583.069-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12s.014 3.667.072 4.947c.2 4.353 2.62 6.765 6.98 6.965 1.28.058 1.688.072 4.948.072s3.668-.014 4.948-.072c4.354-.2 6.765-2.62 6.965-6.98.058-1.28.072-1.689.072-4.948s-.014-3.667-.072-4.947c-.2-4.353-2.62-6.765-6.98-6.965C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let aktifSession = null;
        let tumIlanlarVeritabani = []; 

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            aktifSession = session;
            menuOlustur();
            await tumIlanlariCek();
        }

        // Hamburger Menü Aç/Kapa Motoru
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function menuOlustur() {
            const menuDiv = document.getElementById('auth-menu');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (aktifSession) {
                const user = aktifSession.user;
                const meta = user.user_metadata || {};
                const gorunenIsim = meta.ad_soyad ? meta.ad_soyad.toUpperCase() : user.email.split('@')[0].toUpperCase();
                
                // MASAÜSTÜ MENÜSÜ (Bozulan "hidden" hatası düzeltildi)
                menuDiv.innerHTML = `
                    <a href="profil.html" class="text-[#facc15] font-black text-xs uppercase tracking-widest hover:text-white transition-colors border-b-2 border-[#facc15] hover:border-white pb-0.5 flex items-center gap-1.5" title="Profilime Git">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        ${gorunenIsim}
                    </a>
                    <a href="favorilerim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a>
                    <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">İLANLARIM</a>
                    <a href="sohbetler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">MESAJLARIM</a>
                    <a href="teklifler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">TEKLİFLERİM</a>
                    <span class="text-gray-700">|</span>
                    <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest hover:text-red-400">ÇIKIŞ</button>
                    <a href="ilan-ver.html" class="ml-2 bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-[11px] uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">İLAN VER</a>
                `;

                // MOBİL HAMBURGER MENÜ İÇERİĞİ
                mobileMenu.innerHTML = `
                    <a href="profil.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest border-b border-gray-800 flex items-center gap-2 hover:bg-gray-800 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        ${gorunenIsim}
                    </a>
                    <a href="favorilerim.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">FAVORİLERİM</a>
                    <a href="ilanlarim.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">İLANLARIM</a>
                    <a href="sohbetler.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">MESAJLARIM</a>
                    <a href="teklifler.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">TEKLİFLERİM</a>
                    <button onclick="cikisYap()" class="w-full text-left block px-6 py-4 text-red-500 font-bold text-[11px] uppercase tracking-widest hover:bg-gray-800 transition-colors">ÇIKIŞ</button>
                `;
            } else {
                menuDiv.innerHTML = `<a href="giris.html" class="bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">GİRİŞ YAP / KAYIT OL</a>`;
                mobileMenu.innerHTML = `<a href="giris.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest text-center hover:bg-gray-800 transition-colors">GİRİŞ YAP / KAYIT OL</a>`;
            }
        }

        // --- 1. TÜRKÇE KARAKTER KALKANI ---
        function turkceTemizle(metin) {
            if(!metin) return "";
            return metin.toLowerCase()
                .replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's')
                .replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c')
                .replace(/i̇/g, 'i');
        }

        // --- 2. VERİLERİ DEPOYA ÇEKME (BİR KERE ÇALIŞIR) ---
        async function tumIlanlariCek() {
            try {
                const { data: ilanlar, error } = await _supabase
                    .from('ilanlar')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                tumIlanlarVeritabani = ilanlar || [];
                
                ekranaBas(tumIlanlarVeritabani);

            } catch (err) {
                console.error(err);
                document.getElementById('yukleniyor').innerHTML = `<span class="text-red-500 font-bold text-xs uppercase tracking-widest">İLANLAR ÇEKİLEMEDİ!</span>`;
            }
        }

        // --- 3. AKILLI TAHMİN (AUTOCOMPLETE) SİSTEMİ ---
        function aramaOnerileriGoster(kelime) {
            const oneriKutusu = document.getElementById('arama-onerileri');
            
            if(kelime.trim().length < 1) {
                oneriKutusu.classList.add('hidden');
                return;
            }

            const temizAranan = turkceTemizle(kelime);
            
            const eslesenBasliklar = [];
            tumIlanlarVeritabani.forEach(ilan => {
                if(turkceTemizle(ilan.baslik).includes(temizAranan)) {
                    if(!eslesenBasliklar.includes(ilan.baslik)) {
                        eslesenBasliklar.push(ilan.baslik);
                    }
                }
            });

            const kisaListe = eslesenBasliklar.slice(0, 5);

            if(kisaListe.length > 0) {
                let html = '<ul class="py-2">';
                kisaListe.forEach(baslik => {
                    html += `
                    <li onclick="oneriSec('${baslik.replace(/'/g, "\\'")}')" class="px-5 py-3 hover:bg-gray-50 cursor-pointer text-sm font-bold text-gray-700 border-b border-gray-50 last:border-0 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4 text-[#facc15]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg> 
                        ${baslik}
                    </li>`;
                });
                html += '</ul>';
                oneriKutusu.innerHTML = html;
                oneriKutusu.classList.remove('hidden');
            } else {
                oneriKutusu.classList.add('hidden');
            }
        }

        function oneriSec(secilenBaslik) {
            document.getElementById('arama-kutusu').value = secilenBaslik;
            document.getElementById('arama-onerileri').classList.add('hidden');
            filtreleVeAra(); 
        }

        document.addEventListener('click', function(e) {
            if(!document.getElementById('arama-kutusu').contains(e.target) && !document.getElementById('arama-onerileri').contains(e.target)) {
                document.getElementById('arama-onerileri').classList.add('hidden');
            }
        });

        document.getElementById('arama-kutusu').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('arama-onerileri').classList.add('hidden');
                filtreleVeAra();
            }
        });

        document.getElementById('kategori-filtresi').addEventListener('change', filtreleVeAra);


        // --- 4. JS TABANLI KUSURSUZ FİLTRELEME MOTORU ---
        function filtreleVeAra() {
            const arama = document.getElementById('arama-kutusu').value;
            const kategori = document.getElementById('kategori-filtresi').value;
            
            document.getElementById('ilan-vitrini').innerHTML = "";
            document.getElementById('yukleniyor').classList.remove('hidden');

            setTimeout(() => { 
                let filtrelenmis = tumIlanlarVeritabani;

                if (kategori && kategori !== "") {
                    filtrelenmis = filtrelenmis.filter(ilan => ilan.kategori === kategori);
                }

                if (arama && arama.trim() !== "") {
                    const temizArama = turkceTemizle(arama);
                    filtrelenmis = filtrelenmis.filter(ilan => 
                        turkceTemizle(ilan.baslik).includes(temizArama) || 
                        turkceTemizle(ilan.aciklama).includes(temizArama)
                    );
                }

                ekranaBas(filtrelenmis);
                document.getElementById('yukleniyor').classList.add('hidden');

            }, 300);
        }

        // --- 5. EKRANA ÇİZİM FONKSİYONU ---
        function ekranaBas(ilanlar) {
            const vitrin = document.getElementById('ilan-vitrini');
            document.getElementById('yukleniyor').classList.add('hidden');
            
            if (!ilanlar || ilanlar.length === 0) {
                vitrin.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-16 text-center bg-white rounded-2xl border border-gray-200 shadow-sm mt-4">
                    <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h3 class="font-black text-gray-900 text-lg uppercase tracking-widest mb-2">SONUÇ BULUNAMADI</h3>
                    <p class="text-gray-500 font-medium text-sm">Arama kriterlerinize uygun bir ilan bulamadık. Lütfen farklı kelimelerle tekrar deneyin.</p>
                    <button onclick="document.getElementById('arama-kutusu').value=''; document.getElementById('kategori-filtresi').value=''; filtreleVeAra();" class="mt-6 bg-[#facc15] text-[#0f172a] px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">
                        FİLTRELERİ TEMİZLE
                    </button>
                </div>`;
                return;
            }

            let html = "";
            ilanlar.forEach(ilan => {
                let ilkResim = "";
                if(ilan.resim_url) ilkResim = ilan.resim_url.split(',')[0].trim();

                html += `
                <a href="detay.html?id=${ilan.id}" class="group bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
                    <div class="w-full h-48 bg-gray-100 relative overflow-hidden flex items-center justify-center">
                        ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">` : `<span class="text-[10px] font-black uppercase tracking-widest text-gray-400">GÖRSEL YOK</span>`}
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">${ilan.kategori || 'DİĞER'}</span>
                        <h3 class="font-black text-gray-900 text-base uppercase tracking-tight line-clamp-2 mb-2 group-hover:text-yellow-500 transition-colors">${ilan.baslik}</h3>
                        <div class="mt-auto pt-4 border-t border-gray-100">
                            <span class="font-black text-[#0f172a] text-lg">${ilan.deger} ₺</span>
                        </div>
                    </div>
                </a>`;
            });

            vitrin.innerHTML = html;
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
