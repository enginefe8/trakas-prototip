<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trakas - Klasik Takas Pazarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter italic">TRAKAS</h1>
            <div class="flex-grow mx-8 hidden md:block">
                <input type="text" placeholder="Ürün, marka veya takas tercihi ara..." class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-yellow-500 text-sm">
            </div>
            <div class="flex gap-4 items-center">
                <a href="giris.html" id="btn-giris" class="text-white font-bold text-sm hidden sm:block hover:text-yellow-500 transition-colors">Giriş Yap</a>
                <button onclick="cikisYap()" id="btn-cikis" class="text-red-400 font-bold text-sm hidden hover:text-red-300 transition-colors uppercase tracking-widest">Çıkış Yap</button>
                <a href="ilan-ver.html" class="bg-yellow-500 px-6 py-2 rounded-lg font-black text-sm hover:bg-yellow-400 transition-all uppercase flex items-center justify-center">İLAN VER +</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-6 p-6">
        <aside class="w-full md:w-64 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-black text-gray-800 mb-4 border-b pb-2 uppercase text-xs tracking-widest">Kategoriler</h3>
                <div class="space-y-2 text-sm text-gray-600">
                    <p class="text-yellow-600 font-bold bg-yellow-50 p-2 rounded-lg italic">📱 Elektronik (142)</p>
                    <p class="p-2">🚗 Vasıta (85)</p>
                    <p class="p-2">🏠 Emlak (32)</p>
                    <p class="p-2">👕 Moda (120)</p>
                </div>
            </div>
        </aside>

        <main class="flex-grow">
            <div id="ilan-vitrini" class="flex flex-col gap-4 mb-8">
                <p class="text-center text-gray-400 italic py-10">İlanlar yükleniyor...</p>
            </div>
        </main>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function oturumKontrol() {
            const { data: { session } } = await _supabase.auth.getSession();
            const btnGiris = document.getElementById('btn-giris');
            const btnCikis = document.getElementById('btn-cikis');
            if (session) {
                btnGiris.style.display = 'none';
                btnCikis.style.display = 'block';
            } else {
                btnGiris.style.display = 'block';
                btnCikis.style.display = 'none';
            }
        }

        async function cikisYap() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        async function teklifVer(ilanId, ilanBaslik) {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (!session) {
                alert("Teklif vermek için önce giriş yapmalısın!");
                window.location.href = 'giris.html';
                return;
            }

            const onay = confirm(`${ilanBaslik} ilanı için takas teklifi göndermek istiyor musun?`);
            
            if (onay) {
                const { error } = await _supabase
                    .from('teklifler')
                    .insert([
                        { 
                            ilan_id: ilanId, 
                            teklif_veren_email: session.user.email,
                            mesaj: "Bu ürünle ilgileniyorum!" 
                        }
                    ]);

                if (error) {
                    alert("Teklif gönderilirken hata oluştu: " + error.message);
                } else {
                    alert("🤝 Teklifin başarıyla iletildi! Karşı tarafın yanıtını bekleyelim.");
                }
            }
        }

        async function ilanlariGetir() {
            const { data, error } = await _supabase.from('ilanlar').select('*').order('id', { ascending: false });
            if (error) return;
            const vitrin = document.getElementById('ilan-vitrini');
            vitrin.innerHTML = ''; 
            data.forEach(ilan => {
                const resimHtml = ilan.resim_url ? `<img src="${ilan.resim_url}" class="w-full h-full object-cover">` : '<span class="text-4xl">📸</span>';
                vitrin.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col md:flex-row gap-6 hover:shadow-lg transition-all group">
                    <div class="w-full md:w-48 h-48 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center">${resimHtml}</div>
                    <div class="flex-grow flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <h2 class="text-xl font-bold uppercase italic text-gray-800">${ilan.baslik}</h2>
                                <span class="text-green-600 font-black text-sm">${ilan.deger} TL</span>
                            </div>
                            <p class="mt-4 text-sm italic text-gray-700 bg-gray-50 p-3 rounded-xl border-l-4 border-yellow-500">${ilan.aciklama}</p>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <button class="flex-grow bg-gray-900 text-white py-2 rounded-lg font-bold text-sm uppercase tracking-widest">Detaylar</button>
                            <button onclick="teklifVer(${ilan.id}, '${ilan.baslik}')" class="bg-yellow-500 px-6 py-2 rounded-lg font-black text-sm uppercase italic hover:bg-yellow-400 transition-all">TEKLİF VER 🤝</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        oturumKontrol();
        ilanlariGetir();
    </script>
</body>
</html>
