<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trakas - Takas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50 relative">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        
        <div id="auth-menu" class="hidden lg:flex items-center gap-6"></div>
        
        <div id="auth-menu-mobil" class="lg:hidden flex items-center gap-3"></div>

        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-[#0f172a] border-t border-gray-800 shadow-2xl flex-col z-50"></div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow flex flex-col items-center">
        
        <div class="text-center mb-10 mt-4">
            <h1 class="text-4xl md:text-5xl font-black text-[#0f172a] tracking-tight uppercase mb-4 italic">EŞYALARINI TAKASLA, <span class="text-yellow-500">DEĞERİNE DEĞER KAT</span></h1>
            <p class="text-gray-500 font-medium text-sm md:text-base max-w-2xl mx-auto">Trakas ile kullanmadığın eşyaları ihtiyacın olanlarla değiştir. Güvenli, hızlı ve tamamen ücretsiz pazaryeri.</p>
        </div>

        <div class="w-full max-w-4xl mx-auto mb-10 z-40 relative">
            <div class="flex flex-col md:flex-row gap-3 bg-white p-3 rounded-2xl shadow-md border border-gray-200 relative">
                <div class="flex-grow relative">
                    <div class="flex items-center bg-gray-50 rounded-xl px-4 py-2 border border-gray-100 focus-within:border-[#facc15] focus-within:ring-1 focus-within:ring-[#facc15] transition-all h-full">
                        <svg class="w-5 h-5 text-gray-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="arama-kutusu" oninput="aramaOnerileriGoster(this.value)" autocomplete="off" placeholder="İlan başlığında ara... (Örn: iPhone 13, Bisiklet)" class="w-full bg-transparent outline-none text-sm font-bold text-gray-800 placeholder-gray-400 py-2">
                    </div>
                    <div id="arama-onerileri" class="absolute w-full bg-white shadow-2xl rounded-xl mt-2 hidden max-h-60 overflow-y-auto border border-gray-100 top-full left-0 z-50"></div>
                </div>
                <div class="md:w-56 flex-shrink-0 relative">
                    <select id="kategori-filtresi" class="w-full bg-gray-50 rounded-xl px-4 py-4 border border-gray-100 outline-none focus:border-[#facc15] focus:ring-1 focus:ring-[#facc15] text-xs font-black text-gray-700 uppercase tracking-widest appearance-none cursor-pointer h-full transition-all">
                        <option value="">TÜM KATEGORİLER</option>
                        <option value="Elektronik">ELEKTRONİK</option>
                        <option value="Giyim & Aksesuar">GİYİM & AKSESUAR</option>
                        <option value="Araç">ARAÇ</option>
                        <option value="Ev & Yaşam">EV & YAŞAM</option>
                        <option value="Eğlence & Hobi">EĞLENCE & HOBİ</option>
                        <option value="Diğer">DİĞER</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div>
                </div>
                <button onclick="filtreleVeAra()" class="bg-[#0f172a] text-[#facc15] px-8 py-4 md:py-0 rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-black transition-colors flex-shrink-0 flex items-center justify-center gap-2">ARA</button>
            </div>
        </div>

        <div id="yukleniyor" class="py-20 flex flex-col items-center justify-center w-full hidden">
            <svg class="animate-spin h-10 w-10 text-[#0f172a] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">SONUÇLAR GETİRİLİYOR...</span>
        </div>

        <div id="ilan-vitrini" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full"></div>

    </main>

    <footer class="bg-[#0f172a] border-t-4 border-[#facc15] pt-12 pb-8 w-full mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-black text-white italic tracking-tighter uppercase mb-2">TRAKAS</h2>
            <p class="text-gray-400 text-xs font-bold tracking-widest uppercase mb-8">Takas Pazaryeri Platformu</p>
            <div class="h-px bg-gray-800 w-full mb-8"></div>
            <div class="flex flex-col md:flex-row justify-between items-center w-full gap-6">
                <p class="text-gray-500 text-[10px] font-bold tracking-widest uppercase">Copyright © 2026 TRAKAS Ltd. Tüm hakları saklıdır.</p>
                <div class="flex items-center gap-5 text-gray-500">
                    <a href="#" class="hover:text-[#facc15] transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>
                </div>
            </div>
        </div>
    </footer>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-ikincil" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-900 font-black px-4 py-4 rounded-xl hover:bg-gray-200 transition-colors uppercase text-[10px] tracking-widest">KAPAT</button>
                    <button id="modal-btn-ana" onclick="modalKapat()" class="flex-1 bg-[#0f172a] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">TAMAM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let aktifSession = null;
        let tumIlanlarVeritabani = []; 
        let benimFavorilerim = [];

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            aktifSession = session;
            menuOlustur();
            
            if(aktifSession) { await favorileriHafizayaAl(); }
            await tumIlanlariCek();
        }

        // HAMBURGER MENÜ TETİKLEYİCİSİ
        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function menuOlustur() {
            const menuDiv = document.getElementById('auth-menu');
            const mobilTopDiv = document.getElementById('auth-menu-mobil');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (aktifSession) {
                const user = aktifSession.user;
                const meta = user.user_metadata || {};
                const gorunenIsim = meta.ad_soyad ? meta.ad_soyad.toUpperCase() : user.email.split('@')[0].toUpperCase();
                
                // 1. MASAÜSTÜ MENÜSÜ (Bozulan yer düzeltildi, classList.remove SİLİNDİ)
                menuDiv.innerHTML = `
                    <a href="profil.html" class="text-[#facc15] font-black text-xs uppercase tracking-widest hover:text-white transition-colors border-b-2 border-[#facc15] hover:border-white pb-0.5 flex items-center gap-1.5" title="Profilime Git"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>${gorunenIsim}</a>
                    <a href="favorilerim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a>
                    <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">İLANLARIM</a>
                    <a href="sohbetler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">MESAJLARIM</a>
                    <a href="teklifler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">TEKLİFLERİM</a>
                    <span class="text-gray-700">|</span>
                    <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest hover:text-red-400">ÇIKIŞ</button>
                    <a href="ilan-ver.html" class="ml-2 bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-[11px] uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">İLAN VER</a>
                `;

                // 2. MOBİL ÜST BAR
                mobilTopDiv.innerHTML = `
                    <a href="ilan-ver.html" class="bg-[#facc15] text-[#0f172a] px-3 py-1.5 rounded-lg font-black text-[10px] uppercase tracking-widest shadow-sm">İLAN VER</a>
                    <button onclick="toggleMobileMenu()" class="text-white p-1 hover:text-[#facc15] transition-colors focus:outline-none">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                `;

                // 3. MOBİL HAMBURGER AÇILIR MENÜSÜ
                mobileMenu.innerHTML = `
                    <a href="profil.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest border-b border-gray-800 flex items-center gap-2 hover:bg-gray-800 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>${gorunenIsim}</a>
                    <a href="favorilerim.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">FAVORİLERİM</a>
                    <a href="ilanlarim.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">İLANLARIM</a>
                    <a href="sohbetler.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">MESAJLARIM</a>
                    <a href="teklifler.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">TEKLİFLERİM</a>
                    <button onclick="cikisYap()" class="w-full text-left block px-6 py-4 text-red-500 font-bold text-[11px] uppercase tracking-widest hover:bg-gray-800 transition-colors">ÇIKIŞ</button>
                `;
            } else {
                menuDiv.innerHTML = `<a href="giris.html" class="bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">GİRİŞ YAP / KAYIT OL</a>`;
                
                mobilTopDiv.innerHTML = `
                    <a href="giris.html" class="text-[#facc15] font-bold text-[10px] uppercase tracking-widest mr-2">GİRİŞ YAP</a>
                    <button onclick="toggleMobileMenu()" class="text-white p-1 hover:text-[#facc15] transition-colors focus:outline-none">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                `;

                mobileMenu.innerHTML = `<a href="giris.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest text-center hover:bg-gray-800 transition-colors">GİRİŞ YAP / KAYIT OL</a>`;
            }
        }

        async function favorileriHafizayaAl() {
            const { data } = await _supabase.from('favoriler').select('ilan_id').eq('kullanici_email', aktifSession.user.email);
            if(data) { benimFavorilerim = data.map(f => f.ilan_id); }
        }

        async function favoriTetikle(event, ilanId) {
            event.preventDefault(); 
            event.stopPropagation(); 

            if (!aktifSession) {
                modalAc("GİRİŞ GEREKLİ", "İlanları favorinize eklemek için giriş yapmanız veya kayıt olmanız gerekmektedir.", "uyari", true, () => window.location.href='giris.html');
                document.getElementById('modal-btn-ana').innerText = "GİRİŞ YAP";
                return;
            }

            const ikon = document.getElementById(`kalp-ikon-${ilanId}`);
            const isFavori = benimFavorilerim.includes(ilanId);

            if (isFavori) {
                benimFavorilerim = benimFavorilerim.filter(id => id !== ilanId);
                ikon.classList.remove('text-red-500', 'fill-current');
                ikon.classList.add('text-gray-400');
                ikon.setAttribute('fill', 'none');
                _supabase.from('favoriler').delete().eq('ilan_id', ilanId).eq('kullanici_email', aktifSession.user.email).then();
            } else {
                benimFavorilerim.push(ilanId);
                ikon.classList.remove('text-gray-400');
                ikon.classList.add('text-red-500', 'fill-current');
                ikon.setAttribute('fill', 'currentColor');
                _supabase.from('favoriler').insert([{ ilan_id: ilanId, kullanici_email: aktifSession.user.email }]).then();
            }
        }

        function turkceTemizle(metin) {
            if(!metin) return "";
            return metin.toLowerCase().replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c').replace(/i̇/g, 'i');
        }

        async function tumIlanlariCek() {
            try {
                const { data: ilanlar, error } = await _supabase.from('ilanlar').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                tumIlanlarVeritabani = ilanlar || [];
                ekranaBas(tumIlanlarVeritabani);
            } catch (err) {
                document.getElementById('yukleniyor').innerHTML = `<span class="text-red-500 font-bold text-xs uppercase tracking-widest">İLANLAR ÇEKİLEMEDİ!</span>`;
            }
        }

        function aramaOnerileriGoster(kelime) {
            const oneriKutusu = document.getElementById('arama-onerileri');
            if(kelime.trim().length < 1) { oneriKutusu.classList.add('hidden'); return; }
            const temizAranan = turkceTemizle(kelime);
            const eslesenBasliklar = [];
            tumIlanlarVeritabani.forEach(ilan => {
                if(turkceTemizle(ilan.baslik).includes(temizAranan)) {
                    if(!eslesenBasliklar.includes(ilan.baslik)) eslesenBasliklar.push(ilan.baslik);
                }
            });
            const kisaListe = eslesenBasliklar.slice(0, 5);
            if(kisaListe.length > 0) {
                let html = '<ul class="py-2">';
                kisaListe.forEach(baslik => {
                    html += `<li onclick="oneriSec('${baslik.replace(/'/g, "\\'")}')" class="px-5 py-3 hover:bg-gray-50 cursor-pointer text-sm font-bold text-gray-700 border-b border-gray-50 last:border-0 flex items-center gap-3 transition-colors"><svg class="w-4 h-4 text-[#facc15]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>${baslik}</li>`;
                });
                html += '</ul>';
                oneriKutusu.innerHTML = html;
                oneriKutusu.classList.remove('hidden');
            } else { oneriKutusu.classList.add('hidden'); }
        }

        function oneriSec(secilenBaslik) {
            document.getElementById('arama-kutusu').value = secilenBaslik;
            document.getElementById('arama-onerileri').classList.add('hidden');
            filtreleVeAra(); 
        }

        document.addEventListener('click', function(e) {
            if(!document.getElementById('arama-kutusu').contains(e.target) && !document.getElementById('arama-onerileri').contains(e.target)) {
                document.getElementById('arama-onerileri').classList.add('hidden');
            }
        });

        document.getElementById('arama-kutusu').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { document.getElementById('arama-onerileri').classList.add('hidden'); filtreleVeAra(); }
        });

        document.getElementById('kategori-filtresi').addEventListener('change', filtreleVeAra);

        function filtreleVeAra() {
            const arama = document.getElementById('arama-kutusu').value;
            const kategori = document.getElementById('kategori-filtresi').value;
            document.getElementById('ilan-vitrini').innerHTML = "";
            document.getElementById('yukleniyor').classList.remove('hidden');

            setTimeout(() => { 
                let filtrelenmis = tumIlanlarVeritabani;
                if (kategori && kategori !== "") filtrelenmis = filtrelenmis.filter(ilan => ilan.kategori === kategori);
                if (arama && arama.trim() !== "") {
                    const temizArama = turkceTemizle(arama);
                    filtrelenmis = filtrelenmis.filter(ilan => turkceTemizle(ilan.baslik).includes(temizArama) || turkceTemizle(ilan.aciklama).includes(temizArama));
                }
                ekranaBas(filtrelenmis);
            }, 300);
        }

        function ekranaBas(ilanlar) {
            const vitrin = document.getElementById('ilan-vitrini');
            document.getElementById('yukleniyor').classList.add('hidden');
            
            if (!ilanlar || ilanlar.length === 0) {
                vitrin.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-16 text-center bg-white rounded-2xl border border-gray-200 shadow-sm mt-4"><svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><h3 class="font-black text-gray-900 text-lg uppercase tracking-widest mb-2">SONUÇ BULUNAMADI</h3><p class="text-gray-500 font-medium text-sm">Arama kriterlerinize uygun bir ilan bulamadık. Lütfen farklı kelimelerle tekrar deneyin.</p><button onclick="document.getElementById('arama-kutusu').value=''; document.getElementById('kategori-filtresi').value=''; filtreleVeAra();" class="mt-6 bg-[#facc15] text-[#0f172a] px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-sm">FİLTRELERİ TEMİZLE</button></div>`;
                return;
            }

            let html = "";
            ilanlar.forEach(ilan => {
                let ilkResim = "";
                if(ilan.resim_url) ilkResim = ilan.resim_url.split(',')[0].trim();
                
                const isFavori = benimFavorilerim.includes(ilan.id);
                const kalpRengi = isFavori ? "text-red-500 fill-current" : "text-gray-400";
                const kalpTipi = isFavori ? "currentColor" : "none";

                html += `
                <a href="detay.html?id=${ilan.id}" class="group bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col relative">
                    <div class="w-full h-64 sm:h-48 bg-gray-100 relative overflow-hidden flex items-center justify-center">
                        
                        <button onclick="favoriTetikle(event, '${ilan.id}')" class="kalp-btn absolute top-3 right-3 bg-white/80 backdrop-blur-md p-2.5 rounded-full shadow-md hover:bg-white hover:shadow-lg transition-all z-20 focus:outline-none">
                            <svg id="kalp-ikon-${ilan.id}" class="w-5 h-5 ${kalpRengi} transition-colors duration-300" fill="${kalpTipi}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>

                        ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-contain sm:object-cover transition-transform duration-500 group-hover:scale-110">` : `<span class="text-[10px] font-black uppercase tracking-widest text-gray-400">GÖRSEL YOK</span>`}
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">${ilan.kategori || 'DİĞER'}</span>
                        <h3 class="font-black text-gray-900 text-base uppercase tracking-tight line-clamp-2 mb-2 group-hover:text-yellow-500 transition-colors">${ilan.baslik}</h3>
                        <div class="mt-auto pt-4 border-t border-gray-100">
                            <span class="font-black text-[#0f172a] text-lg">${ilan.deger} ₺</span>
                        </div>
                    </div>
                </a>`;
            });

            vitrin.innerHTML = html;
        }

        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, isIptal = false, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            
            if(isIptal) {
                document.getElementById('modal-btn-ikincil').classList.remove('hidden');
                document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            } else {
                document.getElementById('modal-btn-ikincil').classList.add('hidden');
                document.getElementById('modal-btn-ana').innerText = "TAMAM";
                document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            }

            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
