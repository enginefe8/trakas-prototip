<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Detayı - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-20">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter italic">TRAKAS</h1>
            <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors">← VİTRİNE DÖN</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-6 mt-4 md:mt-8" id="detay-icerik">
        <p class="text-center text-gray-400 italic py-20 font-bold tracking-widest uppercase">İlan bilgileri getiriliyor...</p>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const ilanId = urlParams.get('id');

        async function ilaniGetir() {
            if (!ilanId) {
                document.getElementById('detay-icerik').innerHTML = `<p class="text-center text-red-500 font-bold py-10">Hatalı veya eksik ilan bağlantısı.</p>`;
                return;
            }

            try {
                const { data, error } = await _supabase.from('ilanlar').select('*').eq('id', ilanId).single();
                
                if (error) throw error;
                if (!data) throw new Error("İlan bulunamadı.");

                // VİRGÜLLE AYRILMIŞ RESİMLERİ DİZİYE ÇEVİRME
                let resimler = [];
                if (data.resim_url) {
                    resimler = data.resim_url.split(','); // Örn: ["link1.jpg", "link2.jpg"]
                }

                const icerikAlani = document.getElementById('detay-icerik');
                const kategoriEtiketi = data.kategori ? data.kategori : 'Diğer';

                // SOL TARAFTAKİ GALERİ HTML'İ
                let galeriHTML = `<div class="w-full bg-gray-100 rounded-2xl flex items-center justify-center h-80 md:h-[400px] mb-4 border border-gray-200">
                    <span class="text-6xl">📸</span><p class="text-gray-400 ml-2 font-bold text-sm">Görsel Yok</p>
                </div>`;

                if (resimler.length > 0) {
                    let kucukResimlerHTML = '';
                    resimler.forEach(url => {
                        // Tıklanınca ana resmi değiştiren küçük resimler
                        kucukResimlerHTML += `<img src="${url}" onclick="anaResmiDegistir('${url}')" class="w-20 h-20 md:w-24 md:h-24 object-cover rounded-xl cursor-pointer border-2 border-transparent hover:border-yellow-500 transition-all shadow-sm">`;
                    });

                    galeriHTML = `
                    <div class="flex flex-col gap-3">
                        <div class="w-full bg-gray-100 rounded-2xl overflow-hidden h-80 md:h-[450px] shadow-sm border border-gray-200 flex items-center justify-center">
                            <img id="ana-resim" src="${resimler[0]}" class="w-full h-full object-contain bg-black/5 backdrop-blur-sm">
                        </div>
                        <div class="flex gap-2 md:gap-3 overflow-x-auto pb-2 scrollbar-hide">
                            ${resimler.length > 1 ? kucukResimlerHTML : ''}
                        </div>
                    </div>`;
                }

                // EKRANI İKİYE BÖLEN YENİ TASARIM
                icerikAlani.innerHTML = `
                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                        
                        <div>
                            ${galeriHTML}
                        </div>

                        <div class="flex flex-col justify-center">
                            
                            <div class="mb-4">
                                <span class="bg-gray-200 text-gray-700 text-[10px] md:text-xs font-black uppercase tracking-widest px-3 py-1.5 rounded-lg inline-block mb-3">
                                    ${kategoriEtiketi}
                                </span>
                                <h1 class="text-2xl md:text-4xl font-black uppercase italic text-gray-900 leading-tight">${data.baslik}</h1>
                            </div>

                            <div class="mb-6 pb-6 border-b border-gray-100">
                                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Tahmini Değer</span>
                                <span class="text-3xl font-black text-green-600 tracking-tight">${data.deger} TL</span>
                            </div>

                            <div class="mb-8">
                                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-2">Açıklama & Tercih</span>
                                <div class="bg-gray-50 p-4 md:p-5 rounded-2xl border-l-4 border-yellow-500 text-sm font-medium text-gray-700 leading-relaxed shadow-inner">
                                    ${data.aciklama}
                                </div>
                            </div>

                            <div class="bg-yellow-50/50 border border-yellow-100 p-4 rounded-2xl mb-6 flex items-center gap-3">
                                <div class="w-10 h-10 bg-gray-900 text-white rounded-full flex items-center justify-center font-black">
                                    ${data.sahip_email.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">İlan Sahibi</p>
                                    <p class="text-sm font-bold text-gray-800">${data.sahip_email.split('@')[0]}</p>
                                </div>
                            </div>

                            <button onclick="teklifVer(${data.id})" class="w-full bg-yellow-500 text-gray-900 py-4 rounded-xl font-black text-lg uppercase tracking-wider italic hover:bg-yellow-400 transition-all shadow-lg flex items-center justify-center gap-2">
                                <span>TEKLİF GÖNDER</span> 🤝
                            </button>
                        </div>

                    </div>
                </div>`;

            } catch (err) {
                document.getElementById('detay-icerik').innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-center"><p class="text-red-500 font-mono text-sm">${err.message}</p></div>`;
            }
        }

        // GALERİDE TIKLANAN RESMİ BÜYÜTEN FONKSİYON
        window.anaResmiDegistir = function(url) {
            document.getElementById('ana-resim').src = url;
        }

        // SPAM KORUMALI TEKLİF MOTORU
        async function teklifVer(id) {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { alert("Önce giriş yapmalısın!"); window.location.href = 'giris.html'; return; }
            
            // Spam Kontrolü
            const { data: mevcutTeklif } = await _supabase
                .from('teklifler')
                .select('id')
                .eq('ilan_id', id)
                .eq('teklif_veren_email', session.user.email);

            if (mevcutTeklif && mevcutTeklif.length > 0) {
                alert("⚠️ Dur bakalım! Bu ilana zaten bir teklif gönderdin. Karşı tarafın yanıtını beklemelisin.");
                return; 
            }

            if (confirm("Bu ilana takas teklifi göndermek istiyor musun?")) {
                const { error } = await _supabase.from('teklifler').insert([{ ilan_id: id, teklif_veren_email: session.user.email }]);
                alert(error ? "Hata: " + error.message : "🤝 Teklif başarıyla iletildi!");
            }
        }

        ilaniGetir();
    </script>
</body>
</html>
