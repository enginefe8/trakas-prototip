<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlan Detayı - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .kalp-btn-detay:active svg { transform: scale(1.3); transition: transform 0.1s; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div id="auth-menu" class="hidden lg:flex items-center gap-6"></div>
        <div id="auth-menu-mobil" class="lg:hidden flex items-center gap-4"></div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-grow">
        
        <div class="w-full flex justify-between items-center mb-6">
            <a href="index.html" class="text-xs font-bold text-gray-500 uppercase tracking-widest hover:text-[#0f172a] transition-colors flex items-center gap-2">
                <span>←</span> VİTRİNE DÖN
            </a>
            <span id="ilan-no" class="text-xs font-bold text-gray-400 uppercase tracking-widest">#--</span>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full p-6 md:p-10 flex flex-col lg:flex-row gap-10 min-h-[500px]">
            
            <div class="w-full lg:w-1/2 flex flex-col gap-4">
                <div class="w-full aspect-square bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-center overflow-hidden relative shadow-inner">
                    <img id="ana-resim" src="" class="w-full h-full object-contain p-2 transition-opacity duration-300">
                    <div id="resim-yok-ikon" class="hidden text-gray-300 flex-col items-center gap-2">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-widest">Görsel Yok</span>
                    </div>
                </div>
                <div id="kucuk-resimler-alani" class="flex gap-3 overflow-x-auto pb-2 hidden scroll-smooth"></div>
            </div>

            <div class="w-full lg:w-1/2 flex flex-col justify-between">
                <div id="detay-alani" class="opacity-0 transition-opacity duration-500">
                    <div class="mb-4">
                        <span id="ilan-kategori" class="bg-[#0f172a] text-[#facc15] text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-md shadow-sm">YÜKLENİYOR...</span>
                    </div>
                    <h1 id="ilan-baslik" class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight uppercase mb-6">Yükleniyor...</h1>
                    <div class="bg-yellow-50 border border-yellow-100 rounded-xl p-5 mb-8 inline-block shadow-sm">
                        <p class="text-[10px] font-bold text-yellow-700 uppercase tracking-widest mb-1">TAHMİNİ TAKAS DEĞERİ</p>
                        <span id="ilan-deger" class="text-3xl font-black text-[#0f172a] tracking-tight">-- ₺</span>
                    </div>
                    <div class="mb-10">
                        <h3 class="text-xs font-bold text-gray-700 uppercase tracking-widest mb-3 border-b border-gray-100 pb-2">İLAN AÇIKLAMASI</h3>
                        <p id="ilan-aciklama" class="text-gray-600 font-medium leading-relaxed text-sm whitespace-pre-line">--</p>
                    </div>
                    <div class="flex items-center gap-4 bg-gray-50 border border-gray-100 p-4 rounded-xl mb-8">
                        <div class="w-12 h-12 bg-[#0f172a] rounded-full flex items-center justify-center text-[#facc15] font-black text-lg shadow-sm flex-shrink-0" id="sahip-harf">?</div>
                        <div class="flex-grow min-w-0">
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">İLAN SAHİBİ</p>
                            <h4 id="sahip-email" class="font-bold text-gray-900 text-sm truncate uppercase tracking-tight">--</h4>
                        </div>
                    </div>
                </div>

                <div id="aksiyon-alani" class="mt-auto pt-4 border-t border-gray-100 flex gap-3 opacity-0 transition-opacity duration-500">
                    
                    <button id="detay-kalp-btn" onclick="favoriTetikleDetay()" class="kalp-btn-detay w-14 flex-shrink-0 bg-white border border-gray-200 text-gray-400 rounded-xl flex items-center justify-center hover:bg-gray-50 hover:text-red-500 transition-colors shadow-sm focus:outline-none">
                        <svg id="detay-kalp-ikon" class="w-6 h-6 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>

                    <button id="teklif-btn" onclick="teklifGonder()" class="flex-grow bg-[#0f172a] text-[#facc15] py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-black hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2">
                        TAKAS TEKLİFİ GÖNDER
                    </button>
                </div>

                <div id="kendi-ilanin-uyarisi" class="mt-auto pt-4 border-t border-gray-100 hidden">
                    <div class="w-full bg-gray-100 text-gray-400 py-4 rounded-xl font-black text-sm uppercase tracking-widest border border-gray-200 text-center">
                        BU SİZİN İLANINIZ
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-ikincil" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-900 font-black px-4 py-4 rounded-xl hover:bg-gray-200 transition-colors uppercase text-[10px] tracking-widest">KAPAT</button>
                    <button id="modal-btn-ana" onclick="modalKapat()" class="flex-1 bg-[#0f172a] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">TAMAM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const ilanId = urlParams.get('id');

        let aktifSession = null;
        let ilanVerisi = null;
        let resimDizisi = [];
        let isFavoriMi = false;

        async function sayfaYukle() {
            if (!ilanId) { window.location.href = 'index.html'; return; }

            const { data: { session } } = await _supabase.auth.getSession();
            aktifSession = session;
            menuOlustur();

            const { data, error } = await _supabase.from('ilanlar').select('*').eq('id', ilanId).single();
            if (error || !data) {
                modalAc("Hata", "Bu ilan yayından kaldırılmış veya bulunamıyor.", "hata", false, () => window.location.href = 'index.html');
                return;
            }

            ilanVerisi = data;
            
            // Eğer giriş yapmışsa favori durumunu kontrol et
            if(aktifSession) {
                const { data: favData } = await _supabase.from('favoriler').select('id').eq('ilan_id', ilanId).eq('kullanici_email', aktifSession.user.email);
                if(favData && favData.length > 0) isFavoriMi = true;
            }

            ekraniDoldur();
        }

        function menuOlustur() {
            const menuDiv = document.getElementById('auth-menu');
            if (aktifSession) {
                const user = aktifSession.user;
                const meta = user.user_metadata || {};
                const gorunenIsim = meta.ad_soyad ? meta.ad_soyad.toUpperCase() : user.email.split('@')[0].toUpperCase();
                menuDiv.classList.remove('hidden');
                menuDiv.innerHTML = `<a href="profil.html" class="text-[#facc15] font-black text-xs uppercase tracking-widest">${gorunenIsim}</a> <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest ml-4">İLANLARIM</a> <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest ml-4">ÇIKIŞ</button>`;
            } else {
                menuDiv.classList.remove('hidden');
                menuDiv.innerHTML = `<a href="giris.html" class="bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest">GİRİŞ YAP</a>`;
            }
        }

        function ekraniDoldur() {
            document.getElementById('ilan-baslik').innerText = ilanVerisi.baslik;
            document.getElementById('ilan-aciklama').innerText = ilanVerisi.aciklama;
            document.getElementById('ilan-deger').innerText = ilanVerisi.deger + " ₺";
            document.getElementById('ilan-kategori').innerText = ilanVerisi.kategori || "DİĞER";
            document.getElementById('ilan-no').innerText = "#" + ilanVerisi.id;
            
            const sahipIsim = ilanVerisi.sahip_email.split('@')[0];
            document.getElementById('sahip-email').innerText = sahipIsim;
            document.getElementById('sahip-harf').innerText = sahipIsim.charAt(0).toUpperCase();

            if (ilanVerisi.resim_url && ilanVerisi.resim_url.trim() !== "") {
                resimDizisi = ilanVerisi.resim_url.split(',').map(url => url.trim()).filter(url => url !== "");
                galeriyiOlustur();
            } else {
                document.getElementById('ana-resim').classList.add('hidden');
                document.getElementById('resim-yok-ikon').classList.remove('hidden');
                document.getElementById('resim-yok-ikon').classList.add('flex');
            }

            document.getElementById('detay-alani').classList.remove('opacity-0');

            // Kendi ilanıysa butonları gizle, uyarıyı göster
            if (aktifSession && aktifSession.user.email === ilanVerisi.sahip_email) {
                document.getElementById('aksiyon-alani').classList.add('hidden');
                document.getElementById('kendi-ilanin-uyarisi').classList.remove('hidden');
            } else {
                document.getElementById('aksiyon-alani').classList.remove('opacity-0');
                kalpGorselGuncelle();
            }
        }

        function galeriyiOlustur() {
            const anaResim = document.getElementById('ana-resim');
            const kucukResimlerAlani = document.getElementById('kucuk-resimler-alani');
            anaResim.src = resimDizisi[0];

            if (resimDizisi.length > 1) {
                kucukResimlerAlani.classList.remove('hidden');
                let html = "";
                resimDizisi.forEach((url, index) => {
                    const activeClass = index === 0 ? 'border-[#0f172a] opacity-100 scale-100' : 'border-transparent opacity-60 scale-95';
                    html += `<div onclick="resimDegistir('${url}', this)" class="thumbnail-item w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden cursor-pointer border-2 ${activeClass} bg-gray-50"><img src="${url}" class="w-full h-full object-cover"></div>`;
                });
                kucukResimlerAlani.innerHTML = html;
            }
        }

        window.resimDegistir = function(url, tiklananElement) {
            const anaResim = document.getElementById('ana-resim');
            anaResim.style.opacity = 0; 
            setTimeout(() => { anaResim.src = url; anaResim.style.opacity = 1; }, 150);
            const tumThumbnails = document.querySelectorAll('.thumbnail-item');
            tumThumbnails.forEach(el => { el.className = "thumbnail-item w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden cursor-pointer border-2 border-transparent opacity-60 scale-95 bg-gray-50"; });
            tiklananElement.className = "thumbnail-item w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden cursor-pointer border-2 border-[#0f172a] opacity-100 scale-100 bg-gray-50";
        }

        // YENİ: DETAY SAYFASI İÇİN OPTIMISTIC KALKANI
        async function favoriTetikleDetay() {
            if (!aktifSession) {
                modalAc("GİRİŞ GEREKLİ", "İlanı favoriye eklemek için giriş yapmanız gerekiyor.", "uyari", true, () => window.location.href = 'giris.html');
                document.getElementById('modal-btn-ana').innerText = "GİRİŞ YAP";
                return;
            }

            isFavoriMi = !isFavoriMi; // Durumu tersine çevir
            kalpGorselGuncelle(); // Ekrana anında bas (Bekletme yok)

            if (isFavoriMi) {
                _supabase.from('favoriler').insert([{ ilan_id: ilanId, kullanici_email: aktifSession.user.email }]).then();
            } else {
                _supabase.from('favoriler').delete().eq('ilan_id', ilanId).eq('kullanici_email', aktifSession.user.email).then();
            }
        }

        function kalpGorselGuncelle() {
            const ikon = document.getElementById('detay-kalp-ikon');
            const btn = document.getElementById('detay-kalp-btn');
            
            if(isFavoriMi) {
                ikon.classList.remove('text-gray-400');
                ikon.classList.add('text-red-500', 'fill-current');
                ikon.setAttribute('fill', 'currentColor');
                btn.classList.add('border-red-200', 'bg-red-50');
            } else {
                ikon.classList.remove('text-red-500', 'fill-current');
                ikon.classList.add('text-gray-400');
                ikon.setAttribute('fill', 'none');
                btn.classList.remove('border-red-200', 'bg-red-50');
            }
        }

        async function teklifGonder() {
            if (!aktifSession) { modalAc("GİRİŞ GEREKLİ", "Teklif göndermek için giriş yapmalısınız.", "uyari", true, () => window.location.href = 'giris.html'); return; }
            const btn = document.getElementById('teklif-btn');
            btn.disabled = true; btn.innerText = "İŞLENİYOR...";
            try {
                const { error } = await _supabase.from('teklifler').insert([{ ilan_id: ilanId, teklif_veren_email: aktifSession.user.email, durum: 'Bekliyor' }]);
                if (error) throw error;
                modalAc("TEKLİF İLETİLDİ", "Takas teklifiniz ilan sahibine başarıyla iletildi.", "basarili");
                btn.innerText = "TEKLİF GÖNDERİLDİ";
                btn.className = "flex-grow bg-green-500 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest cursor-not-allowed text-center";
            } catch (err) {
                btn.disabled = false; btn.innerText = "TAKAS TEKLİFİ GÖNDER";
                modalAc("HATA", "Teklif gönderilemedi.", "hata");
            }
        }

        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, isIptal = false, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik; document.getElementById('modal-mesaj').innerText = mesaj; modalOnayFonk = onayFonk;
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
            
            if(isIptal) {
                document.getElementById('modal-btn-ikincil').classList.remove('hidden');
                document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            } else {
                document.getElementById('modal-btn-ikincil').classList.add('hidden');
                document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            }
        }
        function modalKapat() { document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0'); setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300); }
        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sayfaYukle();
    </script>
</body>
</html>
