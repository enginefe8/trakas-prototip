<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Detayı - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <nav class="bg-gray-900 p-3 md:p-4 sticky top-0 z-50 shadow-xl flex-shrink-0 relative">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-2xl md:text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            </div>
            
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-white font-bold text-xs uppercase hover:text-yellow-500 transition-colors flex items-center gap-2 tracking-widest">
                    <span>← Vitrine Dön</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10 w-full flex-grow">
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            
            <div class="flex flex-col lg:flex-row">
                <div class="lg:w-1/2 bg-gray-100 relative group min-h-[400px] flex items-center justify-center border-r border-gray-50">
                    <div id="resim-alani" class="w-full h-full">
                        <div class="w-full h-full flex items-center justify-center animate-pulse bg-gray-200"></div>
                    </div>
                </div>

                <div class="lg:w-1/2 p-6 md:p-12 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center gap-3 mb-4">
                            <span id="ilan-kategori" class="bg-gray-900 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">Yükleniyor</span>
                            <span id="ilan-no" class="text-gray-400 text-[10px] font-bold uppercase tracking-widest"></span>
                        </div>

                        <h1 id="ilan-baslik" class="text-3xl md:text-4xl font-black text-gray-900 uppercase italic tracking-tight mb-4">Yükleniyor...</h1>
                        
                        <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-8 inline-block">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Tahmini Takas Değeri</p>
                            <span id="ilan-deger" class="text-2xl font-black text-gray-900">-- ₺</span>
                        </div>

                        <div class="mb-10">
                            <h3 class="text-xs font-black text-gray-900 uppercase tracking-widest mb-3 border-b border-gray-100 pb-2">İlan Açıklaması</h3>
                            <p id="ilan-aciklama" class="text-gray-600 font-medium leading-relaxed text-sm">--</p>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="flex items-center gap-4 bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                            <div class="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center text-yellow-500 font-black text-lg shadow-md">
                                <span id="sahip-harf">?</span>
                            </div>
                            <div class="flex-grow">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">İlan Sahibi</p>
                                <h4 id="sahip-email" class="font-bold text-gray-900 text-sm truncate tracking-tight">--</h4>
                            </div>
                        </div>

                        <button id="teklif-btn" onclick="teklifVer()" class="w-full bg-yellow-500 text-gray-900 py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover:bg-yellow-400 hover:-translate-y-1 transition-all">
                            Takas Teklifi Gönder
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-10 text-center border-t-4 border-yellow-500 flex-shrink-0 mt-auto">
        <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest">© 2026 Trakas • Bursa, Türkiye</p>
    </footer>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4"></div>
                <h3 id="modal-baslik" class="text-lg font-black text-gray-900 mb-2 uppercase tracking-wide">Uyarı</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <button onclick="modalKapat()" class="w-full bg-gray-900 text-white font-bold px-4 py-3 rounded-lg hover:bg-gray-800 transition-colors uppercase text-xs tracking-wide">Tamam</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const ilanId = urlParams.get('id');

        let ilanVerisi = null;

        async function ilaniYukle() {
            if (!ilanId) { window.location.href = 'index.html'; return; }

            const { data, error } = await _supabase.from('ilanlar').select('*').eq('id', ilanId).single();
            
            if (error || !data) {
                modalAc("Hata", "İlan bulunamadı.", "hata");
                return;
            }

            ilanVerisi = data;
            document.getElementById('ilan-baslik').innerText = data.baslik;
            document.getElementById('ilan-aciklama').innerText = data.aciklama;
            document.getElementById('ilan-deger').innerText = data.deger + " ₺";
            document.getElementById('ilan-kategori').innerText = data.kategori || "DİĞER";
            document.getElementById('ilan-no').innerText = "İLAN NO: #" + data.id;
            document.getElementById('sahip-email').innerText = data.sahip_email;
            document.getElementById('sahip-harf').innerText = data.sahip_email.charAt(0).toUpperCase();

            const resimAlani = document.getElementById('resim-alani');
            if (data.resim_url) {
                const resimler = data.resim_url.split(',');
                resimAlani.innerHTML = `<img src="${resimler[0]}" class="w-full h-full object-cover">`;
            } else {
                resimAlani.innerHTML = `<div class="w-full h-full flex items-center justify-center text-gray-300 font-black uppercase text-xs">Görsel Mevcut Değil</div>`;
            }
        }

        async function teklifVer() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                modalAc("Giriş Yapmalısınız", "Teklif göndermek için önce giriş yapmanız gerekmektedir.", "uyari");
                return;
            }

            if (session.user.email === ilanVerisi.sahip_email) {
                modalAc("Hata", "Kendi ilanınıza teklif veremezsiniz.", "hata");
                return;
            }

            const btn = document.getElementById('teklif-btn');
            btn.disabled = true;
            btn.innerText = "İŞLENİYOR...";

            const { error } = await _supabase.from('teklifler').insert([
                { ilan_id: ilanId, teklif_veren_email: session.user.email }
            ]);

            if (error) {
                modalAc("Hata", "Teklif gönderilemedi: " + error.message, "hata");
                btn.disabled = false;
                btn.innerText = "TAKAS TEKLİFİ GÖNDER";
            } else {
                modalAc("Başarılı", "Takas teklifiniz başarıyla iletildi.", "basarili");
                btn.innerText = "TEKLİF GÖNDERİLDİ";
                btn.className = "w-full bg-green-500 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest cursor-not-allowed";
            }
        }

        function modalAc(baslik, mesaj, tip) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-12 w-12 rounded-full bg-green-100 mb-4 flex items-center justify-center text-green-600 font-bold text-xl"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-12 w-12 rounded-full bg-red-100 mb-4 flex items-center justify-center text-red-600 font-bold text-xl"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-12 w-12 rounded-full bg-yellow-100 mb-4 flex items-center justify-center text-yellow-600 font-bold text-xl"; ikon.innerHTML = "?"; }
            
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() { document.getElementById('ozel-modal').classList.add('hidden'); document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0'); }

        ilaniYukle();
    </script>
</body>
</html>
