<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Detayı - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors flex items-center gap-2">
                    <span>← Vitrine Dön</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 mt-4">
        <div id="detay-kutusu" class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col md:flex-row min-h-[500px]">
            <p class="text-center text-gray-400 italic py-20 font-bold tracking-widest uppercase w-full">İlan bilgileri yükleniyor...</p>
        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-yellow-50 mb-4 border-4 border-white shadow-sm">
                    <span class="text-3xl">🤔</span>
                </div>
                <h3 id="modal-baslik" class="text-2xl font-black text-gray-900 mb-2 italic uppercase tracking-tight">Uyarı</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-iptal" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-700 font-bold px-4 py-3 rounded-xl hover:bg-gray-200 transition-colors uppercase text-xs tracking-wide">İptal</button>
                    <button id="modal-btn-onay" class="flex-1 bg-yellow-500 text-gray-900 font-black px-4 py-3 rounded-xl hover:bg-yellow-400 transition-colors uppercase text-xs tracking-wide shadow-md">Tamam</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MODAL MOTORU ---
        window.modalAc = function(baslik, mesaj, ikon, isConfirm, onayFonk = null) {
            const modal = document.getElementById('ozel-modal');
            const kutu = document.getElementById('ozel-modal-kutu');
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            document.getElementById('modal-ikon').innerHTML = `<span class="text-3xl">${ikon}</span>`;
            const btnIptal = document.getElementById('modal-btn-iptal');
            const btnOnay = document.getElementById('modal-btn-onay');

            btnOnay.onclick = function() {
                modalKapat();
                if (onayFonk) onayFonk();
            };

            if (isConfirm) {
                btnIptal.classList.remove('hidden'); btnIptal.classList.add('block');
                btnOnay.innerText = "Evet, Gönder";
            } else {
                btnIptal.classList.remove('block'); btnIptal.classList.add('hidden');
                btnOnay.innerText = "Tamam";
            }

            modal.classList.remove('hidden');
            setTimeout(() => { kutu.classList.remove('scale-95', 'opacity-0'); kutu.classList.add('scale-100', 'opacity-100'); }, 10);
        }

        window.modalKapat = function() {
            const modal = document.getElementById('ozel-modal');
            const kutu = document.getElementById('ozel-modal-kutu');
            kutu.classList.remove('scale-100', 'opacity-100'); kutu.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // --- SUPABASE BAĞLANTISI ---
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let guncelIlan = null;

        // URL'den ID'yi al
        const urlParams = new URLSearchParams(window.location.search);
        const ilanId = urlParams.get('id');

        async function detayiGetir() {
            if (!ilanId) {
                document.getElementById('detay-kutusu').innerHTML = `<div class="w-full flex items-center justify-center p-10"><p class="text-red-500 font-bold text-xl">Hata: İlan ID bulunamadı!</p></div>`;
                return;
            }

            const { data, error } = await _supabase.from('ilanlar').select('*').eq('id', ilanId).single();

            if (error || !data) {
                document.getElementById('detay-kutusu').innerHTML = `<div class="w-full flex items-center justify-center p-10"><p class="text-red-500 font-bold text-xl">İlan bulunamadı veya silinmiş olabilir.</p></div>`;
                return;
            }

            guncelIlan = data;
            ekranaBas(data);
        }

        function ekranaBas(ilan) {
            // Resimleri parçala (virgülle ayrılmış url'ler)
            let resimler = ilan.resim_url ? ilan.resim_url.split(',') : [];
            let anaResim = resimler.length > 0 ? resimler[0] : "";
            
            // Eğer resim yoksa ikon göster
            let solTarafHTML = `
                <div class="w-full md:w-1/2 bg-gray-100 flex flex-col border-b md:border-b-0 md:border-r border-gray-100">
                    <div class="w-full h-[300px] md:h-[500px] flex items-center justify-center relative bg-gray-900">
                        ${anaResim ? `<img id="ana-gorsel" src="${anaResim}" class="w-full h-full object-contain">` : `<span class="text-6xl">📸</span>`}
                    </div>
            `;

            // Eğer 1'den fazla resim varsa galeri oluştur
            if (resimler.length > 1) {
                solTarafHTML += `<div class="flex gap-2 p-4 overflow-x-auto bg-gray-50 border-t border-gray-200">`;
                resimler.forEach(url => {
                    solTarafHTML += `<img src="${url}" onclick="resimDegistir('${url}')" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-yellow-500 transition-colors shadow-sm">`;
                });
                solTarafHTML += `</div>`;
            }
            solTarafHTML += `</div>`;

            const kategori = ilan.kategori || 'Diğer';
            const ilanSahibi = ilan.kullanici_email.split('@')[0];

            let sagTarafHTML = `
                <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-between bg-white">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-gray-200 text-gray-700 font-black uppercase text-xs tracking-widest px-3 py-1.5 rounded-lg">${kategori}</span>
                            <span class="text-gray-400 text-sm font-medium">İlan No: #${ilan.id}</span>
                        </div>
                        
                        <h1 class="text-3xl md:text-4xl font-black text-gray-900 uppercase italic leading-tight mb-2">${ilan.baslik}</h1>
                        <p class="text-3xl font-black text-green-600 mb-6">${ilan.deger} TL <span class="text-sm text-gray-400 font-medium tracking-normal">Tahmini Değer</span></p>
                        
                        <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100 mb-6">
                            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-200 pb-2">İlan Açıklaması</h3>
                            <p class="text-gray-700 font-medium leading-relaxed whitespace-pre-wrap">${ilan.aciklama}</p>
                        </div>
                        
                        <div class="flex items-center gap-3 mb-8 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-lg">
                                ${ilanSahibi.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">İlan Sahibi</p>
                                <p class="text-blue-900 font-bold">@${ilanSahibi}</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 mt-4">
                        <button onclick="teklifVer(${ilan.id}, '${ilan.kullanici_email}')" class="flex-grow bg-yellow-500 text-gray-900 py-4 rounded-xl font-black text-sm md:text-base uppercase tracking-wider shadow-lg hover:bg-yellow-400 hover:-translate-y-1 transition-all flex justify-center items-center gap-2">
                            <span>Teklif Gönder</span> 🤝
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('detay-kutusu').innerHTML = solTarafHTML + sagTarafHTML;
        }

        window.resimDegistir = function(url) {
            document.getElementById('ana-gorsel').src = url;
        }

        // --- TEKLİF SİSTEMİ (Özel Modallı ve Kendi İlanı Korumalı) ---
        async function teklifVer(id, ilanSahibiEmail) {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (!session) { 
                modalAc("Giriş Yapmalısın", "Bu ilana teklif göndermek için önce giriş yapman gerekiyor.", "🔒", false, () => {
                    window.location.href = 'giris.html';
                });
                return; 
            }

            if (session.user.email === ilanSahibiEmail) {
                modalAc("Yok Artık!", "Kendi ilanına teklif verip kendi kendinle mi pazarlık yapacaksın usta? 😂", "🤦‍♂️", false);
                return;
            }
            
            const { data: mevcutTeklif } = await _supabase.from('teklifler').select('id').eq('ilan_id', id).eq('teklif_veren_email', session.user.email);
            if (mevcutTeklif && mevcutTeklif.length > 0) { 
                modalAc("Zaten Teklif Verdin", "Bu ilana zaten bir teklif gönderdin. İlan sahibinin yanıtını beklemelisin.", "⏳", false);
                return; 
            }
            
            modalAc("Teklif Gönderilsin mi?", "Bu ilan için takas teklifi göndermek istediğine emin misin?", "🤝", true, async () => {
                const { error } = await _supabase.from('teklifler').insert([{ ilan_id: id, teklif_veren_email: session.user.email }]);
                if (error) {
                    modalAc("Hata", error.message, "❌", false);
                } else {
                    modalAc("Başarılı", "Teklifin başarıyla karşı tarafa iletildi! Mesajlarım ve Tekliflerim bölümünden takip edebilirsin.", "✅", false);
                }
            });
        }

        detayiGetir();
    </script>
</body>
</html>
