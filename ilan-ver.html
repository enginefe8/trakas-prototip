<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlan Ver - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-gray-900 p-3 shadow-xl z-50 flex-shrink-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-black text-white italic tracking-tighter uppercase hover:text-yellow-500 transition-colors">TRAKAS</a>
            
            <div id="user-panel" class="hidden items-center gap-4">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest hidden md:block"></span>
                <a href="ilanlarim.html" class="text-gray-300 font-bold text-[10px] md:text-xs uppercase hover:text-white transition-colors">Panele Git</a>
                <button onclick="cikisYap()" class="text-red-400 font-bold text-[10px] md:text-xs uppercase hover:text-red-300 ml-2">Çıkış</button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8 flex-grow w-full">
        
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-gray-900 uppercase italic tracking-tight">Yeni İlan Oluştur</h1>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Takas platformuna ürün ekleyin</p>
            </div>
            <a href="index.html" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-gray-900 transition-colors bg-gray-200 px-3 py-1.5 rounded-lg">İptal Et</a>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden p-5 md:p-10">
            <form id="ilan-formu" onsubmit="ilanGonder(event)" class="space-y-6">
                
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">İlan Başlığı</label>
                    <input type="text" id="baslik" required placeholder="Örn: Temiz iPhone 13 Pro" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-sm font-medium transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Kategori</label>
                        <select id="kategori" required class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-sm font-medium transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Kategori Seçin</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="Giyim & Aksesuar">Giyim & Aksesuar</option>
                            <option value="Araç">Araç</option>
                            <option value="Ev & Yaşam">Ev & Yaşam</option>
                            <option value="Eğlence & Hobi">Eğlence & Hobi</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tahmini Takas Değeri (₺)</label>
                        <input type="number" id="deger" required placeholder="Örn: 35000" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-sm font-medium transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">İlan Açıklaması</label>
                    <textarea id="aciklama" required rows="4" placeholder="Ürünün durumu, kullanım süresi ve takas etmek istediğiniz ürünler hakkında detay verin..." class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-sm font-medium transition-all resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Ürün Görseli</label>
                    <div class="relative w-full bg-gray-50 border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:bg-gray-100 transition-colors flex flex-col items-center justify-center group overflow-hidden">
                        
                        <input type="file" id="resim_dosya" required accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="resimOnizleme(this)">
                        
                        <div id="resim-secici-icerik" class="flex flex-col items-center transition-all duration-300">
                            <svg class="w-10 h-10 text-gray-400 group-hover:text-yellow-500 transition-colors mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <p class="text-sm font-bold text-gray-700">Resim Seçmek İçin Tıklayın</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Veya sürükleyip bırakın (Max 5MB)</p>
                        </div>

                        <div id="resim-onizleme-alani" class="hidden absolute inset-0 w-full h-full bg-gray-900 z-0">
                            <img id="onizleme-resmi" class="w-full h-full object-cover opacity-80">
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity bg-black/50 z-20">
                                <span class="text-white text-xs font-black uppercase tracking-widest bg-gray-900/80 px-4 py-2 rounded-lg border border-gray-700">Resmi Değiştir</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-yellow-500 py-5 rounded-xl font-black text-sm uppercase tracking-widest shadow-xl hover:bg-black hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        İlanı Yayına Al
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <button id="modal-btn-ana" onclick="modalKapat()" class="w-full bg-gray-900 text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">Tamam</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";

        async function yetkiKontrol() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            document.getElementById('user-panel').classList.replace('hidden', 'flex');
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();
        }

        // Seçilen resmi ekranda gösterme (Önizleme)
        function resimOnizleme(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('resim-secici-icerik').classList.add('hidden');
                    document.getElementById('resim-onizleme-alani').classList.remove('hidden');
                    document.getElementById('onizleme-resmi').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function ilanGonder(event) {
            event.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const orijinalHTML = btn.innerHTML;
            
            // Yükleniyor Animasyonu
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-yellow-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> SİSTEME İŞLENİYOR...`;
            btn.classList.add('cursor-not-allowed', 'opacity-90');

            try {
                const baslik = document.getElementById('baslik').value.trim();
                const aciklama = document.getElementById('aciklama').value.trim();
                const kategori = document.getElementById('kategori').value;
                const deger = document.getElementById('deger').value;
                const dosya = document.getElementById('resim_dosya').files[0];
                let finalResimUrl = "";

                // DOSYA YÜKLEME İŞLEMİ (Supabase Storage)
                if (dosya) {
                    const dosyaUzantisi = dosya.name.split('.').pop();
                    const dosyaAdi = `${Date.now()}-${Math.random().toString(36).substring(7)}.${dosyaUzantisi}`;
                    
                    // ÖNEMLİ: Eğer kovanın (bucket) adı 'ilan-resimleri' değilse, aşağıdaki kısmı kendi kova adınla değiştir.
                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('ilan-resimleri') 
                        .upload(dosyaAdi, dosya);

                    if (uploadError) throw new Error("Resim yüklenemedi: " + uploadError.message);

                    const { data: urlData } = _supabase.storage
                        .from('ilan-resimleri')
                        .getPublicUrl(dosyaAdi);

                    finalResimUrl = urlData.publicUrl;
                }

                // VERİTABANINA KAYIT İŞLEMİ
                const { error: dbError } = await _supabase.from('ilanlar').insert([
                    {
                        sahip_email: benimEmailim,
                        baslik: baslik,
                        aciklama: aciklama,
                        kategori: kategori,
                        deger: deger,
                        resim_url: finalResimUrl,
                        durum: 'Aktif'
                    }
                ]);

                if (dbError) throw dbError;

                document.getElementById('ilan-formu').reset();
                modalAc("Başarılı", "İlanınız ve görseliniz başarıyla sisteme yüklendi. Vitrine yönlendiriliyorsunuz...", "basarili", () => window.location.href = 'index.html');
                
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = orijinalHTML;
                btn.classList.remove('cursor-not-allowed', 'opacity-90');
                
                // Eğer hata Storage (Kova bulunamadı vb) ise özel mesaj ver
                let hataMesaji = err.message;
                if(hataMesaji.includes('Bucket not found')) {
                    hataMesaji = "Supabase panelinde 'ilan-resimleri' adında bir Storage (Kova) oluşturmanız gerekiyor.";
                }
                
                modalAc("Hata", hataMesaji, "hata");
            }
        }

        // Modal Fonksiyonları
        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { 
                ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; 
                ikon.innerHTML = "✓"; 
            } else { 
                ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; 
                ikon.innerHTML = "!"; 
            }
            
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);

            if(tip === 'basarili' && onayFonk) setTimeout(() => { modalKapat(); onayFonk(); }, 2500);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
            if(modalOnayFonk && document.getElementById('modal-ikon').innerText === '!') modalOnayFonk = null;
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        yetkiKontrol();
    </script>
</body>
</html>
