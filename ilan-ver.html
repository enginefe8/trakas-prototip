<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Ver - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic">TRAKAS</a>
            <a href="index.html" class="text-gray-300 hover:text-white font-bold text-sm uppercase tracking-widest transition-all">← Ana Sayfaya Dön</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 mt-8">
        <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
            <h2 class="text-3xl font-black text-gray-800 mb-8 uppercase italic border-b-4 border-yellow-500 inline-block pb-2">Yeni İlan Ekle</h2>
            
            <div class="space-y-6">
                <label for="resim-input" class="block border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center hover:bg-gray-50 transition-all cursor-pointer group">
                    <div class="text-5xl mb-2 group-hover:scale-110 transition-transform">📸</div>
                    <p id="dosya-adi-goster" class="font-bold text-gray-500">Fotoğraf Seçmek İçin Tıkla</p>
                    <input type="file" id="resim-input" accept="image/*" class="hidden" onchange="dosyaSecildi(this)">
                </label>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-sm font-bold text-gray-600 uppercase tracking-widest block mb-2">Ürün Adı</label>
                        <input id="baslik" type="text" placeholder="Örn: PlayStation 5" class="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:border-yellow-500 focus:bg-white transition-all text-lg">
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 uppercase tracking-widest block mb-2">Tahmini Değer (TL)</label>
                        <input id="deger" type="number" placeholder="Örn: 22000" class="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:border-yellow-500 focus:bg-white transition-all text-lg">
                    </div>
                </div>

                <div>
                    <label class="text-sm font-bold text-gray-600 uppercase tracking-widest block mb-2">Takas Tercihi & Detaylar</label>
                    <textarea id="aciklama" rows="4" placeholder="Ürünün durumu nedir? Hangi ürünlerle takas düşünürsün?" class="w-full p-4 rounded-xl border border-gray-200 bg-gray-50 outline-none focus:border-yellow-500 focus:bg-white transition-all text-lg"></textarea>
                </div>

                <button onclick="ilanGonder()" class="w-full bg-gray-900 text-white font-black py-5 rounded-xl hover:bg-yellow-500 hover:text-gray-900 transition-all uppercase tracking-widest text-lg mt-4 shadow-xl shadow-gray-200">
                    🚀 İlanı Yayına Al
                </button>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Kullanıcı fotoğraf seçtiğinde adını ekranda gösterelim
        function dosyaSecildi(input) {
            const yaziAlan = document.getElementById('dosya-adi-goster');
            if (input.files && input.files[0]) {
                yaziAlan.innerHTML = "<span class='text-green-600'>Seçilen Fotoğraf: " + input.files[0].name + "</span>";
            } else {
                yaziAlan.innerHTML = "Fotoğraf Seçmek İçin Tıkla";
            }
        }

        async function ilanGonder() {
            const baslik = document.getElementById('baslik').value;
            const deger = document.getElementById('deger').value;
            const aciklama = document.getElementById('aciklama').value;
            const resimDosyasi = document.getElementById('resim-input').files[0];

            if (!baslik || !deger) {
                alert("Lütfen ürün adı ve değerini boş bırakma!");
                return;
            }

            const btn = document.querySelector('button[onclick="ilanGonder()"]');
            const eskiYazi = btn.innerHTML;
            btn.innerHTML = "⏳ Fotoğraf Yükleniyor, Lütfen Bekle...";
            btn.disabled = true;

            let resimUrl = null;

            // Eğer kullanıcı fotoğraf seçtiyse önce onu Supabase Storage'a yükleyelim
            if (resimDosyasi) {
                // Aynı isimli dosyalar çakışmasın diye başına tarih/saat ekliyoruz
                const dosyaIsmi = Date.now() + '-' + resimDosyasi.name;
                
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('ilan-resimleri')
                    .upload(dosyaIsmi, resimDosyasi);

                if (uploadError) {
                    alert("Fotoğraf yüklenemedi: " + uploadError.message);
                    btn.innerHTML = eskiYazi;
                    btn.disabled = false;
                    return;
                }

                // Yüklenen fotoğrafın açık linkini alıyoruz
                const { data: publicUrlData } = _supabase.storage
                    .from('ilan-resimleri')
                    .getPublicUrl(dosyaIsmi);
                
                resimUrl = publicUrlData.publicUrl;
            }

            // Şimdi ilanın tamamını (resim linki dahil) veritabanına kaydediyoruz
            const { error } = await _supabase
                .from('ilanlar')
                .insert([{ baslik: baslik, deger: deger, aciklama: aciklama, resim_url: resimUrl }]);

            if (error) {
                alert("Hata oluştu: " + error.message);
                btn.innerHTML = eskiYazi;
                btn.disabled = false;
            } else {
                alert("Harika! İlanın vitrine eklendi.");
                window.location.href = 'index.html'; 
            }
        }
    </script>
</body>
</html>
