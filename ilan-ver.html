<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Ver - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors">← VİTRİNE DÖN</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 mt-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h1 class="text-3xl font-black text-gray-900 uppercase italic tracking-tight mb-2">Yeni İlan Ver 📦</h1>
            <p class="text-gray-500 font-medium text-sm mb-8 border-b-2 border-gray-100 pb-4">Eşyalarını takaslamak için harika bir gün!</p>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-gray-700 uppercase tracking-widest mb-2">İlan Başlığı</label>
                    <input type="text" id="baslik" placeholder="Örn: Temiz iPhone 13" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 outline-none transition-all font-bold text-gray-800">
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-700 uppercase tracking-widest mb-2">Değer / Fiyat (TL)</label>
                    <input type="number" id="deger" placeholder="Örn: 25000" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 outline-none transition-all font-bold text-green-600">
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-700 uppercase tracking-widest mb-2">Resim URL (Link olarak)</label>
                    <input type="text" id="resim_url" placeholder="https://resim-linki.com/resim.jpg" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 outline-none transition-all text-sm">
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-700 uppercase tracking-widest mb-2">Açıklama & Takas Tercihi</label>
                    <textarea id="aciklama" rows="4" placeholder="Ne ile takaslamak istersin? Ürünün durumu nasıl?" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 outline-none transition-all text-sm font-medium text-gray-700"></textarea>
                </div>

                <button onclick="ilanKaydet()" class="w-full bg-yellow-500 text-gray-900 py-4 rounded-xl font-black text-lg uppercase tracking-widest hover:bg-yellow-400 transition-all shadow-lg shadow-yellow-100 mt-4">
                    İLAN VER VE VİTRİNE ÇIK 🚀
                </button>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Sayfa açıldığında giriş yapılmış mı kontrol et
        async function kontrolEt() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                alert("İlan vermek için önce giriş yapmalısın!");
                window.location.href = 'giris.html';
            }
        }
        kontrolEt();

        async function ilanKaydet() {
            const baslik = document.getElementById('baslik').value;
            const deger = document.getElementById('deger').value;
            const resim_url = document.getElementById('resim_url').value;
            const aciklama = document.getElementById('aciklama').value;

            if (!baslik || !deger || !aciklama) {
                alert("Lütfen başlık, değer ve açıklama alanlarını doldur!");
                return;
            }

            // Oturumu tekrar al (E-postayı kaydetmek için)
            const { data: { session } } = await _supabase.auth.getSession();

            // Veritabanına kaydet (YENİ: sahip_email eklendi!)
            const { error } = await _supabase.from('ilanlar').insert([
                { 
                    baslik: baslik, 
                    deger: deger, 
                    resim_url: resim_url, 
                    aciklama: aciklama,
                    sahip_email: session.user.email 
                }
            ]);

            if (error) {
                alert("İlan verilirken hata oluştu: " + error.message);
            } else {
                alert("Tebrikler! İlanın vitrine eklendi. 🎉");
                window.location.href = 'index.html'; // Başarılıysa vitrine yolla
            }
        }
    </script>
</body>
</html>
