<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yeni İlan Ekle - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#111827] px-6 py-4 flex justify-between items-center shadow-md">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div class="flex items-center gap-6">
            <span id="user-name" class="text-yellow-500 font-bold text-sm uppercase tracking-widest hidden md:block"></span>
            <a href="index.html" class="text-white font-bold text-sm uppercase tracking-wider hover:text-gray-300 transition-colors flex items-center gap-2">
                <span>←</span> VİTRİNE DÖN
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 w-full flex-grow flex items-start justify-center mt-4 md:mt-8">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full p-8 md:p-12">
            
            <div class="mb-8">
                <h1 class="text-3xl md:text-4xl font-black text-[#111827] italic tracking-tight uppercase mb-2">YENİ İLAN OLUŞTUR</h1>
                <p class="text-gray-500 font-medium text-sm">Takas etmek istediğiniz ürünün detaylarını eksiksiz doldurun.</p>
                <div class="h-px bg-gray-100 w-full mt-6"></div>
            </div>

            <form id="ilan-formu" onsubmit="ilanGonder(event)" class="space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">
                            İLAN BAŞLIĞI <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="baslik" required placeholder="Örn: Temiz iPhone 13 Pro" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all text-gray-800 placeholder-gray-400">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">
                            KATEGORİ <span class="text-red-500">*</span>
                        </label>
                        <select id="kategori" required class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all text-gray-800 appearance-none cursor-pointer">
                            <option value="" disabled selected>Kategori Seçiniz</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="Giyim & Aksesuar">Giyim & Aksesuar</option>
                            <option value="Araç">Araç</option>
                            <option value="Ev & Yaşam">Ev & Yaşam</option>
                            <option value="Eğlence & Hobi">Eğlence & Hobi</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                </div>

                <div class="w-full md:w-1/2 md:pr-4">
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">
                        TAHMİNİ DEĞER (TL) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" id="deger" required placeholder="Örn: 35000" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all text-gray-800 placeholder-gray-400">
                    <p class="text-[10px] text-gray-400 mt-2 font-medium">Bu değer, takas tekliflerinin dengeli olması için referans olarak kullanılacaktır.</p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">
                        ÜRÜN AÇIKLAMASI VE TAKAS TERCİHLERİ <span class="text-red-500">*</span>
                    </label>
                    <textarea id="aciklama" required rows="4" placeholder="Ürününüzün durumunu, varsa kusurlarını ve ne tür ürünlerle takas düşündüğünüzü detaylıca yazın." class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm font-medium transition-all resize-none text-gray-800 placeholder-gray-400"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-widest mb-3">
                        ÜRÜN GÖRSELLERİ <span class="text-red-500">*</span>
                    </label>
                    
                    <div class="relative w-full bg-white border-2 border-dashed border-gray-300 rounded-2xl p-6 transition-all hover:border-gray-400 hover:bg-gray-50">
                        
                        <input type="file" id="resim_dosyalar" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="resimOnizleme(this)">
                        
                        <div id="resim-secici-icerik" class="flex flex-col items-center justify-center text-center transition-all duration-300 pointer-events-none min-h-[80px]">
                            </div>
                    </div>

                    <div id="resim-grid-alani" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6 hidden">
                        </div>
                </div>

                <div class="pt-6 border-t border-gray-100">
                    <button type="submit" id="submit-btn" class="w-full md:w-auto md:px-12 bg-[#111827] text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-black hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2">
                        İlanı Yayına Al
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <button id="modal-btn-ana" onclick="modalKapat()" class="w-full bg-[#111827] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">Tamam</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let secilenDosyalar = [];

        async function yetkiKontrol() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();
            
            // Sayfa yüklendiğinde kutunun ilk halini çiz
            renderPreviews();
        }

        function resimOnizleme(input) {
            if (input.files) {
                const newFiles = Array.from(input.files);
                if(secilenDosyalar.length + newFiles.length > 8) {
                    modalAc("Sınır Aşıldı", "Maksimum 8 resim yükleyebilirsiniz.", "uyari");
                    input.value = "";
                    return;
                }
                secilenDosyalar = [...secilenDosyalar, ...newFiles];
                input.value = ""; 
                renderPreviews();
            }
        }

        function resimSil(index) {
            secilenDosyalar.splice(index, 1);
            renderPreviews();
        }

        function renderPreviews() {
            const grid = document.getElementById('resim-grid-alani');
            const seciciIcerik = document.getElementById('resim-secici-icerik');
            
            grid.innerHTML = "";
            
            // KUTU TASARIMINI DURUMA GÖRE GÜNCELLE
            if(secilenDosyalar.length === 0) {
                grid.classList.add('hidden');
                seciciIcerik.innerHTML = `
                    <svg class="w-10 h-10 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <p class="text-sm font-bold text-gray-600">Görsel Seç / Sürükle Bırak</p>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Maksimum 8 Görsel Yükleyebilirsiniz</p>
                `;
                return;
            } else {
                grid.classList.remove('hidden');
                seciciIcerik.innerHTML = `
                    <svg class="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Daha Fazla Görsel Ekle</p>
                `;
            }

            // SEÇİLEN RESİMLERİ ÇİZ
            secilenDosyalar.forEach((dosya, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const thumbnailHtml = `
                    <div class="relative group aspect-square bg-gray-50 border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                        <img src="${e.target.result}" class="w-full h-full object-cover">
                        <button type="button" onclick="resimSil(${index})" class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center font-bold text-sm opacity-0 group-hover:opacity-100 transition-opacity z-20 shadow-md">×</button>
                    </div>`;
                    grid.insertAdjacentHTML('beforeend', thumbnailHtml);
                }
                reader.readAsDataURL(dosya);
            });
        }

        async function ilanGonder(event) {
            event.preventDefault();
            
            if(secilenDosyalar.length === 0) {
                modalAc("Eksik Bilgi", "Lütfen en az bir adet ürün görseli ekleyin.", "uyari");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const orijinalHTML = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> İŞLENİYOR...`;
            btn.classList.add('cursor-not-allowed', 'opacity-90');

            try {
                const baslik = document.getElementById('baslik').value.trim();
                const aciklama = document.getElementById('aciklama').value.trim();
                const kategori = document.getElementById('kategori').value;
                const deger = document.getElementById('deger').value;
                
                let yuklenenUrlDizisi = [];
                const storageBucket = _supabase.storage.from('ilan-resimleri');

                for(const dosya of secilenDosyalar) {
                    const dosyaUzantisi = dosya.name.split('.').pop();
                    const dosyaAdi = `${Date.now()}-${Math.random().toString(36).substring(7)}.${dosyaUzantisi}`;
                    
                    const { data: uploadData, error: uploadError } = await storageBucket.upload(dosyaAdi, dosya);

                    if (uploadError) throw new Error(`${dosya.name} yüklenemedi: ${uploadError.message}`);

                    const { data: urlData } = storageBucket.getPublicUrl(dosyaAdi);
                    yuklenenUrlDizisi.push(urlData.publicUrl);
                }

                const finalResimMetni = yuklenenUrlDizisi.join(',');

                const { error: dbError } = await _supabase.from('ilanlar').insert([
                    {
                        sahip_email: benimEmailim,
                        baslik: baslik,
                        aciklama: aciklama,
                        kategori: kategori,
                        deger: deger,
                        resim_url: finalResimMetni
                    }
                ]);

                if (dbError) throw dbError;

                document.getElementById('ilan-formu').reset();
                secilenDosyalar = [];
                renderPreviews();
                modalAc("Başarılı", "İlanınız ve tüm görselleriniz başarıyla yüklendi. Vitrine yönlendiriliyorsunuz...", "basarili", () => window.location.href = 'index.html');
                
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = orijinalHTML;
                btn.classList.remove('cursor-not-allowed', 'opacity-90');
                
                let hataMesaji = err.message;
                if(hataMesaji.includes('Bucket not found')) {
                    hataMesaji = "Supabase panelinde 'ilan-resimleri' adında bir Storage (Kova) oluşturmanız gerekiyor.";
                }
                
                modalAc("Hata", hataMesaji, "hata");
            }
        }

        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { 
                ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; 
                ikon.innerHTML = "✓"; 
            } else if (tip === 'hata') { 
                ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; 
                ikon.innerHTML = "!"; 
            } else { 
                 ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; 
                ikon.innerHTML = "?"; 
            }
            
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);

            if(tip === 'basarili' && onayFonk) setTimeout(() => { modalKapat(); onayFonk(); }, 2500);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
            if(modalOnayFonk && (document.getElementById('modal-ikon').innerText === '!' || document.getElementById('modal-ikon').innerText === '?')) modalOnayFonk = null;
        }

        yetkiKontrol();
    </script>
</body>
</html>
