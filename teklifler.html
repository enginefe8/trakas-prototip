<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teklif Yönetimi - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        /* Sekme geçişleri için yumuşaklık */
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50 relative">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div id="auth-menu" class="hidden lg:flex items-center gap-6"></div>
        <div id="auth-menu-mobil" class="lg:hidden flex items-center gap-3"></div>
        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-[#0f172a] border-t border-gray-800 shadow-2xl flex-col z-50"></div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 w-full flex-grow">
        
        <div class="mb-10 border-b border-gray-200 pb-6">
            <h1 class="text-3xl md:text-4xl font-black text-[#0f172a] tracking-tight uppercase mb-2 flex items-center gap-3">
                <svg class="w-8 h-8 text-[#facc15]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                TEKLİF YÖNETİMİ
            </h1>
            <p class="text-gray-500 font-medium text-sm">Gelen ve giden takas tekliflerinizi buradan profesyonelce yönetin.</p>
        </div>

        <div id="yukleniyor" class="py-20 flex flex-col items-center justify-center w-full">
            <svg class="animate-spin h-10 w-10 text-[#0f172a] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">VERİLER ÇEKİLİYOR...</span>
        </div>

        <div id="panel-alani" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            
            <div class="flex border-b border-gray-100 bg-gray-50/50">
                <button onclick="sekmeDegistir('gelen')" id="tab-gelen" class="flex-1 py-4 text-xs font-black uppercase tracking-widest text-[#0f172a] border-b-2 border-[#facc15] transition-colors focus:outline-none">
                    Gelen Teklifler <span id="gelen-sayac" class="ml-2 bg-[#0f172a] text-[#facc15] px-2 py-0.5 rounded-full text-[9px]">0</span>
                </button>
                <button onclick="sekmeDegistir('giden')" id="tab-giden" class="flex-1 py-4 text-xs font-black uppercase tracking-widest text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors focus:outline-none">
                    Gönderdiğim Teklifler <span id="giden-sayac" class="ml-2 bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full text-[9px]">0</span>
                </button>
            </div>

            <div class="p-6 md:p-8">
                <div id="icerik-gelen" class="tab-content active flex flex-col gap-4"></div>

                <div id="icerik-giden" class="tab-content flex flex-col gap-4"></div>
            </div>

        </div>

    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <button id="modal-btn-ana" onclick="modalKapat()" class="w-full bg-[#0f172a] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">Tamam</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let tumIlanlarim = [];

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            
            await verileriCekVeCiz();
        }

        function sekmeDegistir(sekmeAdi) {
            // Buton Tasarımlarını Değiştir
            const btnGelen = document.getElementById('tab-gelen');
            const btnGiden = document.getElementById('tab-giden');
            const icerikGelen = document.getElementById('icerik-gelen');
            const icerikGiden = document.getElementById('icerik-giden');

            if(sekmeAdi === 'gelen') {
                btnGelen.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest text-[#0f172a] border-b-2 border-[#facc15] transition-colors focus:outline-none";
                btnGiden.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors focus:outline-none";
                icerikGelen.classList.add('active');
                icerikGiden.classList.remove('active');
            } else {
                btnGiden.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest text-[#0f172a] border-b-2 border-[#facc15] transition-colors focus:outline-none";
                btnGelen.className = "flex-1 py-4 text-xs font-black uppercase tracking-widest text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors focus:outline-none";
                icerikGiden.classList.add('active');
                icerikGelen.classList.remove('active');
            }
        }

        async function verileriCekVeCiz() {
            try {
                // 1. BENİM İLANLARIMI BUL (Gelen teklifleri süzmek için)
                const { data: myIlans } = await _supabase.from('ilanlar').select('id, baslik, resim_url').eq('sahip_email', benimEmailim);
                tumIlanlarim = myIlans || [];
                const benimIlanIdleri = tumIlanlarim.map(i => i.id);

                // 2. GELEN TEKLİFLERİ ÇEK
                let gelenTeklifler = [];
                if(benimIlanIdleri.length > 0) {
                    const { data } = await _supabase.from('teklifler').select('*').in('ilan_id', benimIlanIdleri).order('created_at', { ascending: false });
                    gelenTeklifler = data || [];
                }

                // 3. GÖNDERDİĞİM TEKLİFLERİ ÇEK
                const { data: gidenTekliflerData } = await _supabase.from('teklifler').select('*').eq('teklif_veren_email', benimEmailim).order('created_at', { ascending: false });
                let gidenTeklifler = gidenTekliflerData || [];

                // Gönderdiğim tekliflerin ilan detaylarını çek
                let karsiIlanlar = [];
                if(gidenTeklifler.length > 0) {
                    const karsiIlanIdleri = gidenTeklifler.map(t => t.ilan_id);
                    const { data } = await _supabase.from('ilanlar').select('id, baslik, resim_url, sahip_email').in('id', karsiIlanIdleri);
                    karsiIlanlar = data || [];
                }

                // Ekrana Çizdir
                document.getElementById('yukleniyor').classList.add('hidden');
                document.getElementById('panel-alani').classList.remove('hidden');

                document.getElementById('gelen-sayac').innerText = gelenTeklifler.length;
                document.getElementById('giden-sayac').innerText = gidenTeklifler.length;

                cizGelenTeklifler(gelenTeklifler);
                cizGidenTeklifler(gidenTeklifler, karsiIlanlar);

            } catch (err) {
                console.error("Hata:", err);
                document.getElementById('yukleniyor').innerHTML = `<span class="text-red-500 font-bold text-xs uppercase tracking-widest">VERİLER ÇEKİLEMEDİ!</span>`;
            }
        }

        // --- GELEN TEKLİFLERİ ÇİZ ---
        function cizGelenTeklifler(teklifler) {
            const alan = document.getElementById('icerik-gelen');
            if(teklifler.length === 0) {
                alan.innerHTML = `<div class="py-12 text-center text-gray-400 font-bold text-xs uppercase tracking-widest border border-dashed border-gray-200 rounded-xl">Henüz ilanlarınıza gelen bir teklif bulunmuyor.</div>`;
                return;
            }

            let html = "";
            teklifler.forEach(teklif => {
                const ilgiliIlan = tumIlanlarim.find(i => i.id === teklif.ilan_id);
                if(!ilgiliIlan) return;

                let ilkResim = ilgiliIlan.resim_url ? ilgiliIlan.resim_url.split(',')[0] : "";
                const teklifEdenKisi = teklif.teklif_veren_email.split('@')[0].toUpperCase();

                let butonlarHTML = "";
                let durumEtiketi = "";

                if(teklif.durum === 'Bekliyor') {
                    durumEtiketi = `<span class="bg-yellow-100 text-yellow-700 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">BEKLİYOR</span>`;
                    butonlarHTML = `
                        <button onclick="teklifCevapla('${teklif.id}', 'Kabul Edildi')" class="bg-[#0f172a] text-[#facc15] px-6 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-black transition-colors shadow-md">KABUL ET</button>
                        <button onclick="teklifCevapla('${teklif.id}', 'Reddedildi')" class="bg-white text-red-500 border border-red-200 px-6 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-red-50 transition-colors">REDDET</button>
                    `;
                } else if(teklif.durum === 'Kabul Edildi') {
                    durumEtiketi = `<span class="bg-green-100 text-green-700 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">KABUL ETTİNİZ</span>`;
                    butonlarHTML = `<button onclick="window.location.href='sohbetler.html'" class="bg-green-500 text-white px-6 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-green-600 transition-colors shadow-md flex items-center gap-2"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg> SOHBETE GİT</button>`;
                } else {
                    durumEtiketi = `<span class="bg-red-100 text-red-700 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">REDDEDİLDİ</span>`;
                }

                html += `
                <div class="flex flex-col md:flex-row items-center justify-between p-4 border border-gray-200 rounded-xl bg-white hover:border-gray-300 transition-colors gap-4">
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="w-16 h-16 bg-gray-100 rounded-lg overflow-hidden flex-shrink-0 border border-gray-200">
                            ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-[8px] font-bold text-gray-400">YOK</div>`}
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest border border-gray-200 px-2 py-0.5 rounded">İLANINIZ</span>
                                ${durumEtiketi}
                            </div>
                            <h3 class="font-black text-sm text-gray-900 uppercase tracking-tight truncate max-w-[200px]">${ilgiliIlan.baslik}</h3>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-0.5"><span class="text-[#0f172a]">${teklifEdenKisi}</span> size teklif yaptı</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                        ${butonlarHTML}
                    </div>
                </div>`;
            });
            alan.innerHTML = html;
        }

        // --- GÖNDERİLEN TEKLİFLERİ ÇİZ ---
        function cizGidenTeklifler(teklifler, ilanlar) {
            const alan = document.getElementById('icerik-giden');
            if(teklifler.length === 0) {
                alan.innerHTML = `<div class="py-12 text-center text-gray-400 font-bold text-xs uppercase tracking-widest border border-dashed border-gray-200 rounded-xl">Henüz kimseye takas teklifi göndermediniz.</div>`;
                return;
            }

            let html = "";
            teklifler.forEach(teklif => {
                const ilgiliIlan = ilanlar.find(i => i.id === teklif.ilan_id);
                if(!ilgiliIlan) return;

                let ilkResim = ilgiliIlan.resim_url ? ilgiliIlan.resim_url.split(',')[0] : "";
                const ilanSahibi = ilgiliIlan.sahip_email.split('@')[0].toUpperCase();

                let durumEtiketi = "";
                let mesajButonu = "";

                if(teklif.durum === 'Bekliyor') {
                    durumEtiketi = `<span class="bg-yellow-100 text-yellow-700 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">CEVAP BEKLİYOR</span>`;
                } else if(teklif.durum === 'Kabul Edildi') {
                    durumEtiketi = `<span class="bg-green-100 text-green-700 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">KABUL EDİLDİ</span>`;
                    mesajButonu = `<button onclick="window.location.href='sohbetler.html'" class="bg-[#0f172a] text-[#facc15] px-6 py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-black transition-colors shadow-md flex items-center gap-2"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg> SOHBETE BAŞLA</button>`;
                } else {
                    durumEtiketi = `<span class="bg-red-100 text-red-700 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">REDDEDİLDİ</span>`;
                }

                html += `
                <div class="flex flex-col md:flex-row items-center justify-between p-4 border border-gray-200 rounded-xl bg-gray-50/50 hover:bg-white transition-colors gap-4">
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="w-16 h-16 bg-gray-100 rounded-lg overflow-hidden flex-shrink-0 border border-gray-200">
                            ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover opacity-80">` : `<div class="w-full h-full flex items-center justify-center text-[8px] font-bold text-gray-400">YOK</div>`}
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest border border-gray-200 px-2 py-0.5 rounded bg-white">KARŞI İLAN</span>
                                ${durumEtiketi}
                            </div>
                            <h3 class="font-black text-sm text-gray-900 uppercase tracking-tight truncate max-w-[200px]">${ilgiliIlan.baslik}</h3>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-0.5"><span class="text-[#0f172a]">${ilanSahibi}</span> adlı kullanıcıya iletildi</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                        ${mesajButonu}
                    </div>
                </div>`;
            });
            alan.innerHTML = html;
        }

        // --- TEKLİF CEVAPLAMA MOTORU (KABUL / RED) ---
        async function teklifCevapla(teklifId, yeniDurum) {
            document.getElementById('yukleniyor').classList.remove('hidden');
            document.getElementById('panel-alani').classList.add('hidden');

            try {
                const { error } = await _supabase.from('teklifler').update({ durum: yeniDurum }).eq('id', teklifId);
                if (error) throw error;
                
                // Başarılı olursa sayfayı yeniden çizdir
                await verileriCekVeCiz();

                if(yeniDurum === 'Kabul Edildi') {
                    modalAc("TEBRİKLER!", "Teklifi kabul ettiniz. Artık karşı tarafla sohbet edebilir ve takas detaylarını konuşabilirsiniz.", "basarili");
                }

            } catch(err) {
                modalAc("HATA", "İşlem sırasında bir hata oluştu.", "hata");
                await verileriCekVeCiz(); // Hata olsa da arayüzü geri getir
            }
        }

        function modalAc(baslik, mesaj, tip) {
            document.getElementById('modal-baslik').innerText = baslik; document.getElementById('modal-mesaj').innerText = mesaj;
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() { document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0'); setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300); }
        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        // Sitenin navbarının mobil vs çekilmesi için
        async function initialize() {
            await sitemiCalistir();
            
            // Navbar doldurucu (Kısaltılmış versiyonu, önceki sayfalardaki logic ile aynı)
            const menuDiv = document.getElementById('auth-menu');
            const mobilTopDiv = document.getElementById('auth-menu-mobil');
            const mobileMenu = document.getElementById('mobile-menu');
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const gorunenIsim = session.user.user_metadata.ad_soyad ? session.user.user_metadata.ad_soyad.toUpperCase() : session.user.email.split('@')[0].toUpperCase();
                menuDiv.innerHTML = `<a href="profil.html" class="text-[#facc15] font-black text-xs uppercase tracking-widest border-b-2 border-[#facc15] pb-0.5">${gorunenIsim}</a> <a href="favorilerim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a> <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">İLANLARIM</a> <a href="sohbetler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">MESAJLARIM</a> <a href="teklifler.html" class="text-white font-black text-[11px] uppercase tracking-widest transition-colors">TEKLİFLERİM</a> <span class="text-gray-700">|</span> <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest hover:text-red-400">ÇIKIŞ</button> <a href="ilan-ver.html" class="ml-2 bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-[11px] uppercase tracking-widest shadow-sm">İLAN VER</a>`;
                mobilTopDiv.innerHTML = `<a href="ilan-ver.html" class="bg-[#facc15] text-[#0f172a] px-3 py-1.5 rounded-lg font-black text-[10px] uppercase tracking-widest shadow-sm">İLAN VER</a> <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="text-white p-1 focus:outline-none"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>`;
                mobileMenu.innerHTML = `<a href="profil.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest border-b border-gray-800">${gorunenIsim}</a> <a href="favorilerim.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800">FAVORİLERİM</a> <a href="teklifler.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest border-b border-gray-800">TEKLİFLERİM</a> <button onclick="cikisYap()" class="w-full text-left block px-6 py-4 text-red-500 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800">ÇIKIŞ</button>`;
            }
        }

        initialize();
    </script>
</body>
</html>
