<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teklif Merkezi - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <div class="flex gap-4 items-center">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest border-r border-gray-700 pr-3 hidden md:block"></span>
                <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors">← VİTRİNE DÖN</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-black text-gray-900 uppercase italic tracking-tight mb-6 border-b-2 border-gray-100 pb-4">Gönderdiğim Teklifler 📤</h2>
                <div id="giden-listesi" class="space-y-4">
                    <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">Gönderdiklerin aranıyor...</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 bg-gradient-to-br from-white to-yellow-50/30">
                <h2 class="text-2xl font-black text-gray-900 uppercase italic tracking-tight mb-6 border-b-2 border-gray-100 pb-4">Bana Gelen Teklifler 📥</h2>
                <div id="gelen-listesi" class="space-y-4">
                    <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">Sana gelenler aranıyor...</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function teklifMerkeziniCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }

            const userEmail = session.user.email;
            document.getElementById('user-name').innerText = userEmail.split('@')[0].toUpperCase();

            // 1. MOTOR: GÖNDERDİĞİM TEKLİFLERİ GETİR
            const gidenListe = document.getElementById('giden-listesi');
            const { data: gidenler, error: gidenHata } = await _supabase
                .from('teklifler')
                .select('*')
                .eq('teklif_veren_email', userEmail)
                .order('id', { ascending: false });

            if (gidenHata || !gidenler || gidenler.length === 0) {
                gidenListe.innerHTML = `
                    <div class="text-center py-10">
                        <span class="text-5xl mb-4 block">📭</span>
                        <p class="text-gray-500 font-bold">Hiç teklif göndermemişsin.</p>
                    </div>`;
            } else {
                gidenListe.innerHTML = '';
                gidenler.forEach(teklif => {
                    gidenListe.innerHTML += `
                    <div class="p-4 rounded-2xl border border-gray-100 hover:shadow-md transition-all border-l-4 border-l-gray-400 bg-gray-50">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="bg-gray-200 text-gray-700 text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-md mb-2 inline-block">İşlem #${teklif.id}</span>
                                <h3 class="font-bold text-gray-800 italic uppercase">İlan #${teklif.ilan_id}</h3>
                            </div>
                            <span class="text-[10px] font-bold text-gray-500 bg-gray-200 px-2 py-1 rounded-md">Bekliyor ⏳</span>
                        </div>
                        <div class="mt-3 text-right">
                            <a href="detay.html?id=${teklif.ilan_id}" class="text-gray-600 hover:text-gray-900 font-black text-xs uppercase tracking-widest transition-colors">İlanı Gör →</a>
                        </div>
                    </div>`;
                });
            }

            // 2. MOTOR: BANA GELEN TEKLİFLERİ GETİR
            const gelenListe = document.getElementById('gelen-listesi');
            
            // Önce benim ilanlarımı bul
            const { data: benimIlanlarim, error: ilanHata } = await _supabase
                .from('ilanlar')
                .select('id, baslik')
                .eq('sahip_email', userEmail);

            if (ilanHata || !benimIlanlarim || benimIlanlarim.length === 0) {
                gelenListe.innerHTML = `
                    <div class="text-center py-10">
                        <span class="text-5xl mb-4 block">📦</span>
                        <p class="text-gray-500 font-bold mb-2">Sisteme kayıtlı ilanın yok.</p>
                        <p class="text-xs text-gray-400 uppercase tracking-widest">Önce bir ilan vermelisin.</p>
                    </div>`;
                return;
            }

            // İlanlarımın ID'lerini bir listeye koy
            const ilanIdListesi = benimIlanlarim.map(ilan => ilan.id);

            // Bu ID'lere yapılmış teklifleri bul
            const { data: gelenler, error: gelenHata } = await _supabase
                .from('teklifler')
                .select('*')
                .in('ilan_id', ilanIdListesi)
                .order('id', { ascending: false });

            if (gelenHata || !gelenler || gelenler.length === 0) {
                gelenListe.innerHTML = `
                    <div class="text-center py-10">
                        <span class="text-5xl mb-4 block">😴</span>
                        <p class="text-gray-500 font-bold">İlanlarına henüz teklif gelmemiş.</p>
                    </div>`;
                return;
            }

            gelenListe.innerHTML = '';
            gelenler.forEach(teklif => {
                // Hangi ilanıma geldiğini bulalım (başlığını yazmak için)
                const ilgiliIlan = benimIlanlarim.find(i => i.id === teklif.ilan_id);
                const ilanBasligi = ilgiliIlan ? ilgiliIlan.baslik : `İlan #${teklif.ilan_id}`;

                gelenListe.innerHTML += `
                <div class="p-5 rounded-2xl border border-yellow-200 hover:shadow-lg transition-all border-l-4 border-l-yellow-500 bg-white shadow-sm mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-md inline-block">YENİ TEKLİF 🚨</span>
                        <span class="text-xs font-bold text-gray-400">İşlem #${teklif.id}</span>
                    </div>
                    
                    <h3 class="text-lg font-black text-gray-900 italic uppercase leading-tight mb-1">${ilanBasligi}</h3>
                    <p class="text-sm text-gray-600 font-medium mb-4"><span class="font-bold text-gray-800">${teklif.teklif_veren_email.split('@')[0]}</span> sana takas teklif etti!</p>
                    
                    <div class="flex gap-2">
                        <button class="flex-grow bg-green-500 text-white py-2 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-green-600 transition-colors shadow-sm">Kabul Et ✅</button>
                        <button class="flex-grow bg-red-100 text-red-600 py-2 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-red-200 transition-colors">Reddet ❌</button>
                    </div>
                </div>`;
            });
        }

        teklifMerkeziniCalistir();
    </script>
</body>
</html>
