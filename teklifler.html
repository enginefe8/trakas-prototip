<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlan Detayı - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .thumbnail-active { border: 2px solid #111827; opacity: 1; }
        .thumbnail-inactive { border: 2px solid transparent; opacity: 0.6; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#111827] px-6 py-4 flex justify-between items-center shadow-md">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div id="auth-menu" class="flex items-center gap-6">
            </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 w-full flex-grow flex flex-col items-center mt-2 md:mt-4">
        
        <div class="w-full flex justify-between items-center mb-6">
            <a href="index.html" class="text-xs font-bold text-gray-500 uppercase tracking-widest hover:text-gray-900 transition-colors flex items-center gap-2">
                <span>←</span> VİTRİNE DÖN
            </a>
            <span id="ilan-no" class="text-xs font-bold text-gray-400 uppercase tracking-widest">#--</span>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full p-6 md:p-10 flex flex-col lg:flex-row gap-10 min-h-[500px]">
            
            <div class="w-full lg:w-1/2 flex flex-col gap-4">
                <div class="w-full aspect-square bg-gray-50 rounded-2xl border border-gray-100 flex items-center justify-center overflow-hidden relative">
                    <img id="ana-resim" src="" class="w-full h-full object-contain p-2 transition-opacity duration-300">
                    <div id="resim-yok-ikon" class="hidden text-gray-300 flex-col items-center gap-2">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-widest">Görsel Yok</span>
                    </div>
                </div>
                
                <div id="kucuk-resimler-alani" class="flex gap-3 overflow-x-auto pb-2 hidden scroll-smooth">
                    </div>
            </div>

            <div class="w-full lg:w-1/2 flex flex-col justify-between">
                
                <div id="detay-alani" class="opacity-0 transition-opacity duration-500">
                    
                    <div class="mb-4">
                        <span id="ilan-kategori" class="bg-[#111827] text-white text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-md shadow-sm">YÜKLENİYOR...</span>
                    </div>

                    <h1 id="ilan-baslik" class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight uppercase mb-6">Yükleniyor...</h1>
                    
                    <div class="bg-gray-50 border border-gray-100 rounded-xl p-5 mb-8 inline-block">
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">TAHMİNİ TAKAS DEĞERİ</p>
                        <span id="ilan-deger" class="text-3xl font-black text-[#111827] tracking-tight">-- ₺</span>
                    </div>

                    <div class="mb-10">
                        <h3 class="text-xs font-bold text-gray-700 uppercase tracking-widest mb-3 border-b border-gray-100 pb-2">İLAN AÇIKLAMASI</h3>
                        <p id="ilan-aciklama" class="text-gray-600 font-medium leading-relaxed text-sm whitespace-pre-line">--</p>
                    </div>

                    <div class="flex items-center gap-4 bg-gray-50 border border-gray-100 p-4 rounded-xl mb-8">
                        <div class="w-12 h-12 bg-[#111827] rounded-full flex items-center justify-center text-yellow-500 font-black text-lg shadow-sm flex-shrink-0" id="sahip-harf">?</div>
                        <div class="flex-grow min-w-0">
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">İLAN SAHİBİ</p>
                            <h4 id="sahip-email" class="font-bold text-gray-900 text-sm truncate uppercase tracking-tight">--</h4>
                        </div>
                    </div>
                </div>

                <div class="mt-auto pt-4 border-t border-gray-100">
                    <button id="teklif-btn" onclick="teklifGonder()" class="w-full bg-[#111827] text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-black hover:-translate-y-0.5 transition-all opacity-0 flex justify-center items-center gap-2">
                        TAKAS TEKLİFİ GÖNDER
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-ikincil" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-900 font-black px-4 py-4 rounded-xl hover:bg-gray-200 transition-colors uppercase text-[10px] tracking-widest">KAPAT</button>
                    <button id="modal-btn-ana" onclick="modalKapat()" class="flex-1 bg-[#111827] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">TAMAM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const ilanId = urlParams.get('id');

        let aktifSession = null;
        let ilanVerisi = null;
        let resimDizisi = [];

        async function sayfaYukle() {
            if (!ilanId) { window.location.href = 'index.html'; return; }

            // 1. Oturum Kontrolü ve Navbar
            const { data: { session } } = await _supabase.auth.getSession();
            aktifSession = session;
            menuOlustur();

            // 2. İlan Verisini Çek
            const { data, error } = await _supabase.from('ilanlar').select('*').eq('id', ilanId).single();
            
            if (error || !data) {
                modalAc("Hata", "Bu ilan yayından kaldırılmış veya bulunamıyor.", "hata", false, () => window.location.href = 'index.html');
                return;
            }

            ilanVerisi = data;
            ekraniDoldur();
        }

        function menuOlustur() {
            const menuDiv = document.getElementById('auth-menu');
            if (aktifSession) {
                const isim = aktifSession.user.email.split('@')[0].toUpperCase();
                menuDiv.innerHTML = `
                    <span class="text-yellow-500 font-bold text-sm uppercase tracking-widest hidden md:block">${isim}</span>
                    <a href="ilanlarim.html" class="text-white font-bold text-xs uppercase tracking-wider hover:text-gray-300 transition-colors">İLANLARIM</a>
                    <button onclick="cikisYap()" class="text-gray-400 font-bold text-xs uppercase tracking-wider hover:text-red-400 transition-colors">ÇIKIŞ</button>
                `;
            } else {
                menuDiv.innerHTML = `
                    <a href="giris.html" class="bg-yellow-500 text-[#111827] px-6 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest hover:bg-yellow-400 transition-colors shadow-sm">GİRİŞ YAP</a>
                `;
            }
        }

        function ekraniDoldur() {
            document.getElementById('ilan-baslik').innerText = ilanVerisi.baslik;
            document.getElementById('ilan-aciklama').innerText = ilanVerisi.aciklama;
            document.getElementById('ilan-deger').innerText = ilanVerisi.deger + " ₺";
            document.getElementById('ilan-kategori').innerText = ilanVerisi.kategori || "DİĞER";
            document.getElementById('ilan-no').innerText = "#" + ilanVerisi.id;
            
            const sahipIsim = ilanVerisi.sahip_email.split('@')[0];
            document.getElementById('sahip-email').innerText = sahipIsim;
            document.getElementById('sahip-harf').innerText = sahipIsim.charAt(0).toUpperCase();

            // ÇOKLU RESİM GALERİSİ MANTIĞI
            if (ilanVerisi.resim_url && ilanVerisi.resim_url.trim() !== "") {
                resimDizisi = ilanVerisi.resim_url.split(',');
                galeriyiOlustur();
            } else {
                document.getElementById('ana-resim').classList.add('hidden');
                document.getElementById('resim-yok-ikon').classList.remove('hidden');
                document.getElementById('resim-yok-ikon').classList.add('flex');
            }

            document.getElementById('detay-alani').classList.remove('opacity-0');

            // Buton Mantığı (Kendi ilanıysa engelle)
            const btn = document.getElementById('teklif-btn');
            btn.classList.remove('opacity-0');

            if (aktifSession && aktifSession.user.email === ilanVerisi.sahip_email) {
                btn.disabled = true;
                btn.innerText = "BU SENİN İLANIN";
                btn.className = "w-full bg-gray-100 text-gray-400 py-4 rounded-xl font-black text-sm uppercase tracking-widest cursor-not-allowed border border-gray-200 text-center";
            }
        }

        function galeriyiOlustur() {
            const anaResim = document.getElementById('ana-resim');
            const kucukResimlerAlani = document.getElementById('kucuk-resimler-alani');
            
            // İlk resmi ana resim yap
            anaResim.src = resimDizisi[0];

            // Eğer 1'den fazla resim varsa küçük resimleri (thumbnails) göster
            if (resimDizisi.length > 1) {
                kucukResimlerAlani.classList.remove('hidden');
                let html = "";
                
                resimDizisi.forEach((url, index) => {
                    const activeClass = index === 0 ? 'thumbnail-active' : 'thumbnail-inactive hover:opacity-100';
                    html += `
                        <div onclick="resimDegistir('${url}', this)" class="w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden cursor-pointer transition-all ${activeClass} bg-gray-50">
                            <img src="${url}" class="w-full h-full object-cover">
                        </div>
                    `;
                });
                
                kucukResimlerAlani.innerHTML = html;
            }
        }

        window.resimDegistir = function(url, tiklananElement) {
            // Ana resmi değiştir
            const anaResim = document.getElementById('ana-resim');
            anaResim.style.opacity = 0; // Animasyon için
            
            setTimeout(() => {
                anaResim.src = url;
                anaResim.style.opacity = 1;
            }, 150);

            // Thumbnail sınıflarını güncelle
            const tumThumbnails = document.getElementById('kucuk-resimler-alani').children;
            for(let i=0; i<tumThumbnails.length; i++) {
                tumThumbnails[i].className = "w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden cursor-pointer transition-all thumbnail-inactive hover:opacity-100 bg-gray-50";
            }
            tiklananElement.className = "w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden cursor-pointer transition-all thumbnail-active bg-gray-50";
        }

        async function teklifGonder() {
            if (!aktifSession) {
                modalAc("GİRİŞ GEREKLİ", "Takas teklifi gönderebilmek için önce sisteme giriş yapmalısınız.", "uyari", true, () => window.location.href = 'giris.html');
                document.getElementById('modal-btn-ana').innerText = "GİRİŞ YAP";
                return;
            }

            const btn = document.getElementById('teklif-btn');
            const orijinalIcerik = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mr-2 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> İŞLENİYOR...`;

            try {
                const { error } = await _supabase.from('teklifler').insert([
                    { ilan_id: ilanId, teklif_veren_email: aktifSession.user.email, durum: 'Bekliyor' }
                ]);

                if (error) throw error;

                modalAc("TEKLİF İLETİLDİ", "Takas teklifiniz ilan sahibine başarıyla iletildi. İlanlarım panelinden takip edebilirsiniz.", "basarili");
                btn.innerText = "TEKLİF GÖNDERİLDİ";
                btn.className = "w-full bg-green-500 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest cursor-not-allowed text-center";
            } catch (err) {
                btn.disabled = false;
                btn.innerText = orijinalIcerik;
                modalAc("HATA", "Teklif gönderilemedi: " + err.message, "hata");
            }
        }

        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, isIptal = false, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            
            if(isIptal) {
                document.getElementById('modal-btn-ikincil').classList.remove('hidden');
                document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            } else {
                document.getElementById('modal-btn-ikincil').classList.add('hidden');
                document.getElementById('modal-btn-ana').innerText = "TAMAM";
                document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(modalOnayFonk) modalOnayFonk(); };
            }

            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sayfaYukle();
    </script>
</body>
</html>
