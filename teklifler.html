<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekliflerim - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <div class="flex gap-4 items-center">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest border-r border-gray-700 pr-3 hidden md:block"></span>
                <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors">← VİTRİNE DÖN</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-8">
        <div class="flex items-center justify-between mb-8 border-b-2 border-gray-200 pb-4">
            <h1 class="text-3xl font-black text-gray-900 uppercase italic tracking-tight">Gönderdiğim Teklifler 🤝</h1>
        </div>

        <div id="teklif-listesi" class="space-y-4">
            <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">Tekliflerin getiriliyor...</p>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function teklifleriGetir() {
            // 1. Önce kimin giriş yaptığını bulalım
            const { data: { session } } = await _supabase.auth.getSession();
            const liste = document.getElementById('teklif-listesi');

            if (!session) {
                window.location.href = 'giris.html';
                return;
            }

            document.getElementById('user-name').innerText = session.user.email.split('@')[0].toUpperCase();

            // 2. Sadece bu kişinin gönderdiği teklifleri çekelim
            const { data, error } = await _supabase
                .from('teklifler')
                .select('*')
                .eq('teklif_veren_email', session.user.email)
                .order('id', { ascending: false });

            if (error) {
                liste.innerHTML = '<p class="text-center text-red-500 py-10 font-bold">Teklifler yüklenirken bir hata oluştu.</p>';
                return;
            }

            if (!data || data.length === 0) {
                liste.innerHTML = `
                    <div class="bg-white p-10 rounded-2xl shadow-sm text-center border border-gray-100 hover:shadow-md transition-all">
                        <span class="text-6xl mb-4 block">📭</span>
                        <p class="text-gray-500 font-bold text-lg">Henüz hiç teklif göndermemişsin.</p>
                        <a href="index.html" class="mt-4 inline-block bg-yellow-500 px-6 py-2 rounded-lg font-black text-sm uppercase text-gray-900 hover:bg-yellow-400 transition-all shadow-md">Hemen Vitrine Göz At</a>
                    </div>`;
                return;
            }

            // 3. Teklifleri ekrana yazdır
            liste.innerHTML = '';
            data.forEach(teklif => {
                liste.innerHTML += `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center hover:shadow-lg transition-all gap-4 border-l-4 border-l-yellow-500">
                    <div>
                        <span class="bg-gray-100 text-gray-600 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full mb-2 inline-block">İşlem No: #${teklif.id}</span>
                        <h3 class="text-xl font-bold text-gray-800 italic uppercase">İlan #${teklif.ilan_id} için teklif verdin</h3>
                        <p class="text-gray-500 text-sm mt-1 font-medium">İlettiğin Mesaj: <span class="text-gray-800 italic">"${teklif.mesaj || 'Takas istiyor!'}"</span></p>
                    </div>
                    <div>
                        <a href="detay.html?id=${teklif.ilan_id}" class="bg-gray-900 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-gray-800 transition-colors whitespace-nowrap shadow-md">İlanı Gör</a>
                    </div>
                </div>`;
            });
        }

        teklifleriGetir();
    </script>
</body>
</html>
