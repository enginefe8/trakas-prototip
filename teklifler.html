<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teklif Yönetimi - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .tab-aktif { border-bottom: 2px solid #111827; color: #111827; font-weight: 900; }
        .tab-pasif { border-bottom: 2px solid transparent; color: #9ca3af; font-weight: 700; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col text-gray-900">

    <nav class="bg-[#111827] px-6 py-4 flex justify-between items-center shadow-md">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div class="flex items-center gap-6">
            <span id="user-name" class="text-yellow-500 font-bold text-sm uppercase tracking-widest hidden md:block"></span>
            <a href="index.html" class="text-white font-bold text-sm uppercase tracking-wider hover:text-gray-300 transition-colors flex items-center gap-2">
                <span>←</span> VİTRİNE DÖN
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 w-full flex-grow mt-2 md:mt-4">
        
        <div class="mb-8">
            <h1 class="text-3xl md:text-4xl font-black text-[#111827] italic tracking-tight uppercase mb-2">TEKLİF YÖNETİMİ</h1>
            <p class="text-gray-500 font-medium text-sm">Gelen ve giden takas tekliflerinizi buradan yönetin.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden min-h-[500px] flex flex-col">
            
            <div class="flex border-b border-gray-100 px-4 md:px-8 pt-4">
                <button onclick="sekmeDegistir('gelen')" id="tab-gelen" class="pb-4 px-4 text-xs tracking-widest uppercase transition-all tab-aktif">
                    Bana Gelen Teklifler
                </button>
                <button onclick="sekmeDegistir('giden')" id="tab-giden" class="pb-4 px-4 text-xs tracking-widest uppercase transition-all tab-pasif hover:text-gray-600">
                    Benim Verdiklerim
                </button>
            </div>

            <div id="dinamik-alan" class="p-4 md:p-8 bg-gray-50/50 flex-grow relative">
                </div>
            
        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <button id="modal-btn-ana" onclick="modalKapat()" class="w-full bg-[#111827] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">Tamam</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let aktifSekme = 'gelen'; 
        let tumIlanlar = [];
        let tumTeklifler = [];

        async function sitemiCalistir() {
            ekraniDurumaGoreCiz('yukleniyor');
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) { 
                    window.location.href = 'giris.html'; 
                    return; 
                }
                benimEmailim = session.user.email;
                document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

                await verileriCek();
                ekraniCiz();
            } catch (error) {
                console.error("Başlatma hatası:", error);
                ekraniDurumaGoreCiz('hata', error.message);
            }
        }

        async function verileriCek() {
            try {
                const { data: ilanlar, error: ilanErr } = await _supabase.from('ilanlar').select('*');
                if (ilanErr) throw ilanErr;
                tumIlanlar = ilanlar || [];

                const { data: teklifler, error: tekErr } = await _supabase.from('teklifler').select('*').order('created_at', { ascending: false });
                if (tekErr) throw tekErr;
                tumTeklifler = teklifler || [];
                
            } catch (err) {
                console.error("Veri çekme hatası:", err);
                throw err;
            }
        }

        function sekmeDegistir(sekmeAd) {
            aktifSekme = sekmeAd;
            document.getElementById('tab-gelen').className = sekmeAd === 'gelen' ? "pb-4 px-4 text-xs tracking-widest uppercase transition-all tab-aktif" : "pb-4 px-4 text-xs tracking-widest uppercase transition-all tab-pasif hover:text-gray-600";
            document.getElementById('tab-giden').className = sekmeAd === 'giden' ? "pb-4 px-4 text-xs tracking-widest uppercase transition-all tab-aktif" : "pb-4 px-4 text-xs tracking-widest uppercase transition-all tab-pasif hover:text-gray-600";
            ekraniCiz();
        }

        function ekraniDurumaGoreCiz(durum, ekstraMesaj = "") {
            const alan = document.getElementById('dinamik-alan');
            
            if (durum === 'yukleniyor') {
                alan.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 w-full">
                        <svg class="animate-spin h-8 w-8 text-[#111827] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Veriler Çekiliyor...</span>
                    </div>`;
            } 
            else if (durum === 'bos') {
                const bosMetin = aktifSekme === 'gelen' ? "HENÜZ BİR TAKAS TEKLİFİ ALMADINIZ" : "HENÜZ KİMSEYE TEKLİF GÖNDERMEDİNİZ";
                alan.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center w-full">
                        <div class="w-16 h-16 bg-white border border-gray-200 rounded-full flex items-center justify-center mb-4 shadow-sm">
                            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        </div>
                        <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">${bosMetin}</p>
                    </div>`;
            }
            else if (durum === 'hata') {
                alan.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center w-full text-red-500">
                        <p class="font-bold uppercase tracking-widest text-xs mb-2">BİR HATA OLUŞTU</p>
                        <p class="text-sm text-gray-600">${ekstraMesaj}</p>
                        <button onclick="sitemiCalistir()" class="mt-4 bg-gray-900 text-white px-6 py-2 rounded-lg text-xs uppercase tracking-widest font-bold">Tekrar Dene</button>
                    </div>`;
            }
        }

        function ekraniCiz() {
            try {
                // Benim ilanlarımı bul
                const benimIlanIdlerim = tumIlanlar.filter(i => i.sahip_email === benimEmailim).map(i => i.id);

                let gosterilecekTeklifler = [];
                if(aktifSekme === 'gelen') {
                    gosterilecekTeklifler = tumTeklifler.filter(t => benimIlanIdlerim.includes(t.ilan_id));
                } else {
                    gosterilecekTeklifler = tumTeklifler.filter(t => t.teklif_veren_email === benimEmailim);
                }

                // Hatalı (ilanı silinmiş) teklifleri filtrele
                let gecerliTeklifler = gosterilecekTeklifler.filter(t => tumIlanlar.some(i => i.id == t.ilan_id));

                if(gecerliTeklifler.length === 0) {
                    ekraniDurumaGoreCiz('bos');
                    return;
                }

                let htmlCikti = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">`;
                
                gecerliTeklifler.forEach(t => {
                    const ilgiliIlan = tumIlanlar.find(i => i.id == t.ilan_id);
                    if(!ilgiliIlan) return;

                    let durumRenk = "bg-yellow-50 text-yellow-600 border-yellow-200";
                    if(t.durum === 'Kabul Edildi') durumRenk = "bg-green-50 text-green-600 border-green-200";
                    if(t.durum === 'Reddedildi' || t.durum === 'İptal Edildi') durumRenk = "bg-red-50 text-red-600 border-red-200";

                    let ilkResim = "";
                    if(ilgiliIlan.resim_url) ilkResim = ilgiliIlan.resim_url.split(',')[0];

                    // Çökme Koruması: E-posta adresi null gelirse patlamaması için
                    const teklifVerenGoster = t.teklif_veren_email ? t.teklif_veren_email.split('@')[0] : "Bilinmiyor";
                    const sahipGoster = ilgiliIlan.sahip_email ? ilgiliIlan.sahip_email.split('@')[0] : "Bilinmiyor";

                    htmlCikti += `
                    <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between">
                        <div class="flex gap-4 items-start mb-4">
                            <div class="w-16 h-16 rounded-xl bg-gray-50 flex-shrink-0 overflow-hidden border border-gray-100">
                                ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`}
                            </div>
                            <div class="flex-grow min-w-0 flex flex-col items-start">
                                <span class="inline-block px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-widest border mb-2 ${durumRenk}">${t.durum}</span>
                                <h3 class="font-bold text-gray-900 text-sm truncate uppercase tracking-tight w-full"><a href="detay.html?id=${t.ilan_id}" class="hover:text-yellow-500 transition-colors">${ilgiliIlan.baslik || 'İsimsiz İlan'}</a></h3>
                                <p class="text-[10px] text-gray-500 mt-1 truncate w-full">
                                    ${aktifSekme === 'gelen' ? `Teklif Veren: <span class="font-bold text-gray-700">${teklifVerenGoster}</span>` : `İlan Sahibi: <span class="font-bold text-gray-700">${sahipGoster}</span>`}
                                </p>
                            </div>
                        </div>

                        <div class="flex gap-2 mt-auto border-t border-gray-50 pt-3">
                            ${aktifSekme === 'gelen' && t.durum === 'Bekliyor' ? `
                                <button onclick="durumGuncelle('${t.id}', 'Kabul Edildi')" class="flex-1 bg-green-500 text-white text-[10px] font-black uppercase tracking-widest py-3 rounded-xl hover:bg-green-600 transition-colors shadow-sm">Kabul Et</button>
                                <button onclick="durumGuncelle('${t.id}', 'Reddedildi')" class="flex-1 bg-red-500 text-white text-[10px] font-black uppercase tracking-widest py-3 rounded-xl hover:bg-red-600 transition-colors shadow-sm">Reddet</button>
                            ` : ''}

                            ${aktifSekme === 'gelen' && t.durum === 'Kabul Edildi' ? `
                                 <button onclick="sohbetBaslat('${t.teklif_veren_email}')" class="w-full bg-[#111827] text-white text-[10px] font-black uppercase tracking-widest py-3 rounded-xl hover:bg-black transition-colors flex items-center justify-center gap-2 shadow-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg> Sohbete Başla
                                 </button>
                            ` : ''}
                            
                            ${aktifSekme === 'gelen' && t.durum === 'Reddedildi' ? `
                                <span class="w-full text-center text-gray-400 text-[10px] font-bold uppercase py-3">Reddedildi</span>
                            ` : ''}

                            ${aktifSekme === 'giden' ? `
                                ${t.durum === 'Bekliyor' ? `<button onclick="durumGuncelle('${t.id}', 'İptal Edildi')" class="w-full bg-gray-100 text-gray-500 hover:text-red-500 text-[10px] font-black uppercase tracking-widest py-3 rounded-xl hover:bg-red-50 transition-colors">Teklifi Geri Çek</button>` : ''}
                                ${t.durum === 'Kabul Edildi' ? `<button onclick="sohbetBaslat('${ilgiliIlan.sahip_email}')" class="w-full bg-[#111827] text-white text-[10px] font-black uppercase tracking-widest py-3 rounded-xl hover:bg-black transition-colors flex items-center justify-center gap-2 shadow-sm">Sohbet Et</button>` : ''}
                                ${t.durum === 'Reddedildi' || t.durum === 'İptal Edildi' ? `<span class="w-full text-center text-gray-400 text-[10px] font-bold uppercase py-3">İşlem Kapandı</span>` : ''}
                            ` : ''}
                        </div>
                    </div>`;
                });

                htmlCikti += `</div>`;
                document.getElementById('dinamik-alan').innerHTML = htmlCikti;

            } catch(e) {
                console.error("Çizim hatası:", e);
                ekraniDurumaGoreCiz('hata', e.message);
            }
        }

        async function durumGuncelle(teklifId, yeniDurum) {
            try {
                ekraniDurumaGoreCiz('yukleniyor');

                const { error } = await _supabase.from('teklifler').update({ durum: yeniDurum }).eq('id', teklifId);
                if (error) throw error;
                
                const index = tumTeklifler.findIndex(t => t.id == teklifId);
                if(index > -1) tumTeklifler[index].durum = yeniDurum;
                
                ekraniCiz(); 

                if(yeniDurum === 'Kabul Edildi') {
                    modalAc("Harika!", "Teklifi kabul ettiniz. Karşı tarafla sohbet başlatarak detayları konuşabilirsiniz.", "basarili");
                }

            } catch (err) {
                ekraniCiz();
                modalAc("Hata", "Durum güncellenemedi: " + err.message, "hata");
            }
        }

        function sohbetBaslat(karsiEmail) {
            window.location.href = `sohbetler.html`;
        }

        let modalOnayFonk = null;
        function modalAc(baslik, mesaj, tip, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            modalOnayFonk = onayFonk;
            
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() {
            document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300);
            if(modalOnayFonk && (document.getElementById('modal-ikon').innerText === '!' || document.getElementById('modal-ikon').innerText === '?')) modalOnayFonk = null;
        }

        sitemiCalistir();
    </script>
</body>
</html>
