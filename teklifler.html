<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekliflerim - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <nav class="bg-gray-900 p-3 md:p-4 sticky top-0 z-50 shadow-xl flex-shrink-0 relative">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <button onclick="mobilMenuAcKapat()" class="md:hidden text-white focus:outline-none hover:text-yellow-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <a href="index.html" class="text-2xl md:text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            </div>
            
            <div class="hidden md:flex gap-4 lg:gap-6 items-center flex-shrink-0 ml-auto">
                <div id="user-panel" style="display: none;" class="items-center gap-4 lg:gap-6 border-r border-gray-700 pr-5">
                    <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest hidden xl:block mr-2"></span>
                    <a href="favorilerim.html" class="text-gray-300 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-white transition-colors">Favorilerim</a>
                    <a href="ilanlarim.html" class="text-gray-300 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-white transition-colors">İlanlarım</a>
                    <a href="sohbetler.html" class="text-gray-300 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-white transition-colors">Mesajlarım</a>
                    <a href="teklifler.html" class="text-white font-bold text-[11px] lg:text-xs uppercase tracking-wide transition-colors">Tekliflerim</a>
                    <button onclick="cikisYap()" class="text-red-400 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-red-300 transition-colors ml-2">Çıkış</button>
                </div>
                <a href="ilan-ver.html" class="bg-yellow-500 px-5 py-2.5 rounded-lg font-black text-xs hover:bg-yellow-400 uppercase transition-all shadow-md whitespace-nowrap text-gray-900">İlan Ver</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 mt-4 flex-grow w-full">
        <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-100 min-h-[600px]">
            
            <div class="mb-8 border-b-2 border-gray-100 pb-4">
                <h1 class="text-2xl md:text-3xl font-black text-gray-900 uppercase italic tracking-tight mb-1">Teklif Yönetimi</h1>
                <p class="text-gray-500 font-medium text-sm">Gelen ve giden tüm takas tekliflerinizi buradan takip edebilirsiniz.</p>
            </div>

            <div class="flex gap-2 mb-8 bg-gray-50 p-1.5 rounded-xl border border-gray-100 max-w-md">
                <button onclick="sekmeDegistir('gelen')" id="btn-gelen" class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-lg transition-all bg-white text-gray-900 shadow-sm border border-gray-200">Gelen Teklifler</button>
                <button onclick="sekmeDegistir('giden')" id="btn-giden" class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-lg transition-all text-gray-400 hover:text-gray-600">Giden Teklifler</button>
            </div>

            <div id="teklif-listesi" class="space-y-4">
                <div class="animate-pulse bg-gray-50 h-24 rounded-xl border border-gray-100"></div>
            </div>

        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-12 text-center border-t-4 border-yellow-500 flex-shrink-0 mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center">
            <h2 class="text-4xl font-black text-white tracking-tighter italic mb-2">TRAKAS</h2>
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">© 2026 Trakas Pazaryeri A.Ş. • Güvenli İşlem Paneli</p>
        </div>
    </footer>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4"></div>
                <h3 id="modal-baslik" class="text-lg font-black text-gray-900 mb-2 uppercase tracking-wide">İşlem Onayı</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-iptal" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-700 font-bold px-4 py-3 rounded-lg hover:bg-gray-200 transition-colors uppercase text-xs tracking-wide">Vazgeç</button>
                    <button id="modal-btn-onay" onclick="modalOnayCalistir()" class="flex-1 bg-gray-900 text-white font-bold px-4 py-3 rounded-lg hover:bg-gray-800 transition-colors uppercase text-xs tracking-wide shadow-md">Onayla</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let mevcutSekme = "gelen";
        let hafizadakiIslem = null;

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            document.getElementById('user-panel').style.display = 'flex';
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();
            verileriGetir();
        }

        window.sekmeDegistir = function(sekme) {
            mevcutSekme = sekme;
            const btnGelen = document.getElementById('btn-gelen');
            const btnGiden = document.getElementById('btn-giden');
            
            if(sekme === 'gelen') {
                btnGelen.className = "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-lg transition-all bg-white text-gray-900 shadow-sm border border-gray-200";
                btnGiden.className = "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-lg transition-all text-gray-400 hover:text-gray-600";
            } else {
                btnGiden.className = "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-lg transition-all bg-white text-gray-900 shadow-sm border border-gray-200";
                btnGelen.className = "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-lg transition-all text-gray-400 hover:text-gray-600";
            }
            verileriGetir();
        }

        async function verileriGetir() {
            const vitrin = document.getElementById('teklif-listesi');
            vitrin.innerHTML = '<div class="animate-pulse bg-gray-50 h-24 rounded-xl border border-gray-100"></div>';

            try {
                let teklifler;
                if (mevcutSekme === "gelen") {
                    // Benim ilanlarıma gelen teklifleri bul
                    const { data: ilanlarim } = await _supabase.from('ilanlar').select('id').eq('sahip_email', benimEmailim);
                    const ilanIdleri = ilanlarim.map(i => i.id);
                    const { data } = await _supabase.from('teklifler').select('*, ilanlar(*)').in('ilan_id', ilanIdleri).order('id', { ascending: false });
                    teklifler = data;
                } else {
                    // Benim başkalarına verdiğim teklifleri bul
                    const { data } = await _supabase.from('teklifler').select('*, ilanlar(*)').eq('teklif_veren_email', benimEmailim).order('id', { ascending: false });
                    teklifler = data;
                }

                if (!teklifler || teklifler.length === 0) {
                    vitrin.innerHTML = `<p class="text-center py-20 text-gray-400 font-bold uppercase text-xs tracking-widest">Henüz ${mevcutSekme} teklifiniz bulunmuyor.</p>`;
                    return;
                }

                let html = '';
                teklifler.forEach(t => {
                    const ilan = t.ilanlar;
                    const durumRenk = t.durum === 'Kabul Edildi' ? 'bg-green-100 text-green-700' : (t.durum === 'Reddedildi' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700');
                    const karsiTaraf = mevcutSekme === 'gelen' ? t.teklif_veren_email : ilan.sahip_email;

                    html += `
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 flex flex-col md:flex-row items-center justify-between gap-6 shadow-sm hover:border-gray-300 transition-all">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div class="w-16 h-16 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 border border-gray-100">
                                <img src="${ilan.resim_url ? ilan.resim_url.split(',')[0] : ''}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h3 class="font-black text-gray-900 uppercase text-sm">${ilan.baslik}</h3>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">${karsiTaraf}</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter ${durumRenk}">${t.durum || 'Beklemede'}</span>
                            <div class="flex gap-2">
                                ${mevcutSekme === 'gelen' && !t.durum ? `
                                    <button onclick="islemYap(${t.id}, 'Reddedildi')" class="bg-red-50 text-red-600 p-2.5 rounded-lg hover:bg-red-100 transition-colors">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                    <button onclick="islemYap(${t.id}, 'Kabul Edildi', '${t.teklif_veren_email}')" class="bg-green-50 text-green-600 p-2.5 rounded-lg hover:bg-green-100 transition-colors">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                    </button>
                                ` : ''}
                                ${t.durum === 'Kabul Edildi' ? `<button onclick="window.location.href='sohbetler.html'" class="bg-gray-900 text-yellow-500 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest shadow-sm">Mesajlara Git</button>` : ''}
                                <button onclick="teklifSil(${t.id})" class="text-gray-400 hover:text-red-500 p-2.5 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
                });
                vitrin.innerHTML = html;
            } catch (e) {
                vitrin.innerHTML = `<p class="text-red-500 text-xs font-bold">${e.message}</p>`;
            }
        }

        window.islemYap = async function(id, durum, karsiEmail) {
            const baslik = durum === 'Kabul Edildi' ? 'Teklifi Kabul Et' : 'Teklifi Reddet';
            const mesaj = durum === 'Kabul Edildi' ? 'Bu teklifi kabul ettiğinizde kullanıcıyla iletişime geçebilirsiniz.' : 'Bu teklifi reddetmek istediğinize emin misiniz?';
            const tip = durum === 'Kabul Edildi' ? 'basarili' : 'hata';

            modalAc(baslik, mesaj, tip, true, async () => {
                const { error } = await _supabase.from('teklifler').update({ durum: durum }).eq('id', id);
                if (!error && durum === 'Kabul Edildi') {
                    // Otomatik başlangıç mesajı oluştur (Opsiyonel)
                    await _supabase.from('mesajlar').insert([{
                        gonderen_email: benimEmailim,
                        alici_email: karsiEmail,
                        mesaj_metni: "Takas teklifini kabul ettim! Detayları konuşalım mı?"
                    }]);
                }
                verileriGetir();
            });
        }

        window.teklifSil = function(id) {
            modalAc("Teklifi Kaldır", "Bu teklif kaydını listenizden silmek istediğinize emin misiniz?", "hata", true, async () => {
                await _supabase.from('teklifler').delete().eq('id', id);
                verileriGetir();
            });
        }

        // Modal Fonksiyonları
        window.modalAc = function(baslik, mesaj, tip, isConfirm, onayFonk) {
            document.getElementById('modal-baslik').innerText = baslik;
            document.getElementById('modal-mesaj').innerText = mesaj;
            hafizadakiIslem = onayFonk;
            const ikon = document.getElementById('modal-ikon');
            const btnIptal = document.getElementById('modal-btn-iptal');
            
            if(tip === 'basarili') { ikon.className = "mx-auto h-12 w-12 rounded-full bg-green-100 mb-4 flex items-center justify-center text-green-600"; ikon.innerHTML = '✓'; }
            else { ikon.className = "mx-auto h-12 w-12 rounded-full bg-red-100 mb-4 flex items-center justify-center text-red-600"; ikon.innerHTML = '!'; }

            if(isConfirm) btnIptal.classList.remove('hidden'); else btnIptal.classList.add('hidden');
            
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        window.modalOnayCalistir = function() { modalKapat(); if(hafizadakiIslem) hafizadakiIslem(); }
        window.modalKapat = function() { document.getElementById('ozel-modal').classList.add('hidden'); document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0'); }
        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
