<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekliflerim - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .tab-icerik { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl flex-shrink-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-2">
            <div class="flex items-center gap-3">
                <button onclick="mobilMenuAcKapat()" class="md:hidden text-white text-2xl focus:outline-none hover:text-yellow-500 transition-colors">☰</button>
                <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            </div>

            <div class="flex-grow mx-8 hidden md:block relative">
                <input type="text" id="arama-desktop" autocomplete="new-password" onkeyup="canliArama(this.value)" onfocus="canliArama(this.value)" onblur="setTimeout(() => document.getElementById('oneri-kutusu-desktop').style.display='none', 200)" placeholder="Ürün, marka veya takas tercihi ara..." class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 text-white text-sm focus:border-yellow-500 outline-none transition-colors">
                <div id="oneri-kutusu-desktop" style="display: none;" class="absolute w-full bg-white border border-gray-200 shadow-2xl rounded-b-lg mt-1 z-50 max-h-60 overflow-y-auto"></div>
            </div>

            <div class="flex gap-4 items-center">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest border-r border-gray-700 pr-3 hidden md:block"></span>
                <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors flex items-center gap-2">
                    <span class="hidden md:inline">← Vitrine Dön</span>
                    <span class="md:hidden">← Geri</span>
                </a>
            </div>
        </div>

        <div class="mt-3 block md:hidden w-full relative px-3 pb-1">
            <input type="text" id="arama-mobil" autocomplete="new-password" onkeyup="canliArama(this.value)" onfocus="canliArama(this.value)" onblur="setTimeout(() => document.getElementById('oneri-kutusu-mobil').style.display='none', 200)" placeholder="Takaslık ne arıyorsun?" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 text-white text-xs focus:border-yellow-500 outline-none">
            <div id="oneri-kutusu-mobil" style="display: none;" class="absolute w-[calc(100%-1.5rem)] left-3 bg-white border border-gray-200 shadow-2xl rounded-b-lg mt-1 z-50 max-h-48 overflow-y-auto"></div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 mt-4 flex-grow w-full">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100 min-h-[500px]">
            
            <div class="mb-6 border-b-2 border-gray-100 pb-4">
                <h1 class="text-3xl font-black text-gray-900 uppercase italic tracking-tight mb-1">Tekliflerim 🤝</h1>
                <p class="text-gray-500 font-medium text-sm">Takas ticaretinin kalbi burada atıyor.</p>
            </div>

            <div class="flex bg-gray-100 p-1 rounded-xl mb-8">
                <button onclick="sekmeDegistir('gelen')" id="btn-gelen" class="flex-1 py-3 rounded-lg text-sm font-black uppercase tracking-wider transition-all bg-white shadow-sm text-yellow-600">Bana Gelenler 📥</button>
                <button onclick="sekmeDegistir('giden')" id="btn-giden" class="flex-1 py-3 rounded-lg text-sm font-bold uppercase tracking-wider transition-all text-gray-500 hover:text-gray-700">Yaptıklarım 📤</button>
            </div>

            <div id="kutu-gelen" class="tab-icerik block space-y-4">
                <div class="animate-pulse flex gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div class="w-20 h-20 bg-gray-200 rounded-lg"></div>
                    <div class="flex-grow py-2"><div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div><div class="h-4 bg-gray-200 rounded w-1/3"></div></div>
                </div>
            </div>

            <div id="kutu-giden" class="tab-icerik hidden space-y-4">
                <div class="animate-pulse flex gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div class="w-20 h-20 bg-gray-200 rounded-lg"></div>
                    <div class="flex-grow py-2"><div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div><div class="h-4 bg-gray-200 rounded w-1/3"></div></div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-12 text-center border-t-4 border-yellow-500 flex-shrink-0 mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center">
            <h2 class="text-4xl font-black text-white tracking-tighter italic mb-2 opacity-90">TRAKAS</h2>
            <p class="text-sm font-medium tracking-wide mb-6">Türkiye'nin Yeni Nesil Klasik Takas Pazarı</p>
            <p class="text-xs font-bold text-gray-600 uppercase tracking-widest">© 2026 Trakas Pazaryeri A.Ş. • Bursa, Türkiye</p>
        </div>
    </footer>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-yellow-50 mb-4 border-4 border-white shadow-sm"><span class="text-3xl">🤔</span></div>
                <h3 id="modal-baslik" class="text-2xl font-black text-gray-900 mb-2 italic uppercase tracking-tight">Uyarı</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-iptal" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-700 font-bold px-4 py-3 rounded-xl hover:bg-gray-200 transition-colors uppercase text-xs tracking-wide">İptal</button>
                    <button id="modal-btn-onay" class="flex-1 bg-yellow-500 text-gray-900 font-black px-4 py-3 rounded-xl hover:bg-yellow-400 transition-colors uppercase text-xs tracking-wide shadow-md">Tamam</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KESİN ÇÖZÜMLÜ MODAL MOTORU ---
        window.modalAc = function(baslik, mesaj, ikon, isConfirm, onayFonk) {
            const modal = document.getElementById('ozel-modal'); 
            const kutu = document.getElementById('ozel-modal-kutu');
            
            document.getElementById('modal-baslik').innerText = baslik; 
            document.getElementById('modal-mesaj').innerText = mesaj; 
            document.getElementById('modal-ikon').innerHTML = `<span class="text-3xl">${ikon}</span>`;
            
            const btnIptal = document.getElementById('modal-btn-iptal'); 
            const btnOnay = document.getElementById('modal-btn-onay');
            
            // JİLET GİBİ ÇÖZÜM: Butonu klonlayıp eski tıklamaları temizliyoruz!
            const yeniBtnOnay = btnOnay.cloneNode(true);
            btnOnay.parentNode.replaceChild(yeniBtnOnay, btnOnay);
            
            yeniBtnOnay.onclick = async function() { 
                modalKapat(); 
                if (onayFonk) await onayFonk(); 
            };
            
            if (isConfirm) { 
                btnIptal.classList.remove('hidden'); 
                btnIptal.classList.add('block'); 
                // YENİ GÜNCELLEMEYİ BURADAN ANLAYACAKSIN:
                yeniBtnOnay.innerText = "ONAYLA VE SİL 🗑️"; 
            } else { 
                btnIptal.classList.remove('block'); 
                btnIptal.classList.add('hidden'); 
                yeniBtnOnay.innerText = "Tamam"; 
            }
            
            modal.classList.remove('hidden'); 
            setTimeout(() => { 
                kutu.classList.remove('scale-95', 'opacity-0'); 
                kutu.classList.add('scale-100', 'opacity-100'); 
            }, 10);
        }

        window.modalKapat = function() {
            const modal = document.getElementById('ozel-modal'); 
            const kutu = document.getElementById('ozel-modal-kutu');
            kutu.classList.remove('scale-100', 'opacity-100'); 
            kutu.classList.add('scale-95', 'opacity-0'); 
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let tumIlanlarSozlugu = {};

        window.sekmeDegistir = function(sekme) {
            const btnGelen = document.getElementById('btn-gelen'); const btnGiden = document.getElementById('btn-giden');
            const kutuGelen = document.getElementById('kutu-gelen'); const kutuGiden = document.getElementById('kutu-giden');

            if (sekme === 'gelen') {
                btnGelen.className = "flex-1 py-3 rounded-lg text-sm font-black uppercase tracking-wider transition-all bg-white shadow-sm text-yellow-600";
                btnGiden.className = "flex-1 py-3 rounded-lg text-sm font-bold uppercase tracking-wider transition-all text-gray-500 hover:text-gray-700";
                kutuGelen.classList.remove('hidden'); kutuGelen.classList.add('block');
                kutuGiden.classList.remove('block'); kutuGiden.classList.add('hidden');
            } else {
                btnGiden.className = "flex-1 py-3 rounded-lg text-sm font-black uppercase tracking-wider transition-all bg-white shadow-sm text-yellow-600";
                btnGelen.className = "flex-1 py-3 rounded-lg text-sm font-bold uppercase tracking-wider transition-all text-gray-500 hover:text-gray-700";
                kutuGiden.classList.remove('hidden'); kutuGiden.classList.add('block');
                kutuGelen.classList.remove('block'); kutuGelen.classList.add('hidden');
            }
        }

        async function teklifleriYukle() {
            const kutuGelen = document.getElementById('kutu-gelen');
            const kutuGiden = document.getElementById('kutu-giden');
            
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }

            benimEmailim = session.user.email;
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

            try {
                const { data: ilanlar } = await _supabase.from('ilanlar').select('*');
                if (ilanlar) { ilanlar.forEach(ilan => { tumIlanlarSozlugu[ilan.id] = ilan; }); }

                const benimIlanIdlerim = ilanlar.filter(i => (i.sahip_email === benimEmailim)).map(i => i.id);
                const { data: tumTeklifler, error: teklifHata } = await _supabase.from('teklifler').select('*').order('id', { ascending: false });
                
                if (teklifHata) throw teklifHata;

                const gelenTeklifler = tumTeklifler.filter(t => benimIlanIdlerim.includes(t.ilan_id));
                const gidenTeklifler = tumTeklifler.filter(t => t.teklif_veren_email === benimEmailim);

                setTimeout(() => {
                    // GELEN TEKLİFLER
                    if (gelenTeklifler.length === 0) {
                        kutuGelen.innerHTML = `<div class="text-center py-12"><span class="text-5xl block mb-3 opacity-40">📥</span><p class="text-gray-500 font-bold">İlanlarına henüz bir teklif gelmemiş.</p></div>`;
                    } else {
                        let html = '';
                        gelenTeklifler.forEach(teklif => {
                            const ilan = tumIlanlarSozlugu[teklif.ilan_id];
                            if(!ilan) return; 
                            const kapakResmi = ilan.resim_url ? ilan.resim_url.split(',')[0] : '';
                            const resimHtml = kapakResmi ? `<img src="${kapakResmi}" class="w-full h-full object-cover">` : '<span class="text-2xl">📸</span>';
                            const teklifYapan = teklif.teklif_veren_email.split('@')[0];

                            html += `
                            <div id="teklif-kutu-${teklif.id}" class="bg-blue-50/40 p-4 md:p-5 rounded-2xl border border-blue-100 flex flex-col md:flex-row items-center justify-between gap-4 hover:shadow-md transition-all">
                                <div class="flex items-center gap-4 w-full md:w-auto">
                                    <div class="w-16 h-16 md:w-20 md:h-20 bg-white border border-gray-200 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center cursor-pointer shadow-sm" onclick="window.location.href='detay.html?id=${ilan.id}'">${resimHtml}</div>
                                    <div>
                                        <p class="text-[10px] font-black uppercase text-blue-600 tracking-widest mb-1">Yeni Teklif 🔔</p>
                                        <h3 class="font-black text-gray-900 uppercase text-sm md:text-base line-clamp-1">${ilan.baslik}</h3>
                                        <p class="text-xs text-gray-600 font-medium mt-1"><span class="font-bold text-gray-800">@${teklifYapan}</span> takas yapmak istiyor!</p>
                                    </div>
                                </div>
                                <div class="flex gap-2 w-full md:w-auto justify-end mt-2 md:mt-0">
                                    <button onclick="teklifReddet(${teklif.id})" class="bg-red-50 text-red-600 font-bold text-[10px] md:text-xs uppercase px-4 py-3 rounded-xl hover:bg-red-100 transition-colors border border-red-100">Reddet ❌</button>
                                    <button onclick="teklifKabulEt(${teklif.id}, '${teklifYapan}')" class="bg-green-500 text-white font-black text-[10px] md:text-xs uppercase px-4 md:px-6 py-3 rounded-xl hover:bg-green-600 transition-colors shadow-md">Kabul Et ✅</button>
                                </div>
                            </div>`;
                        });
                        kutuGelen.innerHTML = html;
                    }

                    // GİDEN TEKLİFLER
                    if (gidenTeklifler.length === 0) {
                        kutuGiden.innerHTML = `<div class="text-center py-12"><span class="text-5xl block mb-3 opacity-40">📤</span><p class="text-gray-500 font-bold">Henüz kimseye takas teklifi göndermemişsin.</p></div>`;
                    } else {
                        let htmlGiden = '';
                        gidenTeklifler.forEach(teklif => {
                            const ilan = tumIlanlarSozlugu[teklif.ilan_id];
                            if(!ilan) return; 
                            const kapakResmi = ilan.resim_url ? ilan.resim_url.split(',')[0] : '';
                            const resimHtml = kapakResmi ? `<img src="${kapakResmi}" class="w-full h-full object-cover">` : '<span class="text-2xl">📸</span>';
                            const ilanSahibi = (ilan.sahip_email || 'anonim').split('@')[0];

                            htmlGiden += `
                            <div id="teklif-kutu-${teklif.id}" class="bg-gray-50 p-4 md:p-5 rounded-2xl border border-gray-100 flex flex-col md:flex-row items-center justify-between gap-4 hover:shadow-md transition-all">
                                <div class="flex items-center gap-4 w-full md:w-auto">
                                    <div class="w-16 h-16 md:w-20 md:h-20 bg-white border border-gray-200 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center cursor-pointer shadow-sm" onclick="window.location.href='detay.html?id=${ilan.id}'">${resimHtml}</div>
                                    <div>
                                        <p class="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-1">Cevap Bekleniyor ⏳</p>
                                        <h3 class="font-black text-gray-900 uppercase text-sm md:text-base line-clamp-1">${ilan.baslik}</h3>
                                        <p class="text-xs text-gray-500 font-medium mt-1"><span class="font-bold text-gray-700">@${ilanSahibi}</span> adlı kullanıcıya teklif iletildi.</p>
                                    </div>
                                </div>
                                <div class="w-full md:w-auto mt-2 md:mt-0 flex justify-end">
                                    <button onclick="teklifGeriCek(${teklif.id})" class="bg-white border border-gray-200 text-gray-500 font-bold text-[10px] md:text-xs uppercase px-4 py-3 rounded-xl hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors shadow-sm flex items-center gap-2">Teklifi Geri Çek ↩️</button>
                                </div>
                            </div>`;
                        });
                        kutuGiden.innerHTML = htmlGiden;
                    }
                }, 400); 

            } catch (error) {
                kutuGelen.innerHTML = `<p class="text-red-500 font-bold text-center py-10">Sistemsel Hata: ${error.message}</p>`;
                kutuGiden.innerHTML = kutuGelen.innerHTML;
            }
        }

        // --- AKSİYONLAR ---
        window.teklifReddet = function(teklifId) {
            modalAc("Teklifi Reddet", "Bu takas teklifini reddetmek istediğine emin misin?", "❌", true, async () => {
                const kutu = document.getElementById(`teklif-kutu-${teklifId}`);
                if(kutu) kutu.style.display = 'none'; // Görsel olarak anında sil
                
                await _supabase.from('teklifler').delete().eq('id', teklifId);
                teklifleriYukle(); // Arka planı güncelle
            });
        }

        window.teklifGeriCek = function(teklifId) {
            modalAc("Teklifi Geri Çek", "Başkasına yaptığın bu teklifi iptal etmek istiyor musun?", "↩️", true, async () => {
                const kutu = document.getElementById(`teklif-kutu-${teklifId}`);
                if(kutu) kutu.style.display = 'none'; 
                
                await _supabase.from('teklifler').delete().eq('id', teklifId);
                teklifleriYukle();
            });
        }

        window.teklifKabulEt = function(teklifId, kimden) {
            modalAc("Anlaşma Sağlandı! 🎉", `Harika! @${kimden} ile takas yapmak için anlaştın. Çok yakında "Mesajlarım" bölümü kodlandığında direkt olarak yazışmaya başlayabileceksiniz!`, "🤝", false);
        }

        teklifleriYukle();
    </script>
</body>
</html>
