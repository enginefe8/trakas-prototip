<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbetlerim - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            <div class="flex gap-4 items-center">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest border-r border-gray-700 pr-3 hidden md:block"></span>
                <a href="index.html" class="text-white font-bold text-sm hover:text-yellow-500 uppercase tracking-widest transition-colors">← VİTRİNE DÖN</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 mt-8">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100">
            <h1 class="text-3xl font-black text-gray-900 uppercase italic tracking-tight mb-2">Sohbetlerim 💬</h1>
            <p class="text-gray-500 font-medium text-sm mb-8 border-b-2 border-gray-100 pb-4">Aktif takas görüşmelerin burada listelenir.</p>

            <div id="sohbet-listesi" class="space-y-3">
                <p class="text-center text-gray-400 italic py-10 font-bold tracking-widest uppercase">Mesaj kutun taranıyor...</p>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function sohbetleriGetir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }

            const benimEmailim = session.user.email;
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

            const listeKutusu = document.getElementById('sohbet-listesi');

            const { data, error } = await _supabase
                .from('mesajlar')
                .select('*')
                .or(`gonderen_email.eq.${benimEmailim},alici_email.eq.${benimEmailim}`)
                .order('id', { ascending: false });

            if (error || !data || data.length === 0) {
                listeKutusu.innerHTML = `
                    <div class="text-center py-10">
                        <span class="text-6xl mb-4 block">📭</span>
                        <p class="text-gray-500 font-bold text-lg">Mesaj kutun tertemiz!</p>
                        <p class="text-gray-400 text-sm mt-2">Henüz kimseyle bir takas sohbeti başlatmamışsın.</p>
                    </div>`;
                return;
            }

            const benzersizSohbetler = {};

            data.forEach(msg => {
                const karsiTaraf = msg.gonderen_email === benimEmailim ? msg.alici_email : msg.gonderen_email;
                const sohbetAnahtari = msg.ilan_id + "-" + karsiTaraf;
                
                if (!benzersizSohbetler[sohbetAnahtari]) {
                    benzersizSohbetler[sohbetAnahtari] = {
                        ilan_id: msg.ilan_id,
                        karsi_taraf: karsiTaraf,
                        son_mesaj: msg.mesaj_metni,
                        ben_mi_attim: msg.gonderen_email === benimEmailim,
                        tarih: msg.created_at // Supabase'den gelen otomatik tarih
                    };
                }
            });

            let htmlCikti = '';
            Object.values(benzersizSohbetler).forEach(sohbet => {
                const kisaMesaj = sohbet.son_mesaj.length > 40 ? sohbet.son_mesaj.substring(0, 40) + "..." : sohbet.son_mesaj;
                
                // "Gittin" yerine efsanevi WhatsApp stili: "Sen: "
                const okIcon = sohbet.ben_mi_attim ? "Sen: " : "";
                
                // Tarihi alıp güzel bir saate (Örn: 22:45) çevirelim
                let saatMetni = "";
                if (sohbet.tarih) {
                    const tarihObj = new Date(sohbet.tarih);
                    saatMetni = tarihObj.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                }

                htmlCikti += `
                <a href="mesajlar.html?ilan_id=${sohbet.ilan_id}&kiminle=${sohbet.karsi_taraf}" class="block bg-gray-50 hover:bg-yellow-50 p-4 rounded-2xl border border-gray-100 hover:border-yellow-300 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gray-900 text-white rounded-full flex items-center justify-center font-black text-xl shadow-inner group-hover:bg-yellow-500 transition-colors">
                            ${sohbet.karsi_taraf.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-black text-gray-900 uppercase text-sm">${sohbet.karsi_taraf.split('@')[0]}</h3>
                                <span class="bg-gray-200 text-gray-600 text-[9px] font-black uppercase px-2 py-0.5 rounded-md">İlan #${sohbet.ilan_id}</span>
                            </div>
                            <p class="text-sm text-gray-500 font-medium italic"><span class="text-gray-400 font-bold">${okIcon}</span>${kisaMesaj}</p>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-[10px] font-black text-gray-400 tracking-widest">${saatMetni}</span>
                        <div class="text-gray-300 group-hover:text-yellow-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </div>
                    </div>
                </a>`;
            });
            
            listeKutusu.innerHTML = htmlCikti;
        }

        sohbetleriGetir();
    </script>
</body>
</html>
