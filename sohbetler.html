<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesajlarım - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col h-screen overflow-hidden text-gray-900">

    <nav class="bg-gray-900 p-4 shadow-xl z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-white italic tracking-tighter">TRAKAS</a>
            <div id="user-panel" class="hidden items-center gap-6">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest"></span>
                <a href="index.html" class="text-gray-300 font-bold text-xs uppercase hover:text-white transition-colors">Vitrin</a>
                <button onclick="cikisYap()" class="text-red-400 font-bold text-xs uppercase hover:text-red-300">Çıkış</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 flex-grow w-full flex overflow-hidden">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col md:flex-row w-full overflow-hidden">
            
            <div class="w-full md:w-1/3 lg:w-1/4 border-r border-gray-200 flex flex-col overflow-y-auto bg-gray-50/30" id="liste-paneli">
                <div class="p-5 border-b border-gray-100"><h2 class="text-lg font-black uppercase italic italic">Gelen Kutusu</h2></div>
                <div id="sohbet-listesi" class="flex-grow"></div>
            </div>

            <div class="w-full md:w-2/3 lg:w-3/4 flex flex-col hidden md:flex" id="mesaj-paneli">
                <div id="bos-ekran" class="flex flex-col items-center justify-center h-full bg-gray-50 p-8 text-center">
                    <p class="text-gray-400 font-bold uppercase text-xs tracking-widest">Bir sohbet seçin</p>
                </div>

                <div id="sohbet-ekrani" class="hidden flex-col h-full">
                    <div class="p-4 border-b border-gray-100 flex items-center gap-4 bg-white shadow-sm">
                        <button onclick="mobileGeri()" class="md:hidden text-gray-500">←</button>
                        <div class="w-10 h-10 rounded-full bg-gray-900 flex items-center justify-center text-yellow-500 font-black" id="header-harf"></div>
                        <h3 id="header-isim" class="font-bold text-sm uppercase"></h3>
                    </div>

                    <div id="mesaj-kutusu" class="flex-grow p-6 overflow-y-auto bg-gray-50 flex flex-col gap-4"></div>

                    <div class="p-4 bg-white border-t border-gray-200">
                        <form onsubmit="mesajGonder(event)" class="flex gap-2">
                            <input type="text" id="mesaj-input" placeholder="Yazın..." class="flex-grow bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:ring-1 focus:ring-yellow-500 text-sm">
                            <button type="submit" class="bg-gray-900 text-yellow-500 font-black px-6 py-3 rounded-xl hover:bg-gray-800 transition-all uppercase text-xs tracking-widest">Gönder</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let aktifKisi = "";
        let tumMesajlar = [];

        async function baslat() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            document.getElementById('user-panel').style.display = 'flex';
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();
            
            verileriCek();

            // 🔥 GERÇEK ANLIK MOTOR (REALTIME) 🔥
            _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mesajlar' }, payload => {
                tumMesajlar.push(payload.new);
                sohbetListesiYap();
                if (aktifKisi === payload.new.gonderen_email || aktifKisi === payload.new.alici_email) {
                    mesajlariBas(aktifKisi);
                }
            }).subscribe();
        }

        async function verileriCek() {
            const { data } = await _supabase.from('mesajlar').select('*').or(`gonderen_email.eq.${benimEmailim},alici_email.eq.${benimEmailim}`).order('created_at', { ascending: true });
            tumMesajlar = data || [];
            sohbetListesiYap();
        }

        function sohbetListesiYap() {
            const liste = document.getElementById('sohbet-listesi');
            let kisiler = new Set();
            tumMesajlar.forEach(m => kisiler.add(m.gonderen_email === benimEmailim ? m.alici_email : m.gonderen_email));
            
            let html = "";
            Array.from(kisiler).reverse().forEach(email => {
                const aktifMi = email === aktifKisi ? "bg-gray-100 border-l-4 border-yellow-500" : "";
                html += `<div onclick="sohbetAc('${email}')" class="p-4 border-b border-gray-100 cursor-pointer flex items-center gap-3 ${aktifMi}">
                    <div class="w-8 h-8 rounded-full bg-gray-900 text-yellow-500 flex items-center justify-center text-xs font-black">${email.charAt(0).toUpperCase()}</div>
                    <div class="truncate text-sm font-bold text-gray-700">${email.split('@')[0].toUpperCase()}</div>
                </div>`;
            });
            liste.innerHTML = html || '<p class="p-5 text-gray-400 text-xs">Mesaj yok.</p>';
        }

        window.sohbetAc = function(email) {
            aktifKisi = email;
            document.getElementById('bos-ekran').classList.add('hidden');
            document.getElementById('sohbet-ekrani').classList.remove('hidden');
            document.getElementById('header-isim').innerText = email.split('@')[0];
            document.getElementById('header-harf').innerText = email.charAt(0).toUpperCase();
            if(window.innerWidth < 768) { document.getElementById('liste-paneli').classList.add('hidden'); document.getElementById('mesaj-paneli').classList.remove('hidden'); }
            sohbetListesiYap();
            mesajlariBas(email);
        }

        function mesajlariBas(email) {
            const kutu = document.getElementById('mesaj-kutusu');
            const filtreli = tumMesajlar.filter(m => (m.gonderen_email === benimEmailim && m.alici_email === email) || (m.gonderen_email === email && m.alici_email === benimEmailim));
            
            let html = "";
            let sonTarih = "";
            filtreli.forEach(m => {
                const gun = new Date(m.created_at).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
                if(gun !== sonTarih) {
                    html += `<div class="text-center my-4"><span class="text-[10px] font-bold text-gray-400 uppercase bg-white px-3 py-1 rounded-full border border-gray-100">${gun}</span></div>`;
                    sonTarih = gun;
                }
                const isBen = m.gonderen_email === benimEmailim;
                const saat = new Date(m.created_at).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                
                html += `<div class="flex ${isBen ? 'justify-end' : 'justify-start'}">
                    <div class="${isBen ? 'bg-gray-900 text-white rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'} p-3 rounded-xl max-w-[80%] shadow-sm border border-gray-100">
                        <p class="text-sm font-medium">${m.mesaj_metni}</p>
                        <p class="text-[9px] mt-1 text-right font-bold ${isBen ? 'text-yellow-500' : 'text-gray-400'}">${saat}</p>
                    </div>
                </div>`;
            });
            kutu.innerHTML = html;
            kutu.scrollTop = kutu.scrollHeight;
        }

        window.mesajGonder = async function(e) {
            e.preventDefault();
            const inp = document.getElementById('mesaj-input');
            const txt = inp.value.trim();
            if(!txt || !aktifKisi) return;
            inp.value = "";
            const { data, error } = await _supabase.from('mesajlar').insert([{ gonderen_email: benimEmailim, alici_email: aktifKisi, mesaj_metni: txt }]).select();
        }

        window.mobileGeri = function() { document.getElementById('liste-paneli').classList.remove('hidden'); document.getElementById('mesaj-paneli').classList.add('hidden'); }
        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        baslat();
    </script>
</body>
</html>
