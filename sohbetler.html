<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesajlarım - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        /* Mobilde yağ gibi kayması için zorunlu ayar */
        #mesaj-kutusu {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans flex flex-col h-[100dvh] overflow-hidden text-gray-900">

    <nav class="bg-gray-900 p-3 shadow-xl z-50 flex-shrink-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
            </div>
            <div id="user-panel" class="hidden items-center gap-4">
                <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest hidden md:block"></span>
                <a href="index.html" class="text-gray-300 font-bold text-[10px] md:text-xs uppercase hover:text-white transition-all">Vitrin</a>
                <button onclick="cikisYap()" class="text-red-400 font-bold text-[10px] md:text-xs uppercase hover:text-red-300">Çıkış</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-0 md:p-6 flex-grow w-full flex overflow-hidden min-h-0">
        <div class="bg-white md:rounded-2xl md:shadow-2xl border-0 md:border border-gray-200 flex flex-col md:flex-row w-full overflow-hidden h-full">
            
            <div class="w-full md:w-1/3 lg:w-1/4 border-r border-gray-100 flex flex-col bg-gray-50/50 h-full" id="liste-paneli">
                <div class="p-4 border-b border-gray-100 bg-white flex-shrink-0">
                    <h2 class="text-base font-black uppercase italic tracking-tight text-gray-900">Gelen Kutusu</h2>
                </div>
                <div id="sohbet-listesi" class="flex-1 overflow-y-auto">
                    </div>
            </div>

            <div class="w-full md:w-2/3 lg:w-3/4 flex-col hidden md:flex bg-white h-full" id="mesaj-paneli">
                <div id="bos-ekran" class="flex flex-col items-center justify-center h-full p-8 text-center bg-gray-50">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4 border border-gray-200">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    </div>
                    <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Görüşmek istediğiniz kişiyi seçin</p>
                </div>

                <div id="sohbet-ekrani" class="hidden flex-col h-full w-full">
                    
                    <div class="p-3 border-b border-gray-100 flex items-center gap-3 bg-white flex-shrink-0 shadow-sm z-10">
                        <button onclick="mobileGeri()" class="md:hidden p-2 text-gray-900 font-bold">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div class="w-10 h-10 rounded-full bg-gray-900 text-yellow-500 flex items-center justify-center font-black flex-shrink-0" id="header-harf"></div>
                        <div class="flex-grow min-w-0">
                            <h3 id="header-isim" class="font-black text-sm uppercase tracking-tight text-gray-900 truncate"></h3>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Çevrimiçi</p>
                        </div>
                    </div>

                    <div id="mesaj-kutusu" class="flex-1 overflow-y-auto p-4 bg-gray-50 flex flex-col gap-2 min-h-0">
                        </div>

                    <div class="p-3 bg-white border-t border-gray-200 flex-shrink-0">
                        <form onsubmit="mesajGonder(event)" class="flex gap-2 w-full mx-auto">
                            <input type="text" id="mesaj-input" autocomplete="off" placeholder="Mesajınız..." class="flex-grow bg-gray-100 border-none p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-sm font-medium">
                            <button type="submit" class="bg-gray-900 text-yellow-500 font-black px-5 rounded-xl hover:bg-black transition-all uppercase text-[10px] tracking-widest shadow-md flex-shrink-0">GÖNDER</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let aktifKisi = "";
        let tumMesajlar = [];

        async function baslat() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            
            benimEmailim = session.user.email;
            document.getElementById('user-panel').classList.replace('hidden', 'flex');
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();
            
            verileriCek();

            // Realtime Motoru
            _supabase.channel('trakas-sohbet')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mesajlar' }, (payload) => {
                    const yeniMsg = payload.new;
                    if (yeniMsg.gonderen_email === benimEmailim || yeniMsg.alici_email === benimEmailim) {
                        tumMesajlar.push(yeniMsg);
                        sohbetListesiYap();
                        if (aktifKisi === yeniMsg.gonderen_email || aktifKisi === yeniMsg.alici_email) {
                            mesajlariBas(aktifKisi);
                        }
                    }
                }).subscribe();
        }

        async function verileriCek() {
            const { data } = await _supabase.from('mesajlar').select('*')
                .or(`gonderen_email.eq.${benimEmailim},alici_email.eq.${benimEmailim}`)
                .order('created_at', { ascending: true });
            tumMesajlar = data || [];
            sohbetListesiYap();
        }

        function sohbetListesiYap() {
            const liste = document.getElementById('sohbet-listesi');
            let kisiler = new Map();
            
            tumMesajlar.forEach(m => {
                const karsiEmail = m.gonderen_email === benimEmailim ? m.alici_email : m.gonderen_email;
                kisiler.set(karsiEmail, m);
            });
            
            let html = "";
            Array.from(kisiler.entries()).reverse().forEach(([email, sonMesaj]) => {
                const aktifMi = email === aktifKisi ? "bg-gray-100 border-l-4 border-yellow-500" : "hover:bg-gray-50 border-l-4 border-transparent";
                html += `
                <div onclick="sohbetAc('${email}')" class="p-4 border-b border-gray-100 cursor-pointer flex items-center gap-3 transition-all ${aktifMi}">
                    <div class="w-10 h-10 rounded-full bg-gray-900 text-yellow-500 flex items-center justify-center text-xs font-black flex-shrink-0">${email.charAt(0).toUpperCase()}</div>
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-center">
                            <h4 class="font-bold text-xs uppercase truncate text-gray-900">${email.split('@')[0]}</h4>
                        </div>
                        <p class="text-[11px] text-gray-500 truncate mt-0.5">${sonMesaj.mesaj_metni}</p>
                    </div>
                </div>`;
            });
            liste.innerHTML = html || '<p class="p-10 text-center text-gray-400 text-[10px] font-bold uppercase tracking-widest">Henüz mesaj yok</p>';
        }

        window.sohbetAc = function(email) {
            aktifKisi = email;
            document.getElementById('bos-ekran').classList.add('hidden');
            document.getElementById('sohbet-ekrani').classList.remove('hidden');
            document.getElementById('sohbet-ekrani').classList.add('flex');
            
            document.getElementById('header-isim').innerText = email.split('@')[0];
            document.getElementById('header-harf').innerText = email.charAt(0).toUpperCase();
            
            if(window.innerWidth < 768) {
                document.getElementById('liste-paneli').classList.add('hidden');
                document.getElementById('mesaj-paneli').classList.remove('hidden');
                document.getElementById('mesaj-paneli').classList.add('flex');
            }
            
            sohbetListesiYap();
            mesajlariBas(email);
        }

        function mesajlariBas(email) {
            const kutu = document.getElementById('mesaj-kutusu');
            const filtreli = tumMesajlar.filter(m => (m.gonderen_email === benimEmailim && m.alici_email === email) || (m.gonderen_email === email && m.alici_email === benimEmailim));
            
            let html = "";
            let sonTarih = "";
            
            filtreli.forEach(m => {
                const tarihObj = new Date(m.created_at);
                const gun = tarihObj.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
                
                if(gun !== sonTarih) {
                    html += `<div class="flex justify-center my-3"><span class="bg-gray-200 text-gray-600 text-[9px] font-black uppercase px-3 py-1 rounded-full shadow-sm">${gun}</span></div>`;
                    sonTarih = gun;
                }
                
                const isBen = m.gonderen_email === benimEmailim;
                const saat = tarihObj.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                
                html += `
                <div class="flex ${isBen ? 'justify-end' : 'justify-start'} mb-2">
                    <div class="${isBen ? 'bg-gray-900 text-white rounded-2xl rounded-tr-sm shadow-md' : 'bg-white text-gray-800 rounded-2xl rounded-tl-sm shadow-sm border border-gray-200'} p-3 px-4 max-w-[85%] md:max-w-md">
                        <p class="text-[13px] font-medium leading-relaxed break-words">${m.mesaj_metni}</p>
                        <div class="flex items-center ${isBen ? 'justify-end' : 'justify-start'} gap-1 mt-1 opacity-70">
                            <span class="text-[9px] font-bold">${saat}</span>
                            ${isBen ? '<svg class="w-3 h-3 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                    </div>
                </div>`;
            });
            kutu.innerHTML = html;
            // Scroll'u en alta indir
            setTimeout(() => {
                kutu.scrollTop = kutu.scrollHeight;
            }, 50);
        }

        window.mesajGonder = async function(e) {
            e.preventDefault();
            const inp = document.getElementById('mesaj-input');
            const txt = inp.value.trim();
            if(!txt || !aktifKisi) return;
            
            inp.value = "";
            await _supabase.from('mesajlar').insert([{ gonderen_email: benimEmailim, alici_email: aktifKisi, mesaj_metni: txt }]);
        }

        window.mobileGeri = function() {
            document.getElementById('liste-paneli').classList.remove('hidden');
            document.getElementById('mesaj-paneli').classList.add('hidden');
            document.getElementById('mesaj-paneli').classList.remove('flex');
            aktifKisi = "";
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        
        baslat();
    </script>
</body>
</html>
