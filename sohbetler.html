<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesajlarım - Trakas Pazaryeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* Özel Scrollbar - Sohbet alanı için ince ve zarif */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col h-screen overflow-hidden">

    <nav class="bg-gray-900 p-3 md:p-4 shadow-xl flex-shrink-0 relative z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
            
            <div class="flex items-center gap-3">
                <button onclick="mobilMenuAcKapat()" class="md:hidden text-white focus:outline-none hover:text-yellow-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <a href="index.html" class="text-2xl md:text-3xl font-black text-white tracking-tighter italic hover:text-yellow-500 transition-colors">TRAKAS</a>
            </div>
            
            <div class="hidden md:flex gap-4 lg:gap-6 items-center flex-shrink-0 ml-auto">
                <div id="user-panel" style="display: none;" class="items-center gap-4 lg:gap-6 border-r border-gray-700 pr-5">
                    <span id="user-name" class="text-yellow-500 font-black text-xs uppercase tracking-widest hidden xl:block mr-2"></span>
                    <a href="favorilerim.html" class="text-gray-300 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-white transition-colors">Favorilerim</a>
                    <a href="ilanlarim.html" class="text-gray-300 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-white transition-colors">İlanlarım</a>
                    <a href="sohbetler.html" class="text-white font-bold text-[11px] lg:text-xs uppercase tracking-wide transition-colors">Mesajlarım</a>
                    <a href="teklifler.html" class="text-gray-300 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-white transition-colors">Tekliflerim</a>
                    <button onclick="cikisYap()" class="text-red-400 font-bold text-[11px] lg:text-xs uppercase tracking-wide hover:text-red-300 transition-colors ml-2">Çıkış</button>
                </div>
                
                <a href="ilan-ver.html" class="bg-yellow-500 px-5 py-2.5 rounded-lg font-black text-xs hover:bg-yellow-400 uppercase transition-all shadow-md whitespace-nowrap text-gray-900">İlan Ver</a>
            </div>
        </div>

        <div id="mobil-menu" class="hidden md:hidden flex-col bg-gray-800 p-5 rounded-b-3xl border-t border-gray-700 shadow-2xl absolute left-0 top-full w-full z-50">
            <div id="mobil-user-panel" style="display: none;" class="flex-col gap-2">
                <span id="mobil-user-name" class="text-yellow-500 font-black text-sm uppercase tracking-widest block border-b border-gray-700 pb-3 mb-2"></span>
                <a href="favorilerim.html" class="text-gray-300 font-bold text-sm uppercase hover:text-white block p-3 rounded-lg hover:bg-gray-700 transition-colors">Favorilerim</a>
                <a href="ilanlarim.html" class="text-gray-300 font-bold text-sm uppercase hover:text-white block p-3 rounded-lg hover:bg-gray-700 transition-colors">İlanlarım</a>
                <a href="sohbetler.html" class="text-white font-bold text-sm uppercase block p-3 rounded-lg bg-gray-700 transition-colors">Mesajlarım</a>
                <a href="teklifler.html" class="text-gray-300 font-bold text-sm uppercase hover:text-white block p-3 rounded-lg hover:bg-gray-700 transition-colors">Tekliflerim</a>
                <button onclick="cikisYap()" class="text-red-400 font-bold text-sm uppercase text-left p-3 hover:bg-gray-700 rounded-lg mt-2 transition-colors">Çıkış Yap</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 flex-grow w-full flex overflow-hidden">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col md:flex-row w-full overflow-hidden">
            
            <div class="w-full md:w-1/3 lg:w-1/4 border-r border-gray-200 flex flex-col h-[calc(100vh-140px)] md:h-auto">
                <div class="p-5 border-b border-gray-100 bg-gray-50/50">
                    <h2 class="text-lg font-black text-gray-900 uppercase italic tracking-tight">Gelen Kutusu</h2>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Aktif Görüşmeler</p>
                </div>
                
                <div id="sohbet-listesi" class="flex-grow overflow-y-auto">
                    <div class="p-4 animate-pulse">
                        <div class="h-12 bg-gray-100 rounded-xl mb-2"></div>
                        <div class="h-12 bg-gray-100 rounded-xl mb-2"></div>
                        <div class="h-12 bg-gray-100 rounded-xl"></div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-2/3 lg:w-3/4 flex flex-col h-[calc(100vh-140px)] md:h-auto hidden md:flex" id="sag-panel">
                
                <div id="bos-sohbet-ekrani" class="flex flex-col items-center justify-center h-full bg-gray-50 p-8 text-center">
                    <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-6 border-4 border-white shadow-sm">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h3 class="text-xl font-black text-gray-800 uppercase tracking-wide mb-2">Sohbet Seçilmedi</h3>
                    <p class="text-sm font-medium text-gray-500 max-w-sm">Mesajlaşmaya başlamak veya eski konuşmalarınızı görmek için sol taraftan bir sohbet seçin.</p>
                </div>

                <div id="aktif-sohbet-alani" class="flex-col h-full hidden">
                    
                    <div class="p-4 md:p-5 border-b border-gray-100 flex items-center gap-4 bg-white shadow-sm z-10">
                        <button onclick="mobileGeriDon()" class="md:hidden text-gray-500 hover:text-gray-900 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div class="w-10 h-10 rounded-full bg-gray-900 flex items-center justify-center text-yellow-500 font-black text-sm uppercase flex-shrink-0">
                            <span id="chat-header-harf">U</span>
                        </div>
                        <div>
                            <h3 id="chat-header-isim" class="font-bold text-gray-900 text-sm md:text-base">Kullanıcı Adı</h3>
                            <p class="text-[10px] font-bold text-green-600 uppercase tracking-widest mt-0.5">Çevrimiçi</p>
                        </div>
                    </div>

                    <div id="mesaj-kutusu" class="flex-grow p-4 md:p-6 overflow-y-auto bg-gray-50 flex flex-col gap-4">
                        </div>

                    <div class="p-4 bg-white border-t border-gray-200">
                        <form id="mesaj-formu" onsubmit="mesajGonder(event)" class="flex gap-2">
                            <input type="text" id="mesaj-input" placeholder="Bir mesaj yazın..." required class="flex-grow bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 block p-3.5 outline-none transition-all placeholder-gray-400">
                            <button type="submit" class="bg-gray-900 text-yellow-500 hover:bg-gray-800 hover:text-yellow-400 font-bold p-3.5 rounded-xl transition-colors flex-shrink-0">
                                <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let aktifSohbetKullanicisi = "";

        window.mobilMenuAcKapat = function() { 
            const menu = document.getElementById('mobil-menu'); 
            if (menu.classList.contains('hidden')) { menu.classList.remove('hidden'); menu.classList.add('flex'); } 
            else { menu.classList.add('hidden'); menu.classList.remove('flex'); } 
        };

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }

            benimEmailim = session.user.email;
            document.getElementById('user-panel').style.display = 'flex';
            document.getElementById('mobil-user-panel').style.display = 'flex';
            document.getElementById('user-name').innerText = benimEmailim.split('@')[0].toUpperCase();
            document.getElementById('mobil-user-name').innerText = benimEmailim.split('@')[0].toUpperCase();

            // SOHBET LİSTESİ DEMO VERİSİ (Veritabanı bağlantısı kurulana kadar arayüzü göstermek için)
            // İleride burası: await _supabase.from('mesajlar').select(...) olarak güncellenecek.
            setTimeout(() => {
                sohbetListesiniBas();
            }, 500);
        }

        // Temsili (Mock) veri ile kurumsal listeyi basıyoruz
        function sohbetListesiniBas() {
            const listeDiv = document.getElementById('sohbet-listesi');
            
            // Demo kişiler
            const kisiler = [
                { email: "arda.yazilim@gmail.com", sonMesaj: "Projeyi ne zaman yayına alıyoruz?", tarih: "10:45", okunmadi: true },
                { email: "yatirimci@firma.com", sonMesaj: "Prototip çok başarılı olmuş, tebrikler.", tarih: "Dün", okunmadi: false },
                { email: "kullanici123@mail.com", sonMesaj: "iPhone 13 ilanı için takas düşünüyor musunuz?", tarih: "Pzt", okunmadi: false }
            ];

            let htmlCikti = '';
            kisiler.forEach(kisi => {
                const isim = kisi.email.split('@')[0];
                const basHarf = isim.charAt(0).toUpperCase();
                const aktifClass = ""; // Seçili olduğunda: bg-gray-100 border-l-4 border-yellow-500
                const okunmadiNokta = kisi.okunmadi ? `<div class="w-2.5 h-2.5 bg-yellow-500 rounded-full absolute top-4 right-4 shadow-sm"></div>` : '';
                const yaziKalini = kisi.okunmadi ? 'font-black text-gray-900' : 'font-medium text-gray-500';

                htmlCikti += `
                <div onclick="sohbetAc('${kisi.email}')" class="p-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors relative flex items-center gap-4 ${aktifClass}">
                    ${okunmadiNokta}
                    <div class="w-12 h-12 rounded-full bg-gray-100 text-gray-600 border border-gray-200 flex items-center justify-center font-black text-lg uppercase flex-shrink-0">
                        ${basHarf}
                    </div>
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-baseline mb-0.5">
                            <h4 class="font-bold text-gray-900 text-sm truncate uppercase tracking-tight">${isim}</h4>
                            <span class="text-[10px] text-gray-400 font-bold ml-2 flex-shrink-0">${kisi.tarih}</span>
                        </div>
                        <p class="text-xs truncate ${yaziKalini}">${kisi.sonMesaj}</p>
                    </div>
                </div>`;
            });

            listeDiv.innerHTML = htmlCikti;
        }

        window.sohbetAc = function(karsiEmail) {
            aktifSohbetKullanicisi = karsiEmail;
            const isim = karsiEmail.split('@')[0];
            
            // Üst bilgileri güncelle
            document.getElementById('chat-header-isim').innerText = isim.toUpperCase();
            document.getElementById('chat-header-harf').innerText = isim.charAt(0).toUpperCase();
            
            // Panelleri göster/gizle
            document.getElementById('bos-sohbet-ekrani').classList.add('hidden');
            document.getElementById('aktif-sohbet-alani').classList.remove('hidden');
            document.getElementById('aktif-sohbet-alani').classList.add('flex');

            // Mobilde listeyi gizle sağ paneli göster
            if(window.innerWidth < 768) {
                document.querySelector('.w-full.md\\:w-1\\/3').classList.add('hidden');
                document.getElementById('sag-panel').classList.remove('hidden');
            }

            // Demo Mesajları Yükle (Sağ-Sol Kurumsal Balon Tasarımı)
            const mesajKutusu = document.getElementById('mesaj-kutusu');
            mesajKutusu.innerHTML = `
                <div class="flex flex-col gap-3">
                    <div class="text-center my-2"><span class="text-[10px] font-bold text-gray-400 bg-white border border-gray-200 px-3 py-1 rounded-full uppercase tracking-widest shadow-sm">BUGÜN</span></div>
                    
                    <div class="flex justify-start">
                        <div class="bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[85%] md:max-w-md shadow-sm">
                            <p class="text-sm font-medium leading-relaxed">Merhaba usta, projeyi ne zaman yayına alıyoruz? Supabase ayarları tamam mı?</p>
                            <div class="text-[10px] text-gray-400 text-right mt-1 font-bold">10:45</div>
                        </div>
                    </div>
                    
                    <div class="flex justify-end">
                        <div class="bg-gray-900 text-white rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] md:max-w-md shadow-md border border-gray-800">
                            <p class="text-sm font-medium leading-relaxed text-gray-100">Ayarları bitirdim! Tüm RLS kilitlerini kırdık, tasarımları da takım elbiseye soktuk. V1.0 uçuşa hazır! 🚀</p>
                            <div class="text-[10px] text-yellow-500 text-right mt-1 font-bold flex items-center justify-end gap-1">
                                10:48 
                                <svg class="w-3 h-3 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // En alta kaydır
            mesajKutusu.scrollTop = mesajKutusu.scrollHeight;
        }

        window.mesajGonder = function(event) {
            event.preventDefault();
            const input = document.getElementById('mesaj-input');
            const mesaj = input.value.trim();
            if (!mesaj) return;

            // Anında Ekrana Ekle (Benden Giden)
            const mesajKutusu = document.getElementById('mesaj-kutusu');
            const icerikContainer = mesajKutusu.querySelector('.flex-col.gap-3');
            
            const suAn = new Date();
            const saatStr = suAn.getHours().toString().padStart(2, '0') + ':' + suAn.getMinutes().toString().padStart(2, '0');

            const html = `
                <div class="flex justify-end">
                    <div class="bg-gray-900 text-white rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] md:max-w-md shadow-md border border-gray-800">
                        <p class="text-sm font-medium leading-relaxed text-gray-100">${mesaj}</p>
                        <div class="text-[10px] text-yellow-500 text-right mt-1 font-bold flex items-center justify-end gap-1">
                            ${saatStr} 
                            <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                </div>
            `;
            
            icerikContainer.insertAdjacentHTML('beforeend', html);
            mesajKutusu.scrollTop = mesajKutusu.scrollHeight;
            input.value = '';

            // Not: Burası Supabase'e "INSERT" atılacak yer.
        }

        window.mobileGeriDon = function() {
            document.getElementById('sag-panel').classList.add('hidden');
            document.querySelector('.w-full.md\\:w-1\\/3').classList.remove('hidden');
            aktifSohbetKullanicisi = "";
        }

        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
