<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesajlarım - Trakas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .mesaj-giden { background-color: #0f172a; color: white; border-bottom-right-radius: 2px; }
        .mesaj-gelen { background-color: #f1f5f9; color: #0f172a; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="bg-gray-100 font-sans fixed inset-0 flex flex-col overflow-hidden w-full h-full">

    <nav class="bg-[#0f172a] px-6 py-4 flex justify-between items-center w-full shadow-md z-50 flex-shrink-0 relative">
        <a href="index.html" class="text-3xl font-black text-white italic tracking-tighter uppercase">TRAKAS</a>
        <div id="auth-menu" class="hidden lg:flex items-center gap-6"></div>
        <div id="auth-menu-mobil" class="lg:hidden flex items-center gap-3"></div>
        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-[#0f172a] border-t border-gray-800 shadow-2xl flex-col z-50"></div>
    </nav>

    <main class="flex-1 flex max-w-7xl mx-auto w-full p-2 md:p-4 gap-4 overflow-hidden min-h-0">
        
        <div class="w-full md:w-1/3 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col h-full overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex-shrink-0">
                <h2 class="text-lg font-black text-[#0f172a] tracking-widest uppercase">Mesajlarım</h2>
            </div>
            
            <div id="sohbet-listesi" class="flex-grow overflow-y-auto p-2 space-y-1">
                <div class="flex flex-col items-center justify-center py-10 text-gray-400">
                    <svg class="animate-spin h-6 w-6 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Sohbetler Aranıyor...</span>
                </div>
            </div>
        </div>

        <div class="hidden md:flex flex-col w-full md:w-2/3 bg-white rounded-2xl shadow-sm border border-gray-200 h-full overflow-hidden relative" id="sohbet-alani">
            
            <div id="sohbet-bos" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-10">
                <div class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                </div>
                <h3 class="text-xl font-black text-gray-800 uppercase tracking-widest">TRAKAS MESAJLAŞMA</h3>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-2">Mesajlaşmaya başlamak için soldan bir sohbet seçin.</p>
            </div>

            <div id="sohbet-header" class="p-2 md:p-4 border-b border-gray-100 bg-white flex justify-between items-center shadow-sm z-0 flex-shrink-0 gap-2 w-full">
                
                <div class="flex items-center gap-2 md:gap-4 flex-1 min-w-0">
                    <button onclick="solaDon()" class="md:hidden text-gray-500 hover:text-gray-900 flex-shrink-0 p-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-100 rounded-md md:rounded-lg overflow-hidden border border-gray-200 flex-shrink-0">
                        <img id="header-ilan-resim" src="" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 flex flex-col justify-center">
                        <h3 id="header-ilan-baslik" class="font-black text-gray-900 uppercase tracking-tight text-[11px] md:text-sm truncate w-full">--</h3>
                        <p class="text-[9px] md:text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-0.5 truncate w-full">
                            <span id="header-karsi-isim" class="text-[#0f172a]">--</span>
                            <span class="hidden md:inline"> ile sohbet ediyorsunuz</span>
                        </p>
                    </div>
                </div>
                
                <div id="header-sag-kisim" class="flex-shrink-0 flex items-center">
                    <button id="header-tamamla-btn" onclick="takasiTamamlaAdiminaGec()" class="hidden bg-green-500 text-white px-2.5 py-1.5 md:px-4 md:py-2 rounded-lg font-black text-[9px] md:text-[10px] uppercase tracking-widest hover:bg-green-600 transition-colors shadow-md items-center gap-1 md:gap-2">
                        <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        <span class="hidden sm:inline">TAKASI TAMAMLA</span>
                        <span class="sm:hidden">TAMAMLA</span>
                    </button>
                    
                    <div id="header-bekleniyor-text" class="hidden text-[8px] md:text-[9px] font-bold text-gray-400 uppercase tracking-widest text-right leading-tight">
                        İLAN SAHİBİNİN<br><span class="text-yellow-600">ONAYI BEKLENİYOR</span>
                    </div>
                </div>

            </div>

            <div id="mesajlar-kutusu" class="flex-grow p-4 overflow-y-auto bg-slate-50 flex flex-col gap-3 min-h-0">
                </div>

            <form id="mesaj-gonderme-formu" onsubmit="mesajGonder(event)" class="hidden p-3 md:p-4 border-t border-gray-200 bg-white flex gap-2 md:gap-3 flex-shrink-0 z-20">
                <input type="text" id="mesaj-input" required autocomplete="off" placeholder="Mesajınızı yazın..." class="flex-grow bg-gray-100 border-none px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-[#facc15] text-sm font-medium text-gray-800 transition-all">
                <button type="submit" id="gonder-btn" class="bg-[#0f172a] text-[#facc15] px-4 md:px-6 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-black transition-colors shadow-md flex-shrink-0">
                    <span class="hidden md:inline">GÖNDER</span>
                    <svg class="w-4 h-4 md:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>

        </div>
    </main>

    <div id="ozel-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity" onclick="modalKapat()"></div>
        <div id="ozel-modal-kutu" class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300">
            <div class="text-center">
                <div id="modal-ikon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-6"></div>
                <h3 id="modal-baslik" class="text-xl font-black text-gray-900 mb-2 uppercase tracking-wide">Bilgi</h3>
                <p id="modal-mesaj" class="text-gray-600 font-medium text-sm mb-8 leading-relaxed"></p>
                <div class="flex justify-center gap-3">
                    <button id="modal-btn-ikincil" onclick="modalKapat()" class="hidden flex-1 bg-gray-100 text-gray-900 font-black px-4 py-4 rounded-xl hover:bg-gray-200 transition-colors uppercase text-[10px] tracking-widest">İPTAL</button>
                    <button id="modal-btn-ana" onclick="modalKapat()" class="flex-1 bg-[#0f172a] text-white font-black px-4 py-4 rounded-xl hover:bg-black transition-colors uppercase text-[10px] tracking-widest shadow-md">TAMAM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ivnazhfahtjcdspclkis.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2bmF6aGZhaHRqY2RzcGNsa2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgxNzEsImV4cCI6MjA4ODc5NDE3MX0.Z2bKgccAQX8dgex99cQL-GLpTYU1vhb-0BqWiuIMhxU';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let benimEmailim = "";
        let tumSohbetler = [];
        let aktifTeklifId = null;
        let aktifKarsiEmail = "";
        let realtimeAbonelik = null; 

        async function sitemiCalistir() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'giris.html'; return; }
            benimEmailim = session.user.email;
            menuOlusturGuncel(session);
            await sohbetListesiniCek();
        }

        async function sohbetListesiniCek() {
            try {
                const { data: gidenler } = await _supabase.from('teklifler').select('id, ilan_id, teklif_veren_email, durum').eq('teklif_veren_email', benimEmailim).eq('durum', 'Kabul Edildi');
                
                const { data: ilanlarim } = await _supabase.from('ilanlar').select('id, baslik, resim_url, sahip_email').eq('sahip_email', benimEmailim);
                const benimIlanIdleri = ilanlarim ? ilanlarim.map(i => i.id) : [];
                
                let gelenler = [];
                if(benimIlanIdleri.length > 0) {
                    const { data } = await _supabase.from('teklifler').select('id, ilan_id, teklif_veren_email, durum').in('ilan_id', benimIlanIdleri).eq('durum', 'Kabul Edildi');
                    gelenler = data || [];
                }

                const birlesikTeklifler = [...(gidenler || []), ...gelenler];

                if(birlesikTeklifler.length === 0) {
                    document.getElementById('sohbet-listesi').innerHTML = `<div class="p-6 text-center text-gray-400 font-bold text-[10px] uppercase tracking-widest border-2 border-dashed border-gray-100 rounded-xl m-2">Henüz onaylanmış bir takas işleminiz yok.</div>`;
                    return;
                }

                const tumIlanIdleri = birlesikTeklifler.map(t => t.ilan_id);
                const { data: tumIlanDetaylari } = await _supabase.from('ilanlar').select('id, baslik, resim_url, sahip_email').in('id', tumIlanIdleri);

                tumSohbetler = birlesikTeklifler.map(teklif => {
                    const ilan = tumIlanDetaylari.find(i => i.id === teklif.ilan_id);
                    const isBenimIlanim = ilan.sahip_email === benimEmailim;
                    const karsiEmail = isBenimIlanim ? teklif.teklif_veren_email : ilan.sahip_email;

                    return {
                        teklif_id: teklif.id,
                        karsi_email: karsiEmail,
                        ilan_detay: ilan
                    };
                });

                listeyiCiz();

            } catch(e) {
                console.error(e);
            }
        }

        function listeyiCiz() {
            let html = "";
            tumSohbetler.forEach(sohbet => {
                const ilkResim = sohbet.ilan_detay.resim_url ? sohbet.ilan_detay.resim_url.split(',')[0] : "";
                const karsiIsim = sohbet.karsi_email.split('@')[0].toUpperCase();
                
                html += `
                <div onclick="sohbetiAc('${sohbet.teklif_id}', '${sohbet.karsi_email}', '${sohbet.ilan_detay.baslik.replace(/'/g, "\\'")}', '${ilkResim}')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 cursor-pointer transition-colors border border-transparent hover:border-gray-200 sohbet-item" id="btn-sohbet-${sohbet.teklif_id}">
                    <div class="w-12 h-12 rounded-full bg-gray-200 overflow-hidden flex-shrink-0 border-2 border-white shadow-sm">
                        ${ilkResim ? `<img src="${ilkResim}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-[8px] font-bold text-gray-500">YOK</div>`}
                    </div>
                    <div class="flex-grow min-w-0">
                        <h4 class="font-black text-sm text-[#0f172a] truncate">${karsiIsim}</h4>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest truncate mt-0.5">İlan: ${sohbet.ilan_detay.baslik}</p>
                    </div>
                </div>`;
            });
            document.getElementById('sohbet-listesi').innerHTML = html;
        }

        function sohbetiAc(teklifId, karsiEmail, ilanBaslik, ilanResim) {
            aktifTeklifId = teklifId;
            aktifKarsiEmail = karsiEmail;

            // AKILLI KONTROL: Bu ilan benim mi? (Sadece bana yeşil butonu göster)
            const seciliSohbet = tumSohbetler.find(s => s.teklif_id == teklifId);
            const isBenimIlanim = seciliSohbet.ilan_detay.sahip_email === benimEmailim;

            if (isBenimIlanim) {
                document.getElementById('header-tamamla-btn').classList.remove('hidden');
                document.getElementById('header-tamamla-btn').classList.add('flex');
                document.getElementById('header-bekleniyor-text').classList.add('hidden');
            } else {
                document.getElementById('header-tamamla-btn').classList.add('hidden');
                document.getElementById('header-tamamla-btn').classList.remove('flex');
                document.getElementById('header-bekleniyor-text').classList.remove('hidden');
            }

            const solPanel = document.querySelector('.md\\:w-1\\/3');
            if (window.innerWidth < 768) { solPanel.classList.add('hidden'); }
            document.getElementById('sohbet-alani').classList.remove('hidden');
            document.getElementById('sohbet-alani').classList.add('flex');
            
            document.querySelectorAll('.sohbet-item').forEach(el => el.classList.remove('bg-yellow-50', 'border-yellow-200'));
            document.getElementById(`btn-sohbet-${teklifId}`).classList.add('bg-yellow-50', 'border-yellow-200');

            document.getElementById('sohbet-bos').classList.add('hidden');
            document.getElementById('header-ilan-baslik').innerText = ilanBaslik;
            document.getElementById('header-karsi-isim').innerText = karsiEmail.split('@')[0].toUpperCase();
            
            // Sohbet açıldığında mesaj gönderme formunu görünür yap
            document.getElementById('mesaj-gonderme-formu').classList.remove('hidden');
            document.getElementById('mesaj-gonderme-formu').classList.add('flex');

            if(ilanResim) { document.getElementById('header-ilan-resim').src = ilanResim; } 
            else { document.getElementById('header-ilan-resim').src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" fill="none"><rect width="100%" height="100%" fill="%23f3f4f6"/></svg>'; }

            document.getElementById('mesajlar-kutusu').innerHTML = `<div class="text-center text-xs font-bold text-gray-400 mt-10">Mesajlar Yükleniyor...</div>`;

            eskiMesajlariGetir();
            canliYayinAboneligiBaslat(); 
        }

        function solaDon() {
            document.querySelector('.md\\:w-1\\/3').classList.remove('hidden');
            document.getElementById('sohbet-alani').classList.add('hidden');
            document.getElementById('sohbet-alani').classList.remove('flex');
        }

        function canliYayinAboneligiBaslat() {
            if (realtimeAbonelik) { _supabase.removeChannel(realtimeAbonelik); }
            realtimeAbonelik = _supabase.channel('custom-all-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mesajlar' }, (payload) => {
                        if (payload.new.teklif_id == aktifTeklifId) { mesajiEkranaCiz(payload.new); }
                    }
                ).subscribe();
        }

        async function eskiMesajlariGetir() {
            if(!aktifTeklifId) return;
            const kutu = document.getElementById('mesajlar-kutusu');

            try {
                const { data, error } = await _supabase.from('mesajlar').select('*').eq('teklif_id', aktifTeklifId).order('created_at', { ascending: true });
                if (error) throw error;

                if(!data || data.length === 0) {
                    kutu.innerHTML = `<div class="text-center text-[10px] uppercase tracking-widest font-bold text-gray-500 bg-white shadow-sm p-3 rounded-xl mx-auto w-fit mt-10 border border-gray-200 baslangic-mesaji">Sohbet başlatıldı. İlk mesajı siz yazın!</div>`;
                    return;
                }
                kutu.innerHTML = ""; 
                data.forEach(m => mesajiEkranaCiz(m));

            } catch (err) {
                console.error("Mesajlar alınamadı: ", err);
            }
        }

        function mesajiEkranaCiz(m) {
            const kutu = document.getElementById('mesajlar-kutusu');
            const baslangicMesaji = kutu.querySelector('.baslangic-mesaji');
            if(baslangicMesaji) baslangicMesaji.remove();

            const benMiyim = m.gonderen_email === benimEmailim;
            const hizalama = benMiyim ? "justify-end" : "justify-start";
            const renkClass = benMiyim ? "mesaj-giden shadow-md" : "mesaj-gelen border border-gray-200 shadow-sm";
            const saat = new Date(m.created_at).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

            const html = `
            <div class="w-full flex ${hizalama} mesaj-satiri mb-3">
                <div class="max-w-[85%] md:max-w-[70%] p-3 rounded-2xl ${renkClass} relative group">
                    <p class="text-sm font-medium leading-relaxed">${m.mesaj}</p>
                    <span class="text-[9px] font-bold opacity-50 block text-right mt-1 tracking-widest">${saat}</span>
                </div>
            </div>`;

            kutu.insertAdjacentHTML('beforeend', html);
            kutu.scrollTop = kutu.scrollHeight; 
        }

        async function mesajGonder(event) {
            event.preventDefault();
            const input = document.getElementById('mesaj-input');
            const btn = document.getElementById('gonder-btn');
            const mesaj = input.value.trim();

            if(!mesaj || !aktifTeklifId || !aktifKarsiEmail) return;

            input.disabled = true; btn.disabled = true;

            try {
                const { error } = await _supabase.from('mesajlar').insert([{
                    teklif_id: aktifTeklifId,
                    gonderen_email: benimEmailim,
                    alici_email: aktifKarsiEmail,
                    mesaj: mesaj
                }]);
                
                if (error) throw error;
                input.value = "";
            } catch(e) {
                console.error(e);
            } finally {
                input.disabled = false; btn.disabled = false; input.focus();
            }
        }

        function takasiTamamlaAdiminaGec() {
            modalAc("Takası Tamamla", "Diğer kullanıcıyla anlaştınız ve takas gerçekleşti mi? Bu işlem ilanı vitrinden kaldıracaktır.", "uyari", true, () => {
                modalAc("HARİKA HABER!", "Bir sonraki komutunda bu butona bastığında ilanı vitrinden kaldırıp üzerine 'TAKASLANDI' damgası vuran motoru kuracağız usta!", "basarili");
            });
            document.getElementById('modal-btn-ana').innerText = "EVET, ANLAŞTIK";
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function menuOlusturGuncel(session) {
            const menuDiv = document.getElementById('auth-menu');
            const mobilTopDiv = document.getElementById('auth-menu-mobil');
            const mobileMenu = document.getElementById('mobile-menu');
            const gorunenIsim = session.user.user_metadata.ad_soyad ? session.user.user_metadata.ad_soyad.toUpperCase() : session.user.email.split('@')[0].toUpperCase();
            
            menuDiv.innerHTML = `
                <a href="profil.html" class="text-[#facc15] font-black text-xs uppercase tracking-widest border-b-2 border-[#facc15] hover:border-white transition-colors pb-0.5">${gorunenIsim}</a>
                <a href="favorilerim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">FAVORİLERİM</a>
                <a href="ilanlarim.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">İLANLARIM</a>
                <a href="sohbetler.html" class="text-white font-black text-[11px] uppercase tracking-widest transition-colors">MESAJLARIM</a>
                <a href="teklifler.html" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest hover:text-white transition-colors">TEKLİFLERİM</a>
                <span class="text-gray-700">|</span>
                <button onclick="cikisYap()" class="text-red-500 font-bold text-[11px] uppercase tracking-widest hover:text-red-400">ÇIKIŞ</button>
                <a href="ilan-ver.html" class="ml-2 bg-[#facc15] text-[#0f172a] px-6 py-2.5 rounded-lg font-black text-[11px] uppercase tracking-widest shadow-sm">İLAN VER</a>
            `;
            
            mobilTopDiv.innerHTML = `
                <a href="ilan-ver.html" class="bg-[#facc15] text-[#0f172a] px-3 py-1.5 rounded-lg font-black text-[10px] uppercase tracking-widest shadow-sm">İLAN VER</a>
                <button onclick="toggleMobileMenu()" class="text-white p-1 focus:outline-none"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            `;
            
            mobileMenu.innerHTML = `
                <a href="profil.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest border-b border-gray-800">${gorunenIsim}</a>
                <a href="favorilerim.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">FAVORİLERİM</a>
                <a href="sohbetler.html" class="block px-6 py-4 text-[#facc15] font-black text-[11px] uppercase tracking-widest border-b border-gray-800">MESAJLARIM</a>
                <a href="teklifler.html" class="block px-6 py-4 text-gray-300 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">TEKLİFLERİM</a>
                <button onclick="cikisYap()" class="w-full text-left block px-6 py-4 text-red-500 font-bold text-[11px] uppercase tracking-widest border-b border-gray-800 hover:bg-gray-800 transition-colors">ÇIKIŞ</button>
            `;
        }

        function modalAc(baslik, mesaj, tip, isIptal = false, onayFonk = null) {
            document.getElementById('modal-baslik').innerText = baslik; document.getElementById('modal-mesaj').innerText = mesaj;
            const ikon = document.getElementById('modal-ikon');
            if(tip === 'basarili') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-green-50 flex items-center justify-center text-green-500 font-bold text-2xl border border-green-100"; ikon.innerHTML = "✓"; }
            else if(tip === 'hata') { ikon.className = "mx-auto h-16 w-16 rounded-full bg-red-50 flex items-center justify-center text-red-500 font-bold text-2xl border border-red-100"; ikon.innerHTML = "!"; }
            else { ikon.className = "mx-auto h-16 w-16 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500 font-bold text-2xl border border-yellow-100"; ikon.innerHTML = "?"; }
            if(isIptal) { document.getElementById('modal-btn-ikincil').classList.remove('hidden'); document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(onayFonk) onayFonk(); }; } 
            else { document.getElementById('modal-btn-ikincil').classList.add('hidden'); document.getElementById('modal-btn-ana').innerText = "TAMAM"; document.getElementById('modal-btn-ana').onclick = () => { modalKapat(); if(onayFonk) onayFonk(); }; }
            document.getElementById('ozel-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('ozel-modal-kutu').classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function modalKapat() { document.getElementById('ozel-modal-kutu').classList.add('scale-95', 'opacity-0'); setTimeout(() => { document.getElementById('ozel-modal').classList.add('hidden'); }, 300); }
        async function cikisYap() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        sitemiCalistir();
    </script>
</body>
</html>
